name: Build NEXORA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: npx cap init "Nexora" "com.nexora.app" --web-dir www

      - name: Add Android
        run: npx cap add android

      - name: Copy Java files
        run: |
          cp android-native/java/com/nexora/app/*.java android/app/src/main/java/com/nexora/app/

      - name: Replace AndroidManifest
        run: |
          cp android-native/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Add google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Clean Gradle Cache
        run: rm -rf ~/.gradle/caches/

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexora-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
