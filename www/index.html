    // ── Mini Video Preview — মিনি মোডে remote ভিডিও দেখায় ─────────────────────
    const MiniVideoPreview = ({ pipCall, contact, isActive, sec }) => {
      const remoteVidRef = useRef(null);
      const localVidRef  = useRef(null);

      useEffect(() => {
        const room = pipCall?.roomRef?.current;
        if (!room) return;
        const LK = window.LivekitClient;

        // track.detach() কল হওয়ার পরেও mediaStreamTrack সরাসরি ব্যবহার করলে
        // video reliably attach হয় — এটাই প্রাথমিক পদ্ধতি
        const attachViaStream = (track, videoEl) => {
          if (!track || !videoEl) return false;
          // Primary: raw MediaStreamTrack দিয়ে নতুন MediaStream তৈরি
          try {
            const mst = track.mediaStreamTrack;
            if (mst && mst.readyState !== "ended") {
              videoEl.srcObject = new MediaStream([mst]);
              safePlay(videoEl);
              return true;
            }
          } catch(e) {}
          // Fallback: LiveKit track.attach()
          try {
            try { track.detach(videoEl); } catch(e) {}
            track.attach(videoEl);
            safePlay(videoEl);
            return true;
          } catch(e) {}
          return false;
        };

        const attachAll = () => {
          // Remote video — প্রথমে সংরক্ষিত track ref ব্যবহার করি (সবচেয়ে reliable)
          if (pipCall?.remoteVideoTrackRef?.current && remoteVidRef.current) {
            attachViaStream(pipCall.remoteVideoTrackRef.current, remoteVidRef.current);
          } else {
            // Fallback: room থেকে খুঁজি
            const remotes = (room.remoteParticipants instanceof Map)
              ? room.remoteParticipants
              : (room.participants instanceof Map ? room.participants : new Map());
            remotes.forEach(p => {
              const vPub = getTrackPub(p, LK?.Track?.Source?.Camera);
              if (vPub?.track && remoteVidRef.current) {
                attachViaStream(vPub.track, remoteVidRef.current);
              }
            });
          }
          // Local video
          const lPub = getTrackPub(room.localParticipant, LK?.Track?.Source?.Camera);
          if (lPub?.track && localVidRef.current) {
            attachViaStream(lPub.track, localVidRef.current);
          }
        };

        // নতুন track subscribe হলে re-attach করো
        const onTrackSub = (track) => {
          if (track.kind === LK?.Track?.Kind?.Video) setTimeout(attachAll, 100);
        };
        try { room.on(LK?.RoomEvent?.TrackSubscribed, onTrackSub); } catch(e) {}

        // একাধিক retry — track.detach() এর পরেই প্রথম attempt
        const timers = [50, 200, 500, 1200, 2500].map(d => setTimeout(attachAll, d));

        return () => {
          timers.forEach(t => clearTimeout(t));
          try { room.off(LK?.RoomEvent?.TrackSubscribed, onTrackSub); } catch(e) {}
          try { if (remoteVidRef.current) remoteVidRef.current.srcObject = null; } catch(e) {}
          try { if (localVidRef.current) localVidRef.current.srcObject = null; } catch(e) {}
        };
      }, []);

      return (
        <div style={{width:"100%",height:185,position:"relative",background:"#111",overflow:"hidden"}}>
          {/* Remote video — full background */}
          <video ref={remoteVidRef} autoPlay playsInline
            style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",zIndex:1}} />
          {/* Fallback avatar যদি video না আসে */}
          <div style={{position:"absolute",inset:0,zIndex:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.7)"}}>
            <span style={{fontSize:32}}>{contact.emoji||"👤"}</span>
          </div>
          {/* Local video — ছোট কোণায় */}
          <div style={{position:"absolute",top:6,right:6,width:52,height:70,borderRadius:8,overflow:"hidden",border:"1.5px solid rgba(0,212,255,.4)",zIndex:3,background:"#000"}}>
            <video ref={localVidRef} autoPlay playsInline muted
              style={{width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)"}} />
          </div>
          {/* Bottom bar */}
          <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"4px 8px",background:"linear-gradient(transparent,rgba(0,0,0,.85))",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:4}}>
            <span style={{fontSize:10,color:"rgba(255,255,255,.9)",fontFamily:"'Exo 2',sans-serif",fontWeight:600,maxWidth:90,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{contact.name}</span>
            {isActive&&<span style={{fontSize:10,color:"var(--green)",fontFamily:"'Exo 2',sans-serif",fontWeight:700}}>{fmtTime(sec)}</span>}
          </div>
        </div>
      );

    // ── PrayerWidget — সঠিক ওয়াক্ত/হারাম/মুক্ত সময় countdown দেখায় ──────────
    const PrayerWidget = () => {
      const [info,  setInfo]  = useState(null);
      const [blink, setBlink] = useState(false);

      const parseHM = (str) => {
        const m = str && str.match(/(\d+):(\d+)/);
        return m ? {h:parseInt(m[1]), m:parseInt(m[2])} : null;
      };
      const toMins = ({h,m}) => h*60+m;

      // ── মূল logic: কোন period এ আছি, কতক্ষণ বাকি ──────────────────────────
      const calcInfo = (timings) => {
        const now  = new Date();
        const nowM = now.getHours()*60 + now.getMinutes();
        const nowS = now.getSeconds();

        const pMin = (key) => { const t = parseHM(timings[key]); return t ? toMins(t) : null; };

        const fajrM    = pMin("Fajr");
        const sunriseM = pMin("Sunrise");   // সূর্যোদয় — API থেকে আসে
        const dhuhrM   = pMin("Dhuhr");
        const asrM     = pMin("Asr");
        const maghribM = pMin("Maghrib");
        const ishaM    = pMin("Isha");

        if (!fajrM || !sunriseM || !dhuhrM || !asrM || !maghribM || !ishaM) return null;

        // ── মধ্যরাত: API-তে থাকলে ব্যবহার করি, না থাকলে Isha→Fajr মধ্যবিন্দু ──
        const apiMid = pMin("Midnight");
        // midM may exceed 1440 if it crosses midnight calendar boundary
        let midM;
        if (apiMid !== null && apiMid !== undefined) {
          midM = apiMid < ishaM ? apiMid + 24*60 : apiMid;
        } else {
          midM = ishaM + Math.round(((fajrM + 24*60) - ishaM) / 2);
        }
        const effectiveMidM = midM % (24*60); // ঘড়ির মান (0-1439)

        // ── হারাম সময় ৩টি (ইসলামী ফিকহ অনুযায়ী) ─────────────────────────────
        // ১. সূর্যোদয়ের সময়: Sunrise → Sunrise+20min

        const ishraqM   = sunriseM + HARAM_SUNRISE_MINS;

        // ২. যাওয়াল (সূর্য ঠিক মাথার উপরে): Dhuhr-5min → Dhuhr
        const HARAM_ZAWAL_MINS = 5;
        const zawalM    = dhuhrM - HARAM_ZAWAL_MINS;

        const HARAM_GHUROOB_MINS = 20;
        const ghuroobM  = maghribM - HARAM_GHUROOB_MINS;

        // rem(targetM): targetM পর্যন্ত কত সেকেন্ড বাকি (midnight crossing handle করে)
        const rem = (targetM) => {

          if (diff < 0) diff += 24*60;
          return diff * 60 - nowS;
        };

        // ── Period detection (ক্রমানুসারে) ───────────────────────────────────

        if (nowM >= fajrM && nowM < sunriseM)
          return { label:"ফজর ওয়াক্ত",  type:"waqt",  color:["#a78bfa","#7c3aed"], remSec:rem(sunriseM),  next:"সূর্যোদয়" };

        // 2. হারাম সময় ১ — সূর্যোদয়: Sunrise → Sunrise+20min
        if (nowM >= sunriseM && nowM < ishraqM)
          return { label:"হারাম — সূর্যোদয়", type:"haram", color:["#f87171","#ef4444"], remSec:rem(ishraqM),  next:"ইশরাক" };

        // 3. ইশরাক/চাশত: Sunrise+20min → Zawal (ফরয ওয়াক্ত নেই, নফল হয়)
        if (nowM >= ishraqM && nowM < zawalM)
          return { label:"ইশরাক সময়",   type:"free",  color:["#fbbf24","#f59e0b"], remSec:rem(zawalM),    next:"যাওয়াল" };

        if (nowM >= zawalM && nowM < dhuhrM)
          return { label:"হারাম — যাওয়াল",  type:"haram", color:["#f87171","#ef4444"], remSec:rem(dhuhrM),    next:"যোহর" };

        // 6. আসর ওয়াক্ত: Asr → Ghuroob (সূর্যাস্তের ২০ মিনিট আগ পর্যন্ত)
        if (nowM >= asrM && nowM < ghuroobM)
          return { label:"আসর ওয়াক্ত",   type:"waqt",  color:["#fbbf24","#d97706"], remSec:rem(ghuroobM),  next:"সূর্যাস্ত" };

        if (nowM >= ghuroobM && nowM < maghribM)
          return { label:"হারাম — সূর্যাস্ত", type:"haram", color:["#f87171","#ef4444"], remSec:rem(maghribM), next:"মাগরিব" };

        // 8. মাগরিব ওয়াক্ত: Maghrib → Isha
        if (nowM >= maghribM && nowM < ishaM)
          return { label:"মাগরিব ওয়াক্ত", type:"waqt",  color:["#f97316","#ea580c"], remSec:rem(ishaM),     next:"ইশা" };

        // 9. ইশা ওয়াক্ত: Isha → Midnight (midnight crossing handle করে)
        const ishaToMid       = midM - ishaM;
        const elapsedFromIsha = nowM >= ishaM ? (nowM - ishaM) : (nowM + 24*60 - ishaM);
        if (elapsedFromIsha < ishaToMid)
          return { label:"ইশা ওয়াক্ত",    type:"waqt",  color:["#60a5fa","#2563eb"], remSec:rem(effectiveMidM), next:"তাহাজ্জুদ" };

        // 10. তাহাজ্জুদ সময়: Midnight → Fajr (রাতের শেষাংশ)
        return   { label:"তাহাজ্জুদ সময়", type:"free",  color:["#818cf8","#4f46e5"], remSec:rem(fajrM),     next:"ফজর" };
      };

      const fmt = (sec) => {

      const bottomText = isHaram

        // ── SmartPostVideo — নেটওয়ার্ক অনুযায়ী ভিডিও quality adjust করে ──────────
    const SmartPostVideo = ({ src }) => {

      // ── Cloudinary URL transformer ───────────────────────────────────────────
      const buildCldUrl = (url, qParam) => {
        try {
          const m = url.match(/^(https:\/\/res\.cloudinary\.com\/[^\/]+\/video\/upload\/)(.+)$/);
          if (!m) return url;
          return m[1] + qParam + ",f_auto/" + m[2];
        } catch(e) { return url; }
      };

      const buildPoster = (url) => {
        try {
          const m = url.match(/^(https:\/\/res\.cloudinary\.com\/[^\/]+\/video\/upload\/)(.+?)(\.[^.]+)?$/);
          if (!m) return null;
          return m[1] + "so_0,q_60,w_720,f_jpg/" + m[2] + ".jpg";
        } catch(e) { return null; }
      };

      const getQParam = () => {
        try {
          const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
          if (!conn) return "q_auto:low,w_720,c_limit";
          const et = conn.effectiveType || "";
          if (et === "slow-2g" || et === "2g") return "q_auto:low,w_480,c_limit,br_150";
          if (et === "3g")                      return "q_auto:low,w_720,c_limit,br_500";
          return "q_auto:low,w_720,c_limit";
        } catch(e) { return "q_auto:low,w_720,c_limit"; }

      useEffect(() => {

        const el = containerRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && phase === "idle") {
            const qp = getQParam();
            const vUrl = buildCldUrl(src, qp);

            setQualityUrl(vUrl);
            setPosterUrl(pUrl);
            setPhase("thumb");   // thumbnail দেখানো শুরু

      const onPlaying  = () => setLoading(false);

              display:"flex",flexDirection:"column",alignItems:"center",
              justifyContent:"center",background:"rgba(0,0,0,.75)",gap:10}}>
              <span style={{fontSize:28}}>⚠️</span>
              <p style={{fontSize:12,color:"rgba(255,255,255,.7)",fontFamily:"'Exo 2',sans-serif"}}>

              cursor:isDragging?"grabbing":"grab",
              userSelect:"none",
              touchAction:"none",
              transition:isDragging?"none":"box-shadow .2s",
            }}
          >
            <div style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,rgba(168,85,247,.6),rgba(0,212,255,.3))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,border:"2px solid rgba(168,85,247,.4)",flexShrink:0}}>
                📹
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:11,color:"white",fontFamily:"'Exo 2',sans-serif",fontWeight:700}}>গ্রুপ কল</p>
                <p style={{fontSize:10,color:isActive?"var(--green)":"var(--text2)",fontFamily:"'Exo 2',sans-serif",marginTop:1}}>
                  {isActive?`👥 ${pCount} জন • ${fmtTime(sec)}`:"সংযুক্ত হচ্ছে..."}
                </p>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px 8px",background:"rgba(255,255,255,.04)",borderTop:"1px solid rgba(255,255,255,.07)"}}>
              <button
                onClick={(e)=>{e.stopPropagation();onMaximize();}}
                title="বড় করুন"
                style={{background:"rgba(168,85,247,.15)",border:"1px solid rgba(168,85,247,.35)",borderRadius:10,padding:"5px 9px",cursor:"pointer",color:"var(--purple2)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:4}}
              >
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                খুলুন
              </button>
              <button
                onClick={(e)=>{e.stopPropagation();onEndCall();}}
                title="কল শেষ করুন"
                style={{background:"rgba(255,59,92,.2)",border:"1px solid rgba(255,59,92,.5)",borderRadius:10,padding:"5px 8px",cursor:"pointer",color:"var(--red)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:4}}
              >
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 0110 17M8.71 7.05L7.83 6.17a2 2 0 00-2.11-.45A2 2 0 004 3.72V4a2 2 0 00-2 2"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
                ছাড়ুন
              </button>
            </div>
          </div>
        );
      }

      return(
        <div
          ref={dragRef}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          style={{
            position:"fixed",
            left:pos.x,
            top:pos.y,
            width:195,
            zIndex:99999,
            borderRadius:18,
            overflow:"hidden",
            boxShadow:"0 8px 32px rgba(0,0,0,.7),0 0 0 1.5px rgba(0,212,255,.35)",
            background:"linear-gradient(135deg,#0d0d25,#050508)",
            cursor:isDragging?"grabbing":"grab",
            userSelect:"none",
            touchAction:"none",
            transition:isDragging?"none":"box-shadow .2s",
          }}
        >
          {/* ── Mini mode: সবসময় audio-style UI দেখাও (ভিডিও লুকানো) ── */}
          {/* Audio track active থাকে, শুধু video element render হয় না */}
          {/* অপর প্রান্তের user সম্পূর্ণ স্বাভাবিক থাকবে */}
          <div style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{position:"relative",flexShrink:0}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,rgba(0,212,255,.5),rgba(124,58,237,.5))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:"2px solid rgba(0,212,255,.35)",overflow:"hidden"}}>
                {contact.photo?<img src={contact.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:contact.emoji||"👤"}
              </div>
              {/* ভিডিও কল আইকন — ছোট badge */}
              <div style={{position:"absolute",bottom:-2,right:-2,background:"rgba(0,212,255,.85)",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M15 10l4.553-2.069A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
              </div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:11,color:"white",fontFamily:"'Exo 2',sans-serif",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{contact.name}</p>
              <p style={{fontSize:10,color:isActive?"var(--green)":"var(--text2)",fontFamily:"'Exo 2',sans-serif",marginTop:1,display:"flex",alignItems:"center",gap:3}}>
                {isActive?(
                  <>{fmtTime(sec)} <span style={{color:"rgba(255,255,255,.4)",fontSize:9}}>• 🔇 ভিডিও বন্ধ</span></>
                ):status==="ringing"?"রিং হচ্ছে...":"সংযুক্ত হচ্ছে..."}
              </p>
            </div>
          </div>
          {/* ── Controls ── */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px 8px",background:"rgba(255,255,255,.04)",borderTop:"1px solid rgba(255,255,255,.07)"}}>
            <button
              onClick={(e)=>{e.stopPropagation();onMaximize();}}
              title="বড় করুন"
              style={{background:"rgba(0,212,255,.15)",border:"1px solid rgba(0,212,255,.35)",borderRadius:10,padding:"5px 9px",cursor:"pointer",color:"var(--blue)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:4}}
            >
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
              খুলুন
            </button>
            <button
              onClick={(e)=>{e.stopPropagation();onEndCall();}}
              title="কল শেষ করুন"
              style={{background:"rgba(255,59,92,.2)",border:"1px solid rgba(255,59,92,.5)",borderRadius:10,padding:"5px 8px",cursor:"pointer",color:"var(--red)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:4}}
            >
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 0110 17M8.71 7.05L7.83 6.17a2 2 0 00-2.11-.45A2 2 0 004 3.72V4a2 2 0 00-2 2"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
              কাটুন
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [screen, setScreen] = useState("loading");
      const [contact, setContact] = useState(null);
      const [callConfig, setCallConfig] = useState(null);
      const [groupCallConfig, setGroupCallConfig] = useState(null);
      const [activeGroup, setActiveGroup] = useState(null);
      const [incomingCall, setIncomingCall] = useState(null);
      const [incomingGroupCall, setIncomingGroupCall] = useState(null);
      const [reqCount, setReqCount] = useState(0);
      const [msgTab, setMsgTab] = useState("chats"); // "chats" | "people"
      const [viewedProfileUid, setViewedProfileUid] = useState(null);
      const [profilePrevScreen, setProfilePrevScreen] = useState("messages");
      const handleViewProfile = (uid, from="messages") => { setViewedProfileUid(uid); setProfilePrevScreen(from); setScreen("profile"); };
      const [appFriendPostBadge, setAppFriendPostBadge] = useState(0);
      const [pendingPostId, setPendingPostId] = useState(()=>{
        const params=new URLSearchParams(window.location.search);
        return params.get("post")||null;
      });
      // ── Notification থেকে অ্যাপ খুললে pending call state ─────────────────────
      const [pendingNotifCall, setPendingNotifCall] = useState(()=>{
        const p=new URLSearchParams(window.location.search);
        if(p.get("vc_action")==="accept" && p.get("vc_callId")){
          return {
            callId:      p.get("vc_callId"),
            type:        p.get("vc_type")||"audio",
            callerUid:   p.get("vc_callerUid")||"",
            callerName:  decodeURIComponent(p.get("vc_callerName")||""),
            callerEmoji: decodeURIComponent(p.get("vc_callerEmoji")||"😊"),
            callerPhoto: decodeURIComponent(p.get("vc_callerPhoto")||""),
          };
        }
        return window.__vcPendingCall||null;
      });

      // PiP (Picture-in-Picture) floating call state
      const [pipCall, setPipCall] = useState(null);
      const pipTimerRef = useRef(null);
      // screen এর সর্বশেষ মান ref-এ রাখি — listener closure stale হলেও সঠিক মান পাওয়া যাবে
      const screenRef = useRef(screen);
      useEffect(()=>{ screenRef.current = screen; }, [screen]);

      // ── Back Button Behavior ─────────────────────────────────────────────────
      const backPressCountRef = useRef(0);
      const backToastTimerRef = useRef(null);
      const [showBackToast, setShowBackToast] = useState(false);
      const CALL_SCREENS = ["video","audio","group"];

      useEffect(()=>{
        const handlePopState = (e) => {
          // Always push a new state so back button is always catchable
          window.history.pushState(null,"",window.location.pathname);

          const cur = screenRef.current;

          // ১. Call Screen এ থাকলে — minimize করো, call কাটো না
          if(CALL_SCREENS.includes(cur)){
            // Floating UI তে minimize করার event fire করো
            window.dispatchEvent(new CustomEvent("vc:minimize_call"));
            return;
          }

          // ২. Home screen এ থাকলে — double back to exit
          if(cur==="home"){
            if(backPressCountRef.current===1){
              // দ্বিতীয়বার — app exit
              clearTimeout(backToastTimerRef.current);
              setShowBackToast(false);
              backPressCountRef.current=0;
              if(navigator.app && navigator.app.exitApp) navigator.app.exitApp();
              else window.close();
              return;
            }
            backPressCountRef.current=1;
            setShowBackToast(true);
            backToastTimerRef.current=setTimeout(()=>{
              backPressCountRef.current=0;
              setShowBackToast(false);
            },2000);
            return;
          }

          // ৩. অন্য screen এ থাকলে — Home এ নিয়ে যাও
          setScreen("home");
        };

        window.history.pushState(null,"",window.location.pathname);
        window.addEventListener("popstate", handlePopState);
        return()=>{
          window.removeEventListener("popstate", handlePopState);
          clearTimeout(backToastTimerRef.current);
        };
      },[]);

      // ── Notification tap → call accept (অ্যাপ বন্ধ থেকে খুললে) ───────────────
      useEffect(()=>{
        if(!pendingNotifCall||!user) return;
        const c=pendingNotifCall;
        setPendingNotifCall(null);
        window.__vcPendingCall=null;
        window.history.replaceState({},"",window.location.pathname);
        // incomingCall node মুছে ফেলো (UI flicker এড়াতে)
        db.ref(`/users/${user.uid}/incomingCall`).remove();
        setContact({uid:c.callerUid,name:c.callerName,emoji:c.callerEmoji,photo:c.callerPhoto||null});
        setCallConfig({callId:c.callId,isCaller:false,type:c.type});
        setIncomingCall(null);
        setScreen(c.type);
      },[pendingNotifCall,user]);

      // ── SW postMessage → call accept (অ্যাপ background-এ থাকলে) ──────────────
      useEffect(()=>{
        const handler=(event)=>{
          const d=event.detail;
          if(!d||!user) return;
          stopRing();
          db.ref(`/users/${user.uid}/incomingCall`).remove();
          setContact({uid:d.callerUid,name:d.callerName,emoji:d.callerEmoji,photo:d.callerPhoto||null});
          setCallConfig({callId:d.callId,isCaller:false,type:d.type});
          setIncomingCall(null);
          setScreen(d.type);
        };
        window.addEventListener("vc:accept_call",handler);
        return()=>window.removeEventListener("vc:accept_call",handler);
      },[user]);

      // ── Native Android Notification → call accept (Capacitor) ─────────────
      // Notification এর "ধরুন" বোতাম চাপলে MainActivity JS এ এই event পাঠায়
      useEffect(()=>{
        if(!window.__isCapacitor) return;
        const nativeHandler=(event)=>{
          const d=event.detail;
          if(!d||!user) return;
          stopRing();
          // incomingCall node মুছে ফেলো
          db.ref(`/users/${user.uid}/incomingCall`).remove();
          // Firebase থেকে call data নিয়ে call screen খোলো
          db.ref(`/calls/${d.callId}`).once("value", snap=>{
            const callData=snap.val();
            if(!callData) return;
            setContact({
              uid:   callData.callerUid,
              name:  callData.callerName  || d.callerUid,
              emoji: callData.callerEmoji || "😊",
              photo: callData.callerPhoto || null
            });
            setCallConfig({callId:d.callId, isCaller:false, type:d.mediaType||callData.type||"audio"});
            setIncomingCall(null);
            setScreen(d.mediaType||callData.type||"audio");
          });
        };
        window.addEventListener("nexora:accept_call", nativeHandler);
        return()=>window.removeEventListener("nexora:accept_call", nativeHandler);
      },[user]);

      // ── SW auth token 50 মিনিট পর পর refresh করো ───────────────────────────
      useEffect(()=>{
        if(!user?.uid) return;
        const interval=setInterval(()=>refreshSWAuthToken(user.uid), 50*60*1000);
        return()=>clearInterval(interval);
      },[user?.uid]);
      // গ্রুপ কল session check এর জন্য currently-processing roomId ট্র্যাক করি
      const processingGroupCallRef = useRef(null);

      // PiP timer: sec বাড়াতে থাকে যখন কল minimize করা থাকে
      useEffect(()=>{
        if(pipCall&&pipCall.status==="active"){
          pipTimerRef.current=setInterval(()=>{
            setPipCall(prev=>prev?({...prev,sec:(prev.sec||0)+1}):null);
          },1000);
        }else{
          clearInterval(pipTimerRef.current);
        }
        return()=>clearInterval(pipTimerRef.current);
      },[pipCall?.status,!!pipCall]);

      // PiP এ থাকা অবস্থায় অপর পক্ষ কল শেষ করলে PiP বন্ধ করো
      useEffect(()=>{
        // 1:1 call ended remotely
        if(pipCall?.callConfig?.callId){
          const r=db.ref(`/calls/${pipCall.callConfig.callId}/status`);
          r.on("value",s=>{
            const v=s.val();
            if((v==="ended"||v==="rejected")&&pipCall&&!pipCall.destroyedRef?.current){
              if(pipCall.destroyedRef)pipCall.destroyedRef.current=true;
              clearInterval(pipTimerRef.current);
              setPipCall(null);
            }
          });
          return()=>r.off();
        }
        // Group call: monitor room session — if our session disappears, clear PiP
        if(pipCall?.type==="group"&&pipCall?.roomDisplayId){
          const roomId=pipCall.roomDisplayId;
          const r=db.ref(`/groupCallSessions/${roomId}`);
          r.on("value",s=>{
            if(!s.exists()&&pipCall&&!pipCall.destroyedRef?.current){
              if(pipCall.destroyedRef)pipCall.destroyedRef.current=true;
              clearInterval(pipTimerRef.current);
              setPipCall(null);
            }
          });
          return()=>r.off();
        }
      },[pipCall?.callConfig?.callId,pipCall?.type,pipCall?.roomDisplayId]);

      useEffect(()=>{
        const style=document.createElement("style");
        style.textContent=GLOBAL_CSS;
        document.head.appendChild(style);
        return()=>{document.head.removeChild(style);};
      },[]);

      // Note: getRedirectResult() is handled inside LoginScreen — no duplicate call here

      useEffect(()=>{
        // Safety timeout: if auth doesn't resolve in 4s, go to login
        const authTimeout = setTimeout(()=>{
          if(screen==="loading"){setScreen("login");}
        }, 4000);

        const unsub=auth.onAuthStateChanged(async fbUser=>{
          clearTimeout(authTimeout);
          if(fbUser){
            // Set user immediately from Firebase Auth (no DB wait)
            const emoji=getEmoji(fbUser.uid);
            const userData={uid:fbUser.uid,email:fbUser.email,name:fbUser.displayName||fbUser.email.split("@")[0],emoji,photo:fbUser.photoURL||null,isAdmin:isAdminUser(fbUser.email)};
            setUser(userData);
            const params=new URLSearchParams(window.location.search);
            const postParam=params.get("post");
            const profileParam=params.get("profile");
            if(postParam){setPendingPostId(postParam);setScreen("feed");}
            else if(profileParam){setViewedProfileUid(profileParam);setProfilePrevScreen("home");setScreen("profile");}
            else{setScreen("home");}
            setupPresence(fbUser.uid);
            requestNotifPermission(fbUser.uid);
            requestMediaPermissions();

            // keepSynced: শুধু জরুরি paths-এ — /users বাদ দেওয়া হয়েছে
            // /users keepSynced(true) মানে সব user data সবসময় sync — free tier-এ অনেক বেশি read খায়
            try {
              db.ref("/presence").keepSynced(true);
              db.ref(`/friends/${fbUser.uid}`).keepSynced(true);
              db.ref(`/userConvs/${fbUser.uid}`).keepSynced(true);
              db.ref(`/notifications/${fbUser.uid}`).keepSynced(true);
            } catch(e) {}

            // DB read/write in background (non-blocking)
            db.ref(`/users/${fbUser.uid}`).get().then(snap=>{
              const existing=snap.val()||{};
              if(existing.banned){auth.signOut();setUser(null);setScreen("login");return;}
              if(existing.forceLogout&&Date.now()-existing.forceLogout<10000){auth.signOut();setUser(null);setScreen("login");return;}
              const mergedEmoji=existing.emoji||emoji;
              const mergedPhoto=existing.photo||fbUser.photoURL||null;
              const mergedName=existing.name||fbUser.displayName||fbUser.email.split("@")[0];
              const merged={...userData,emoji:mergedEmoji,photo:mergedPhoto,name:mergedName};
              setUser(merged);
              // Use update() for both new & existing users — atomic, safe for concurrent logins
              const writeData={uid:fbUser.uid,name:mergedName,email:fbUser.email,photo:mergedPhoto,emoji:mergedEmoji,isAdmin:merged.isAdmin};
              if(!existing.uid) writeData.createdAt=firebase.database.ServerValue.TIMESTAMP;
              db.ref(`/users/${fbUser.uid}`).update(writeData);
            }).catch(e=>console.warn("Background DB read error:",e));

            // Real-time listener: photo/name/emoji বদলালে user state তাৎক্ষণিক update
            const userRef = db.ref(`/users/${fbUser.uid}`);
            userRef.on("value", snap=>{
              const d = snap.val();
              if(d) setUser(prev=>prev?({...prev, photo:d.photo||prev.photo, name:d.name||prev.name, emoji:d.emoji||prev.emoji}):prev);
            });
          }else{
            setUser(null);setScreen("login");
          }
        });
        return()=>{clearTimeout(authTimeout);unsub();};
      },[]);

      useEffect(()=>{
        if(!user?.uid)return;
        const r=db.ref(`/users/${user.uid}/incomingCall`);
        r.on("value",s=>{
          const d=s.val();
          if(d&&d.callId){if(screen!=="video"&&screen!=="audio")setIncomingCall(d);}
          else setIncomingCall(null);
        });
        return()=>r.off();
      },[user?.uid,screen]);

      useEffect(()=>{
        if(!user?.uid)return;
        const uid=user.uid;
        const r=db.ref(`/users/${uid}/incomingGroupCall`);

        r.on("value",async s=>{
          const d=s.val();

          // ডেটা null মানে কল শেষ বা reject — state clear করো
          if(!d||!d.roomId){
            setIncomingGroupCall(null);
            processingGroupCallRef.current=null;
            return;
          }

          // গ্রুপ কল screen-এ থাকলে নতুন incoming modal দেখানোর দরকার নেই
          // কিন্তু delete করব না — শুধু skip করব
          if(screenRef.current==="group") return;

          // ১. Stale check: ৬০ সেকেন্ডের বেশি পুরনো হলে মুছে ফেলো
          const now=Date.now();
          const ts=typeof d.ts==='number'?d.ts:0;
          if(ts>0&&now-ts>60000){
            db.ref(`/users/${uid}/incomingGroupCall`).remove();
            return;
          }

          // ২. Session check: race condition এড়াতে retry করো
          // Caller আগে notification পাঠায়, তারপর session set করে —
          // তাই প্রথমবার empty হলে কিছুক্ষণ অপেক্ষা করে আবার check করো
          const thisRoomId=d.roomId;
          processingGroupCallRef.current=thisRoomId;

          let sessionData=null;
          try{
            const snap=await db.ref(`/groupCallSessions/${thisRoomId}`).get();
            sessionData=snap.val();
          }catch(e){}

          if(!sessionData||Object.keys(sessionData).length===0){
            // Session এখনো তৈরি হয়নি — সর্বোচ্চ ৫ সেকেন্ড retry করো
            let retryCount=0;
            const maxRetries=5;
            while(retryCount<maxRetries){
              await new Promise(res=>setTimeout(res,1000));
              // এই সময়ে যদি notification মুছে যায় বা অন্য কল আসে — বাদ দাও
              if(processingGroupCallRef.current!==thisRoomId) return;
              try{
                const retrySnap=await db.ref(`/groupCallSessions/${thisRoomId}`).get();
                sessionData=retrySnap.val();
              }catch(e){}
              if(sessionData&&Object.keys(sessionData).length>0) break;
              retryCount++;
            }
            // সব retry শেষেও session নেই → কল সত্যিই শেষ, notification মুছে ফেলো
            if(!sessionData||Object.keys(sessionData).length===0){
              db.ref(`/users/${uid}/incomingGroupCall`).remove();
              return;
            }
          }

          // আরেকবার check — এই async অপেক্ষার মাঝে state বদলে গেলে
          if(processingGroupCallRef.current!==thisRoomId) return;
          if(screenRef.current==="group") return;

          setIncomingGroupCall(d);
        });

        return()=>{
          r.off();
          processingGroupCallRef.current=null;
        };
      },[user?.uid]); // শুধু user.uid — screen ref দিয়ে পড়া হচ্ছে, dependency নয়

      const prevReqCountRef=useRef(0);
      useEffect(()=>{
        if(!user?.uid)return;
        const r=db.ref(`/friendRequests/${user.uid}`);
        r.on("value",s=>{
          const d=s.val()||{};
          const count=Object.values(d).filter(r=>r.status==="pending").length;
          setReqCount(count);
          if(count>prevReqCountRef.current){
            const newReqs=Object.values(d).filter(r=>r.status==="pending");
            const latest=newReqs[newReqs.length-1];
            showBrowserNotif("🤝 নতুন ফ্রেন্ড রিকোয়েস্ট",`${latest?.name||"কেউ"} আপনাকে বন্ধুত্বের অনুরোধ পাঠিয়েছে`,"vc-friend-req");
          }
          prevReqCountRef.current=count;
        });
        return()=>r.off();
      },[user?.uid]);

      useEffect(()=>{
        if(!user?.uid)return;
        const r=db.ref(`/notifications/${user.uid}/friendPost`);
        r.on("value",s=>{
          setAppFriendPostBadge(s.val()||0);
        });
        return()=>r.off();
      },[user?.uid]);

      useEffect(()=>{
        if(incomingCall){
          if(incomingCall.type==="group")playGroupCallBeep();
          else playRingTone();
          showBrowserNotif(`📞 ইনকামিং কল`,`${incomingCall.callerName} কল করছে…`,"vc-call");
        }else{stopRing();}
        return()=>stopRing();
      },[incomingCall]);

      useEffect(()=>{
        if(incomingGroupCall){
          playGroupCallBeep();
          showBrowserNotif(`📹 গ্রুপ কল`,`${incomingGroupCall.callerName} গ্রুপ কল শুরু করেছে`,"vc-group-call");
        }else{stopRing();}
      },[incomingGroupCall]);

      const acceptGroupCall=async()=>{
        if(!incomingGroupCall)return;
        // Race condition fix: data আগে capture করো, state আগে set করো
        const groupData = {
          roomId: incomingGroupCall.roomId,
          callType: incomingGroupCall.callType,
        };
        stopRing();
        processingGroupCallRef.current=null;
        // সব state এক batch এ — await এর আগে
        setIncomingGroupCall(null);
        setGroupCallConfig({roomId:groupData.roomId,callType:groupData.callType});
        setScreen("group");
        try{ await db.ref(`/users/${user.uid}/incomingGroupCall`).remove(); }catch(e){}
      };
      const rejectGroupCall=async()=>{
        stopRing();
        processingGroupCallRef.current=null; // async processing বাতিল করো
        await db.ref(`/users/${user.uid}/incomingGroupCall`).remove();
        setIncomingGroupCall(null);
      };
      const acceptCall=async()=>{
        if(!incomingCall)return;
        // ── Race condition fix ──────────────────────────────────────────
        // await এর আগেই সব data capture করো এবং state set করো।
        // আগে await db.ref().remove() দেওয়া হলে Firebase listener
        // setIncomingCall(null) ডাকে — তারপর আমাদের setContact/setCallConfig
        // আলাদা render cycle এ পড়ে এবং screen==="video" কিন্তু contact===null
        // হয়ে যায় → সাদা স্ক্রিন। সমাধান: state আগে set করো, remove পরে।
        const callData = {
          callerUid: incomingCall.callerUid,
          callerName: incomingCall.callerName,
          callerEmoji: incomingCall.callerEmoji,
          callerPhoto: incomingCall.callerPhoto||null,
          callId: incomingCall.callId,
          type: incomingCall.type,
        };
        stopRing();
        // সব state এক batch এ — কোনো await নেই মাঝখানে
        setIncomingCall(null);
        setContact({uid:callData.callerUid,name:callData.callerName,emoji:callData.callerEmoji,photo:callData.callerPhoto});
        setCallConfig({callId:callData.callId,isCaller:false,type:callData.type});
        setScreen(callData.type);
        // Firebase remove টা async এ — state transition এর পরে হলেও সমস্যা নেই
        try{ await db.ref(`/users/${user.uid}/incomingCall`).remove(); }catch(e){}
      };
      const rejectCall=async()=>{
        if(!incomingCall)return;
        stopRing();
        await db.ref(`/users/${user.uid}/incomingCall`).remove();
        await db.ref(`/calls/${incomingCall.callId}/status`).set("rejected");
        setIncomingCall(null);
      };
      const logout=async()=>{
        if(user?.uid){
          db.ref(`/presence/${user.uid}`).set({online:false,lastSeen:firebase.database.ServerValue.TIMESTAMP});
          db.ref(`/users/${user.uid}/incomingCall`).remove();
          db.ref(`/users/${user.uid}/incomingGroupCall`).remove();
          // logout-এ FCM token মুছে ফেলো (যাতে অন্যের কল না আসে)
          db.ref(`/users/${user.uid}/fcmToken`).remove();
        }
        // SW-কে logout জানাও
        try {
          if(navigator.serviceWorker) {
            const regs = await navigator.serviceWorker.getRegistrations();
            regs.forEach(r=>{ if(r.active) r.active.postMessage({type:"VC_SW_LOGOUT"}); });
          }
        } catch(e) {}
        presenceSetup=false;
        await auth.signOut();
      };

      const noNav=["login","video","audio","group","groupchat","loading","admin","chat","profile"].includes(screen);

      const bgUpload = useBgUpload();
      const { canInstall, triggerInstall } = usePWAInstall();

      if(screen==="loading")return(
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
          <div style={{textAlign:"center"}}>
            <div style={{width:72,height:72,borderRadius:22,margin:"0 auto 16px",background:"linear-gradient(135deg,var(--purple),var(--blue))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,boxShadow:"0 0 40px rgba(124,58,237,.5)"}}>📹</div>
            <Spinner size={36}/>
            <p style={{color:"var(--text2)",marginTop:16,fontFamily:"Orbitron",fontSize:12,letterSpacing:2}}>LOADING...</p>
          </div>
        </div>
      );

      return(
        <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",position:"relative",background:"var(--bg)"}}>
          {/* ── Global Background Upload Floating Bar ────────────────── */}
          {bgUpload && (
            <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,zIndex:9999,background:"rgba(5,5,8,.97)",backdropFilter:"blur(16px)",borderBottom:"2px solid rgba(168,85,247,.5)",padding:"8px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 20px rgba(0,0,0,.6)"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:11,color:"var(--purple2)",fontFamily:"'Exo 2',sans-serif",fontWeight:700}}>📤 ভিডিও আপলোড চলছে…</span>
                  <span style={{fontSize:12,color:"white",fontWeight:700}}>{bgUpload.progress}%</span>
                </div>
                <div style={{height:5,background:"rgba(255,255,255,.1)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{width:`${bgUpload.progress}%`,height:"100%",background:"linear-gradient(90deg,var(--purple),var(--blue))",transition:"width .4s ease",borderRadius:3}}/>
                </div>
                <p style={{fontSize:9,color:"var(--text2)",marginTop:3}}>অনুগ্রহ করে অপেক্ষা করুন — এই স্ক্রিন বন্ধ করলেও আপলোড চলবে</p>
              </div>
              <button onClick={()=>{bgUpload.cancel&&bgUpload.cancel();setBgUpload(null);}} style={{background:"rgba(255,59,92,.15)",border:"1px solid rgba(255,59,92,.35)",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"var(--red)",fontSize:12,fontFamily:"'Exo 2',sans-serif",fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>বাতিল</button>
            </div>
          )}
          {screen==="login"     &&<LoginScreen/>}
          {screen==="home"      &&<HomeScreen     user={user} setScreen={setScreen} setContact={setContact} setCallConfig={setCallConfig} reqCount={reqCount} setMsgTab={setMsgTab} friendPostBadge={appFriendPostBadge} onViewProfile={handleViewProfile}/>}
          {screen==="feed"      &&<FeedScreen     user={user} pendingPostId={pendingPostId} onPostIdConsumed={()=>{setPendingPostId(null);window.history.replaceState({},"",window.location.pathname);}} onViewProfile={handleViewProfile}/>}
          {screen==="messages"  &&<MessagesScreen user={user} setScreen={setScreen} setContact={setContact} defaultTab={msgTab} onTabReset={()=>setMsgTab("chats")} onViewProfile={handleViewProfile}/>}
          {screen==="chat"      &&contact&&<ChatScreen user={user} contact={contact} setScreen={setScreen} setCallConfig={setCallConfig}/>}
          {screen==="video"&&contact&&callConfig&&<VideoCallScreen
            user={user} contact={contact} callConfig={callConfig}
            setScreen={(s)=>{
              // কল screen থেকে বের হলে (endCall বা error) pipCall clear করি
              if(s!=="video"&&pipCall&&pipCall.type==="video")setPipCall(null);
              setScreen(s);
            }}
            onMinimize={(pipData)=>{setPipCall({...pipData,sec:pipData.sec||0});setScreen("home");}}
            pipState={pipCall&&pipCall.type==="video"&&pipCall.callConfig?.callId===callConfig?.callId?pipCall:null}
          />}
          {screen==="audio"&&contact&&callConfig&&<AudioCallScreen
            user={user} contact={contact} callConfig={callConfig}
            setScreen={(s)=>{
              if(s!=="audio"&&pipCall&&pipCall.type==="audio")setPipCall(null);
              setScreen(s);
            }}
            onMinimize={(pipData)=>{setPipCall({...pipData,sec:pipData.sec||0});setScreen("home");}}
            pipState={pipCall&&pipCall.type==="audio"&&pipCall.callConfig?.callId===callConfig?.callId?pipCall:null}
          />}
          {screen==="group"     &&<GroupCallScreen user={user} setScreen={(s)=>{if(s!=="group"&&pipCall&&pipCall.type==="group")setPipCall(null);setScreen(s);}} callConfig={groupCallConfig} onMinimize={(pipData)=>{setPipCall({...pipData,sec:pipData.sec||0});setScreen("home");}} pipState={pipCall&&pipCall.type==="group"?pipCall:null}/>}
          {screen==="groups"    &&<GroupsScreen   user={user} setScreen={setScreen} setActiveGroup={setActiveGroup}/>}
          {screen==="groupchat" &&activeGroup&&<GroupChatScreen user={user} group={activeGroup} setScreen={setScreen} setActiveGroup={setActiveGroup} setGroupCallConfig={setGroupCallConfig}/>}
          {screen==="settings"  &&<SettingsScreen user={user} setUser={setUser} onLogout={logout}/>}
          {screen==="profile"   &&viewedProfileUid&&<ProfileScreen profileUid={viewedProfileUid} currentUser={user} setScreen={setScreen} setContact={setContact} prevScreen={profilePrevScreen}/>}
          {screen==="admin"     &&user?.isAdmin&&<AdminScreen user={user} setScreen={setScreen}/>}
          {!noNav&&<BottomNav screen={screen} setScreen={setScreen} reqCount={reqCount} isAdmin={user?.isAdmin}/>}
          {incomingCall&&screen!=="video"&&screen!=="audio"&&<IncomingCallModal call={incomingCall} user={user} onAccept={acceptCall} onReject={rejectCall}/>}
          {incomingGroupCall&&screen!=="group"&&<IncomingGroupCallModal call={incomingGroupCall} onAccept={acceptGroupCall} onReject={rejectGroupCall}/>}
          {/* ── PiP Floating Call Window ─────────────────────────────── */}
          {/* ── PWA Install Banner ───────────────────────────────────── */}
          {canInstall&&screen!=="loading"&&screen!=="video"&&screen!=="audio"&&screen!=="group"&&(
            <div style={{position:"fixed",bottom:noNav?16:80,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:440,zIndex:9998,background:"linear-gradient(135deg,rgba(124,58,237,.97),rgba(0,212,255,.95))",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.15)"}}>
              <div style={{width:40,height:40,borderRadius:12,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📲</div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:13,fontWeight:700,color:"white",fontFamily:"'Exo 2',sans-serif"}}>NEXORA ইনস্টল করুন</p>
                <p style={{fontSize:11,color:"rgba(255,255,255,.8)",marginTop:1}}>হোম স্ক্রিনে যোগ করুন — অফলাইনেও কাজ করবে</p>
              </div>
              <button onClick={triggerInstall} style={{background:"white",border:"none",borderRadius:10,padding:"8px 14px",cursor:"pointer",color:"#7c3aed",fontFamily:"'Exo 2',sans-serif",fontWeight:800,fontSize:13,flexShrink:0,whiteSpace:"nowrap"}}>ইনস্টল</button>
            </div>
          )}
          {pipCall&&screen!=="video"&&screen!=="audio"&&screen!=="group"&&(
            <FloatingCallWindow
              pipCall={pipCall}
              onMaximize={()=>{
                clearInterval(pipTimerRef.current);
                setScreen(pipCall.type);
              }}
              onEndCall={()=>{
                if(pipCall.endCallFn)pipCall.endCallFn();
                if(pipCall.destroyedRef)pipCall.destroyedRef.current=true;
                clearInterval(pipTimerRef.current);
                setPipCall(null);
              }}
            />
          )}
          {showBackToast&&(
            <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:"rgba(30,30,40,.95)",backdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:"12px 22px",color:"white",fontSize:13,fontFamily:"'Exo 2',sans-serif",fontWeight:600,zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>
              আরেকবার চাপলে অ্যাপ বন্ধ হবে
            </div>
          )}
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
