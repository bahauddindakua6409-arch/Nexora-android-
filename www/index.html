:root{--bg:#050508;--bg2:#0d0d18;--blue:#00d4ff;--purple:#7c3aed;--purple2:#a855f7;
  --green:#10ffb0;--red:#ff3b5c;--amber:#ff9f43;--text:#e2e8f0;--text2:#94a3b8;
  --glass:rgba(255,255,255,0.055);--gb:rgba(255,255,255,0.09);
  --glow-b:0 0 22px rgba(0,212,255,.45);--glow-p:0 0 22px rgba(168,85,247,.45);
  --glow-g:0 0 22px rgba(16,255,176,.45);--glow-r:0 0 28px rgba(255,59,92,.5);}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.9);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 15px rgba(0,212,255,.35)}50%{box-shadow:0 0 38px rgba(0,212,255,.8),0 0 65px rgba(0,212,255,.25)}}
@keyframes slide-up{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes typing-dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes wave{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1.55)}}
@keyframes neon-flicker{0%,94%,100%{opacity:1}95%,97%{opacity:.65}}
@keyframes ring-in{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--gb);border-radius:16px;}
input,textarea{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--gb);border-radius:12px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 14px rgba(0,212,255,.22);}
input::placeholder,textarea::placeholder{color:var(--text2);}
textarea{resize:none;}
.msg-bubble{display:inline-block;max-width:100%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;margin-bottom:3px;animation:slide-up .18s ease;word-break:break-word;white-space:pre-wrap;}
.msg-sent{background:linear-gradient(135deg,rgba(124,58,237,.6),rgba(0,212,255,.28));border:1px solid rgba(0,212,255,.2);margin-left:auto;border-bottom-right-radius:4px;}
.msg-recv{background:var(--glass);border:1px solid var(--gb);border-bottom-left-radius:4px;}
.call-btn{width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(14px);}
.call-btn:active{transform:scale(.88);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Exo 2',sans-serif;font-size:10px;font-weight:500;transition:all .2s;letter-spacing:.4px;}
.nav-btn.active{color:var(--blue);}
.nav-btn.active svg{filter:drop-shadow(0 0 6px var(--blue));}
video{background:#000;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:2px;}
.post-card{background:var(--glass);border:1px solid var(--gb);border-radius:18px;overflow:hidden;margin-bottom:14px;animation:slide-up .3s ease;}
.react-btn{padding:7px 12px;border-radius:22px;border:1px solid var(--gb);background:rgba(255,255,255,.04);cursor:pointer;font-size:13px;color:var(--text2);font-family:'Exo 2',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px;font-weight:600;}
.react-btn:hover{background:rgba(255,255,255,.1);}
.react-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(0,212,255,.12);}
.reaction-popup{position:absolute;bottom:calc(100% + 10px);left:-4px;background:var(--bg2);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:8px 12px;display:flex;gap:4px;z-index:300;box-shadow:0 12px 36px rgba(0,0,0,.7),0 0 20px rgba(0,212,255,.1);animation:slide-up .18s ease;}
.r-emoji{font-size:24px;cursor:pointer;transition:transform .18s,filter .18s;padding:3px 4px;border-radius:50%;line-height:1;}
.r-emoji:hover{transform:scale(1.5) translateY(-5px);filter:drop-shadow(0 0 8px rgba(255,255,255,.5));}
.r-emoji:active{transform:scale(1.2);}
@keyframes pop-in{0%{transform:scale(0.4);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.reaction-badge{display:inline-flex;align-items:center;gap:2px;background:rgba(255,255,255,.06);border:1px solid var(--gb);border-radius:30px;padding:2px 8px 2px 4px;font-size:11px;}
.popular-label{background:linear-gradient(135deg,rgba(255,159,67,.2),rgba(255,59,92,.1));border:1px solid rgba(255,159,67,.35);border-radius:8px;padding:2px 8px;font-size:10px;color:var(--amber);font-weight:700;font-family:'Exo 2',sans-serif;}
.net-badge{position:fixed;top:8px;right:8px;z-index:9999;padding:3px 8px;border-radius:8px;font-size:10px;font-family:'Exo 2',sans-serif;font-weight:700;letter-spacing:.5px;}
    `;

    const Ic = ({ n, s=20, c="currentColor" }) => {
      const p={fill:"none",stroke:c,strokeWidth:"2",width:s,height:s,viewBox:"0 0 24 24"};
      const map={
        home:<svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
        msg:<svg {...p}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
        feed:<svg {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>,
        cog:<svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
        video:<svg {...p}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>,
        phone:<svg {...p}><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.05 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.9.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg>,
        send:<svg {...p}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
        search:<svg {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
        back:<svg {...p}><polyline points="15 18 9 12 15 6"/></svg>,
        mic:<svg {...p}><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
        micOff:<svg {...p}><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/><path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
        cam:<svg {...p}><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>,
        camOff:<svg {...p}><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 01-2-2V8a2 2 0 012-2h3m3-3h6l2 3h4a2 2 0 012 2v9.34m-7.72-2.06A4 4 0 1111.17 8.97"/></svg>,
        endCall:<svg {...p}><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 0110 17M8.71 7.05L7.83 6.17a2 2 0 00-2.11-.45A2 2 0 004 3.72V4a2 2 0 00-2 2"/><line x1="23" y1="1" x2="1" y2="23"/></svg>,
        bell:<svg {...p}><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,
        plus:<svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        users:<svg {...p}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
        heart:<svg {...p}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
        trash:<svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
        img:<svg {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
        comment:<svg {...p}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
        user:<svg {...p}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        logout:<svg {...p}><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
        wifi:<svg {...p}><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1" fill={c} stroke="none"/></svg>,
      };
      return map[n]||null;
    };

    const Spinner = ({color="var(--blue)",size=20}) => (
      <div style={{width:size,height:size,border:`2px solid ${color}40`,borderTopColor:color,borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>
    );

    const Toggle = ({on,onChange,color="var(--blue)"}) => (
      <div onClick={()=>onChange(!on)} style={{width:46,height:26,borderRadius:13,background:on?color:"rgba(255,255,255,.1)",transition:"all .3s",cursor:"pointer",position:"relative",flexShrink:0,boxShadow:on?`0 0 12px ${color}60`:"none"}}>
        <div style={{position:"absolute",top:3,left:on?23:3,width:20,height:20,borderRadius:"50%",background:"white",transition:"left .3s",boxShadow:"0 2px 5px rgba(0,0,0,.35)"}}/>
      </div>
    );

    const DevFooter = () => (
      <p style={{textAlign:"center",color:"rgba(255,255,255,.18)",fontSize:10,padding:"6px 0 2px",letterSpacing:.5}}>
        NEXORA v25.0 · Developer: Bahauddin Dakua (NFS- NU ON CAMPUS)
      </p>
    );

    const BottomNav = ({screen,setScreen,reqCount=0,isAdmin=false}) => (
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,zIndex:200,background:"rgba(5,5,8,0.96)",backdropFilter:"blur(24px)",borderTop:"1px solid rgba(0,212,255,0.13)",display:"flex",padding:"4px 0 10px"}}>
        {[{id:"home",icon:"home",label:"Home"},{id:"feed",icon:"feed",label:"Posts"},{id:"messages",icon:"msg",label:"Messages",badge:reqCount},{id:"groups",icon:"users",label:"Groups"},{id:"settings",icon:"cog",label:"Settings"}].map(n=>(
          <button key={n.id} className={`nav-btn ${screen===n.id||(screen==="chat"&&n.id==="messages")?"active":""}`} onClick={()=>setScreen(n.id)} style={{position:"relative"}}>
            <Ic n={n.icon} s={22}/>
            {n.badge>0&&<span style={{position:"absolute",top:6,right:"50%",transform:"translateX(14px)",background:"var(--red)",color:"white",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>{n.badge}</span>}
            {n.label}
          </button>
        ))}
        {isAdmin&&(
          <button className={`nav-btn ${screen==="admin"?"active":""}`} onClick={()=>setScreen("admin")}>
            <svg fill="none" stroke="currentColor" strokeWidth="2" width="22" height="22" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Admin
          </button>
        )}
      </div>
    );

    const ISLAMIC_PHRASES=["মাশাআল্লাহ ماشاء الله","আলহামদুলিল্লাহ الحمد لله","আল্লাহু আকবার الله أكبر","সুবহানাল্লাহ سبحان الله"];

    const LoginScreen = () => {
      // tab: "main" | "signin" | "register"
      const [tab,setTab]=useState("main");
      const [email,setEmail]=useState("");
      const [pass,setPass]=useState("");
      const [name,setName]=useState("");
      const [loading,setLoading]=useState(false);
      const [err,setErr]=useState("");
      const [googleLoading,setGoogleLoading]=useState(false);
      // Show "redirecting..." message when redirect flow starts
      const [redirecting,setRedirecting]=useState(false);

      // Check for pending redirect result on mount
      useEffect(()=>{
        // Redirect flow থেকে ফিরলে result check করো
        setGoogleLoading(true);
        auth.getRedirectResult().then(result=>{
          if(result&&result.user){
            // onAuthStateChanged এ navigate হবে — loading চলতে দাও
          }else{
            setGoogleLoading(false);
          }
        }).catch(e=>{
          setGoogleLoading(false);
          if(e.code&&e.code!=="auth/no-auth-event"&&e.code!=="auth/null-user"&&e.code!=="auth/operation-not-supported-in-this-environment"){
            setErr("Google লগইন ত্রুটি: "+(e.code==="auth/unauthorized-domain"?"এই ডোমেইনে Google লগইন সক্রিয় নয়।":e.message));
          }
        });
      },[]);

      // Detect mobile browser
      const isMobile=()=>/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      // Facebook, Instagram, Messenger ইত্যাদি in-app browser এ sessionStorage partitioned থাকে
      // তাই signInWithRedirect কাজ করে না — "missing initial state" error আসে
      const isInAppBrowser=()=>{
        const ua=navigator.userAgent||"";
        return /FBAN|FBAV|FB_IAB|Instagram|Messenger|FBIOS|FBANDROID|LinkedInApp|MicroMessenger|Line\/|Snapchat|Twitter\/|TikTok/i.test(ua);
      };

      const openInExternalBrowser=()=>{
        const url=window.location.href;
        if(/Android/i.test(navigator.userAgent)){
          // Android Chrome intent
          const intentUrl="intent://"+url.replace(/^https?:\/\//,"")+"#Intent;scheme=https;package=com.android.chrome;end";
          window.location.href=intentUrl;
          // Fallback: try opening directly after short delay
          setTimeout(()=>{ try{ window.open(url,"_blank"); }catch(e){} },1500);
        } else {
          window.open(url,"_blank");
        }
      };

      const doGoogle=async()=>{
        setGoogleLoading(true);setErr("");
        // Capacitor native app এ redirect ব্যবহার করো (popup কাজ করে না)
        if(window.__isCapacitor){
          try{
            setRedirecting(true);
            await auth.signInWithRedirect(makeGoogleProvider());
            return;
          }catch(capErr){
            setErr(capErr.message||"Google লগইন ব্যর্থ");
            setGoogleLoading(false);setRedirecting(false);
            return;
          }
        }
        // In-app browser এ Google login সম্ভব নয় — Chrome এ খুলতে বলো
        if(isInAppBrowser()){
          setGoogleLoading(false);
          setErr("__INAPP__");
          return;
        }
        try{
          const result=await auth.signInWithPopup(makeGoogleProvider());
          // সফল হলে loading চালু রাখো — onAuthStateChanged navigate করবে
          if(!result||!result.user){
            setGoogleLoading(false);
          }
        }catch(e){
          if(e.code==="auth/popup-blocked"||e.code==="auth/operation-not-supported-in-this-environment"){
            // Popup blocked হলেও in-app browser check করো
            if(isInAppBrowser()){
              setErr("__INAPP__");
              setGoogleLoading(false);
              return;
            }
            try{
              setRedirecting(true);
              await auth.signInWithRedirect(makeGoogleProvider());
            }catch(e2){
              setErr("Google লগইন করা যাচ্ছে না: "+e2.message);
              setGoogleLoading(false);setRedirecting(false);
            }
          }else if(e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request"){
            setGoogleLoading(false);
          }else if(e.code==="auth/unauthorized-domain"){
            setErr("Firebase কনসোলে এই ডোমেইন Authorized Domains-এ যোগ করুন।");
            setGoogleLoading(false);
          }else{
            setErr(e.message||"Google লগইন ব্যর্থ হয়েছে।");
            setGoogleLoading(false);
          }
        }
      };

      const doSignIn=async()=>{
        if(!email||!pass){setErr("ইমেইল ও পাসওয়ার্ড দিন।");return;}
        setLoading(true);setErr("");
        try{
          await auth.signInWithEmailAndPassword(email.trim(),pass);
        }catch(e){
          if(e.code==="auth/user-not-found"||e.code==="auth/invalid-credential"){
            setErr("অ্যাকাউন্ট পাওয়া যায়নি। নিবন্ধন করুন।");
          }else if(e.code==="auth/wrong-password"){
            setErr("পাসওয়ার্ড ভুল হয়েছে।");
          }else{setErr(e.message);}
          setLoading(false);
        }
      };

      const doRegister=async()=>{
        if(!name.trim()||!email||!pass){setErr("সব তথ্য পূরণ করুন।");return;}
        if(pass.length<6){setErr("পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে।");return;}
        setLoading(true);setErr("");
        try{
          const cred=await auth.createUserWithEmailAndPassword(email.trim(),pass);
          await cred.user.updateProfile({displayName:name.trim()});
        }catch(e){
          if(e.code==="auth/email-already-in-use"){
            setErr("এই ইমেইল ইতিমধ্যে নিবন্ধিত। সাইন ইন করুন।");
          }else{setErr(e.message);}
          setLoading(false);
        }
      };

      const backBtn=(
        <button onClick={()=>{setTab("main");setErr("");setEmail("");setPass("");setName("");}} style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,fontFamily:"'Exo 2',sans-serif",marginBottom:6}}>
          <Ic n="back" s={15} c="var(--blue)"/> ফিরে যান
        </button>
      );

      // Full-screen redirect loading overlay
      if(redirecting){
        return(
          <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",gap:20}}>
            <div style={{width:72,height:72,borderRadius:22,background:"linear-gradient(135deg,var(--purple),var(--blue))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>📹</div>
            <Spinner size={36}/>
            <p style={{color:"var(--text2)",fontSize:14,textAlign:"center",lineHeight:1.8}}>Google-এ যাচ্ছে...<br/><span style={{fontSize:12}}>অনুগ্রহ করে অপেক্ষা করুন</span></p>
          </div>
        );
      }

      return(
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 22px",background:"radial-gradient(ellipse at 25% 15%,rgba(124,58,237,.18) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(0,212,255,.12) 0%,transparent 55%),var(--bg)"}}>
          <div style={{textAlign:"center",marginBottom:36}}>
            <div style={{width:80,height:80,borderRadius:24,margin:"0 auto 16px",background:"linear-gradient(135deg,var(--purple),var(--blue))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,boxShadow:"0 0 40px rgba(124,58,237,.5)"}}>📹</div>
            <h1 style={{fontFamily:"Orbitron",fontSize:26,fontWeight:900,letterSpacing:2,background:"linear-gradient(135deg,var(--blue),var(--purple2))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>NEXORA</h1>
            <p style={{color:"var(--text2)",marginTop:6,fontSize:12}}>Connect · Chat · Call · Posts · 2026</p>
          </div>

          <div style={{width:"100%",maxWidth:360}}>

            {/* ── MAIN TAB ── */}
            {tab==="main"&&(
              <div style={{display:"flex",flexDirection:"column",gap:11}}>
                {/* Google */}
                <button onClick={doGoogle} disabled={googleLoading} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:"14px 20px",background:"linear-gradient(135deg,rgba(0,212,255,.15),rgba(124,58,237,.15))",border:"1px solid rgba(0,212,255,.35)",borderRadius:14,cursor:"pointer",color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:15,fontWeight:600,opacity:googleLoading?.7:1}}>
                  {googleLoading?<Spinner/>:<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>}
                  {googleLoading?"অপেক্ষা করুন...":"Google দিয়ে প্রবেশ করুন"}
                </button>

                {/* Divider */}
                <div style={{display:"flex",alignItems:"center",gap:10,margin:"2px 0"}}>
                  <div style={{flex:1,height:1,background:"rgba(255,255,255,.08)"}}/>
                  <span style={{color:"var(--text2)",fontSize:11}}>অথবা</span>
                  <div style={{flex:1,height:1,background:"rgba(255,255,255,.08)"}}/>
                </div>

                {/* Sign In */}
                <button onClick={()=>{setTab("signin");setErr("");}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:"13px 20px",background:"rgba(0,212,255,.08)",border:"1px solid rgba(0,212,255,.28)",borderRadius:14,cursor:"pointer",color:"var(--blue)",fontFamily:"'Exo 2',sans-serif",fontSize:14,fontWeight:700}}>
                  🔑 সাইন ইন করুন
                </button>
                {/* Register */}
                <button onClick={()=>{setTab("register");setErr("");}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:"13px 20px",background:"rgba(168,85,247,.08)",border:"1px solid rgba(168,85,247,.28)",borderRadius:14,cursor:"pointer",color:"var(--purple2)",fontFamily:"'Exo 2',sans-serif",fontSize:14,fontWeight:700}}>
                  ✨ নতুন অ্যাকাউন্ট খুলুন
                </button>

                {err==="__INAPP__"?(
                  <div style={{background:"rgba(255,150,0,.1)",border:"1px solid rgba(255,150,0,.35)",borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
                    <p style={{fontSize:13,color:"#ffaa00",fontWeight:700,marginBottom:8}}>⚠️ Facebook ব্রাউজারে Google Login কাজ করে না</p>
                    <p style={{fontSize:12,color:"rgba(255,170,0,.85)",marginBottom:12,lineHeight:1.5}}>নিচের বাটনে ট্যাপ করে Chrome এ খুলুন, তারপর Google দিয়ে লগইন করুন।</p>
                    <button onClick={openInExternalBrowser} style={{background:"linear-gradient(135deg,#4285f4,#34a853)",border:"none",borderRadius:10,padding:"10px 20px",color:"white",fontFamily:"'Exo 2',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%"}}>
                      🌐 Chrome এ খুলুন
                    </button>
                  </div>
                ):err&&<p style={{color:"var(--red)",fontSize:13,textAlign:"center",padding:"8px 12px",background:"rgba(255,59,92,.08)",borderRadius:10}}>{err}</p>}
              </div>
            )}

            {/* ── SIGN IN TAB ── */}
            {tab==="signin"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {backBtn}
                <p style={{fontFamily:"Orbitron",fontSize:16,fontWeight:700,marginBottom:2,color:"var(--blue)"}}>🔑 সাইন ইন</p>
                {err&&<p style={{color:"var(--red)",fontSize:13,padding:"9px 13px",background:"rgba(255,59,92,.1)",borderRadius:10,border:"1px solid rgba(255,59,92,.2)"}}>{err}</p>}
                <input placeholder="ইমেইল ঠিকানা" value={email} onChange={e=>setEmail(e.target.value)} type="email" autoComplete="email"/>
                <input placeholder="পাসওয়ার্ড" value={pass} onChange={e=>setPass(e.target.value)} type="password" onKeyDown={e=>e.key==="Enter"&&doSignIn()} autoComplete="current-password"/>
                <button onClick={doSignIn} disabled={loading} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:"14px 20px",background:"linear-gradient(135deg,rgba(0,212,255,.4),rgba(124,58,237,.3))",border:"1px solid rgba(0,212,255,.5)",borderRadius:14,cursor:"pointer",color:"white",fontFamily:"'Exo 2',sans-serif",fontSize:15,fontWeight:700,opacity:loading?.7:1}}>
                  {loading?<><Spinner/> প্রক্রিয়াধীন...</>:"প্রবেশ করুন →"}
                </button>
                <p style={{color:"var(--text2)",fontSize:12,textAlign:"center"}}>অ্যাকাউন্ট নেই? <span onClick={()=>{setTab("register");setErr("");}} style={{color:"var(--purple2)",cursor:"pointer",fontWeight:700}}>নিবন্ধন করুন</span></p>
              </div>
            )}

            {/* ── REGISTER TAB ── */}
            {tab==="register"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {backBtn}
                <p style={{fontFamily:"Orbitron",fontSize:16,fontWeight:700,marginBottom:2,color:"var(--purple2)"}}>✨ নতুন অ্যাকাউন্ট</p>
                {err&&<p style={{color:"var(--red)",fontSize:13,padding:"9px 13px",background:"rgba(255,59,92,.1)",borderRadius:10,border:"1px solid rgba(255,59,92,.2)"}}>{err}</p>}
                <input placeholder="আপনার নাম" value={name} onChange={e=>setName(e.target.value)} type="text" autoComplete="name"/>
                <input placeholder="ইমেইল ঠিকানা" value={email} onChange={e=>setEmail(e.target.value)} type="email" autoComplete="email"/>
                <input placeholder="পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)" value={pass} onChange={e=>setPass(e.target.value)} type="password" onKeyDown={e=>e.key==="Enter"&&doRegister()} autoComplete="new-password"/>
                <button onClick={doRegister} disabled={loading} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:"14px 20px",background:"linear-gradient(135deg,rgba(168,85,247,.5),rgba(0,212,255,.3))",border:"1px solid rgba(168,85,247,.5)",borderRadius:14,cursor:"pointer",color:"white",fontFamily:"'Exo 2',sans-serif",fontSize:15,fontWeight:700,opacity:loading?.7:1}}>
                  {loading?<><Spinner/> তৈরি হচ্ছে...</>:"অ্যাকাউন্ট তৈরি করুন →"}
                </button>
                <p style={{color:"var(--text2)",fontSize:12,textAlign:"center"}}>ইতিমধ্যে অ্যাকাউন্ট আছে? <span onClick={()=>{setTab("signin");setErr("");}} style={{color:"var(--blue)",cursor:"pointer",fontWeight:700}}>সাইন ইন করুন</span></p>
              </div>
            )}

          </div>
          <p style={{color:"var(--text2)",fontSize:10,marginTop:36}}>Developer: Bahauddin Dakua (NFS- NU ON CAMPUS) · NEXORA v25.0</p>
        </div>
      );
    };

    const HomeScreen=({user,setScreen,setContact,setCallConfig,reqCount=0,setMsgTab,friendPostBadge=0,onViewProfile})=>{
      const [phraseIdx,setPhraseIdx]=useState(0);
      useEffect(()=>{const t=setInterval(()=>setPhraseIdx(i=>(i+1)%ISLAMIC_PHRASES.length),3000);return()=>clearInterval(t);},[]);
      const [allUsers,setAllUsers]=useState([]);
      const [convs,setConvs]=useState([]);
      const [homeFriendsMap,setHomeFriendsMap]=useState({});
      const [showNotifPanel,setShowNotifPanel]=useState(false);
      const [notifsList,setNotifsList]=useState([]);

      useEffect(()=>{
        let ud={},pd={},mergeTimer=null;
        const merge=()=>{
          if(mergeTimer)clearTimeout(mergeTimer);
          mergeTimer=setTimeout(()=>{
            setAllUsers(Object.values(ud).filter(u=>u.uid!==user.uid).map(u=>({...u,online:pd[u.uid]?.online||false})));
          },50);
        };
        // /users: cache — real-time দরকার নেই, profile data rarely changes
        loadUsersOnce(data=>{ ud=data; merge(); });
        // /presence: real-time থাকবে — online dot সাথে সাথে দেখাবে
        const pr=db.ref("/presence");
        pr.on("child_added",  s=>{pd[s.key]=s.val();merge();});
        pr.on("child_changed",s=>{pd[s.key]=s.val();merge();});
        pr.on("child_removed",s=>{delete pd[s.key];merge();});
        return()=>{pr.off();if(mergeTimer)clearTimeout(mergeTimer);};
      },[user.uid]);

      useEffect(()=>{
        const r=db.ref(`/userConvs/${user.uid}`);
        r.on("value",s=>{const d=s.val()||{};setConvs(Object.values(d).sort((a,b)=>(b.lastTs||0)-(a.lastTs||0)));});
        return()=>r.off();
      },[user.uid]);

      useEffect(()=>{
        const r=db.ref(`/friends/${user.uid}`);
        r.on("value",s=>setHomeFriendsMap(s.val()||{}));
        return()=>r.off();
      },[user.uid]);

      useEffect(()=>{
        const r=db.ref(`/userNotifs/${user.uid}`).orderByChild("ts").limitToLast(40);
        r.on("value",s=>{
          const d=s.val()||{};
          const list=Object.entries(d).map(([id,n])=>({id,...n})).sort((a,b)=>(b.ts||0)-(a.ts||0));
          setNotifsList(list);
        });
        return()=>r.off();
      },[user.uid]);

      const unreadCount = notifsList.filter(n=>!n.read).length;

      // ইতিমধ্যে mark করা notif আবার write না করতে local Set ব্যবহার
      const _markedReadSet = React.useRef(new Set());
      const openNotifPanel=()=>{
        setShowNotifPanel(true);
        // mark all unread as read — কিন্তু আগে mark হয়েছে এমনগুলো skip করো
        notifsList.filter(n=>!n.read && !_markedReadSet.current.has(n.id)).forEach(n=>{
          _markedReadSet.current.add(n.id);
          db.ref(`/userNotifs/${user.uid}/${n.id}/read`).set(true);
        });
      };

      const notifIcon=(type)=>{
        if(type==="react") return "❤️";
        if(type==="comment") return "💬";
        if(type==="friendReq") return "🤝";
        if(type==="friendPost") return "📸";
        return "🔔";
      };

      const fmtNotifTime=(ts)=>{
        if(!ts)return"";
        const diff=Date.now()-ts;
        if(diff<60000) return "এখনই";
        if(diff<3600000) return `${Math.floor(diff/60000)} মিনিট আগে`;
        if(diff<86400000) return `${Math.floor(diff/3600000)} ঘণ্টা আগে`;
        return `${Math.floor(diff/86400000)} দিন আগে`;
      };

      const onlineUsers=allUsers.filter(u=>u.online);
      const offlineUsers=allUsers.filter(u=>!u.online);
      const offlineFriends=offlineUsers.filter(u=>homeFriendsMap[u.uid]);
      const contactsStrip=[...onlineUsers,...offlineFriends,...offlineUsers.filter(u=>!homeFriendsMap[u.uid]).slice(0,15)];

      return(
        <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:90}}>
          <div style={{padding:"12px 20px 10px",background:"rgba(5,5,8,.92)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(0,212,255,.1)",position:"sticky",top:0,zIndex:50}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <h1 style={{fontFamily:"Orbitron",fontSize:18,fontWeight:900,letterSpacing:2,background:"linear-gradient(135deg,var(--blue),var(--purple2))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>NEXORA</h1>
                <p key={phraseIdx} style={{fontSize:10,color:"rgba(0,212,255,.55)",letterSpacing:.5,marginTop:2,animation:"slide-up .4s ease"}}>{ISLAMIC_PHRASES[phraseIdx]}</p>
              </div>
              <PrayerWidget/>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <button onClick={openNotifPanel} style={{background:"none",border:"none",cursor:"pointer",color:(unreadCount>0||reqCount>0||friendPostBadge>0)?"var(--amber)":"var(--text2)",padding:4,position:"relative"}}>
                  <Ic n="bell" s={22} c={(unreadCount>0||reqCount>0||friendPostBadge>0)?"var(--amber)":"var(--text2)"}/>
                  {(unreadCount+reqCount)>0&&<span style={{position:"absolute",top:-4,right:-4,minWidth:18,height:18,borderRadius:9,background:"var(--red)",color:"white",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,padding:"0 4px",border:"2px solid var(--bg)"}}>{(unreadCount+reqCount)>9?"9+":(unreadCount+reqCount)}</span>}
                </button>
                <div onClick={()=>onViewProfile&&onViewProfile(user.uid,"home")} style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,var(--purple),var(--blue))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer",overflow:"hidden",flexShrink:0}}>
                  {user.photo?<img src={user.photo} style={{width:38,height:38,objectFit:"cover"}}/>:user.emoji}
                </div>
              </div>
            </div>
          </div>
          <div style={{padding:"20px 16px"}}>
            <div style={{marginBottom:22}}>
              <p style={{color:"var(--text2)",fontSize:13,marginBottom:4}}>🌙 Assalamu Alaikum,</p>
              <h2 style={{fontSize:23,fontWeight:700}}>{user.name} 👋</h2>
            </div>
            <div onClick={()=>{setMsgTab("people");setScreen("messages");}} style={{marginBottom:18,padding:"14px 18px",background:"linear-gradient(135deg,rgba(124,58,237,.15),rgba(0,212,255,.1))",border:"1px solid rgba(0,212,255,.25)",borderRadius:16,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:28}}>👋</span>
              <div style={{flex:1}}>
                <p style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>নতুন বন্ধু খুঁজুন</p>
                <p style={{fontSize:11,color:"var(--text2)",marginTop:2}}>বন্ধু যোগ করুন এবং চ্যাট ও কল শুরু করুন!</p>
              </div>
              <span style={{color:"var(--blue)",fontSize:18,fontWeight:700}}>→</span>
            </div>
            {contactsStrip.length>0&&(
              <div style={{marginBottom:26}}>
                <p style={{fontSize:11,fontWeight:600,color:"var(--text2)",letterSpacing:1.2,textTransform:"uppercase",marginBottom:13}}>🟢 Live Now ({onlineUsers.length})</p>
                <div style={{display:"flex",gap:14,overflowX:"auto",paddingBottom:6,scrollbarWidth:"none"}}>
                  {contactsStrip.map(u=>(
                    <div key={u.uid} onClick={()=>{setContact(u);setScreen("chat");}} style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
                      <div style={{position:"relative"}}>
                        {u.online&&<div style={{position:"absolute",top:-5,left:-5,right:-5,bottom:-5,borderRadius:"50%",border:"1px solid var(--green)",opacity:.35,animation:"pulse-ring 2.2s ease-out infinite",pointerEvents:"none"}}/>}
                        <div onClick={(e)=>{e.stopPropagation();onViewProfile&&onViewProfile(u.uid,"home");}} style={{width:58,height:58,borderRadius:"50%",fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,212,255,.18))",border:`2px solid ${u.online?"var(--green)":homeFriendsMap[u.uid]?"rgba(168,85,247,.5)":"rgba(255,255,255,.15)"}`,overflow:"hidden",opacity:u.online?1:0.65}}>{u.photo?<img src={u.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:u.emoji}</div>
                        <div style={{position:"absolute",bottom:2,right:2,width:12,height:12,borderRadius:"50%",background:u.online?"var(--green)":"#555",border:"2px solid var(--bg)"}}/>
                      </div>
                      <p style={{fontSize:10,color:"var(--text2)",textAlign:"center",maxWidth:58,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name.split(" ")[0]}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {convs.filter(c=>c.lastMsg).length>0&&(
              <div>
                <p style={{fontSize:11,fontWeight:600,color:"var(--text2)",letterSpacing:1.2,textTransform:"uppercase",marginBottom:13}}>Recent Chats</p>
                {convs.filter(c=>c.lastMsg).slice(0,3).map(c=>(
                  <div key={c.uid} onClick={()=>{setContact(c);setScreen("chat");}} className="glass" style={{padding:"12px 14px",marginBottom:9,display:"flex",alignItems:"center",gap:12,cursor:"pointer",borderRadius:15}}>
                    <div onClick={(e)=>{e.stopPropagation();onViewProfile&&onViewProfile(c.uid,"home");}} style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.35),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,overflow:"hidden"}}>{c.photo?<img src={c.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:c.emoji||"👤"}</div>
                    <div style={{flex:1,overflow:"hidden"}}>
                      <p style={{fontWeight:600,fontSize:14}}>{c.name}</p>
                      <p style={{fontSize:12,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{c.lastMsg}</p>
                    </div>
                    {c.unread>0&&<div style={{width:20,height:20,borderRadius:"50%",background:"linear-gradient(135deg,var(--blue),var(--purple))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{c.unread}</div>}
                  </div>
                ))}
              </div>
            )}
            <DevFooter/>
          </div>

          {/* ── Notification Panel ─────────────────────────────────────────────── */}
          {showNotifPanel&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setShowNotifPanel(false);}}>
              <div style={{width:"100%",maxWidth:480,background:"var(--bg2)",borderRadius:"24px 24px 0 0",border:"1px solid var(--gb)",maxHeight:"80vh",display:"flex",flexDirection:"column",animation:"slide-up .25s ease"}}>
                <div style={{padding:"16px 18px 12px",borderBottom:"1px solid var(--gb)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <Ic n="bell" s={18} c="var(--amber)"/>
                    <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:14}}>নোটিফিকেশন</p>
                    {unreadCount>0&&<span style={{background:"var(--red)",color:"white",fontSize:10,borderRadius:10,padding:"1px 7px",fontWeight:700}}>{unreadCount}</span>}
                  </div>
                  <button onClick={()=>setShowNotifPanel(false)} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"var(--text2)",fontSize:15}}>✕</button>
                </div>
                <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
                  {notifsList.length===0&&(
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",gap:12}}>
                      <div style={{fontSize:40}}>🔔</div>
                      <p style={{color:"var(--text2)",fontSize:13,textAlign:"center"}}>এখনো কোনো নোটিফিকেশন নেই</p>
                    </div>
                  )}
                  {notifsList.map(n=>(
                    <div key={n.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 18px",borderBottom:"1px solid rgba(255,255,255,.04)",background:n.read?"transparent":"rgba(0,212,255,.04)",cursor:"pointer"}}
                      onClick={()=>{
                        if(n.type==="friendReq"){setShowNotifPanel(false);setMsgTab("people");setScreen("messages");}
                        else{setShowNotifPanel(false);setScreen("feed");}
                      }}
                    >
                      <div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.35),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,overflow:"hidden",position:"relative"}}>
                        {n.fromPhoto?<img src={n.fromPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span>{n.fromEmoji||"👤"}</span>}
                        <span style={{position:"absolute",bottom:-2,right:-2,fontSize:14,lineHeight:1}}>{notifIcon(n.type)}</span>
                      </div>
                      <div style={{flex:1,overflow:"hidden"}}>
                        <p style={{fontSize:13,color:"var(--text)",lineHeight:1.5,fontWeight:n.read?400:600}}>{n.text}</p>
                        <p style={{fontSize:11,color:"var(--text2)",marginTop:3}}>{fmtNotifTime(n.ts)}</p>
                      </div>
                      {!n.read&&<div style={{width:8,height:8,borderRadius:"50%",background:"var(--blue)",flexShrink:0}}/>}
                    </div>
                  ))}
                </div>
                {notifsList.length>0&&(
                  <div style={{padding:"10px 18px 20px",borderTop:"1px solid var(--gb)",flexShrink:0}}>
                    <button onClick={()=>{
                      notifsList.forEach(n=>{
                        if(!n.read) db.ref(`/userNotifs/${user.uid}/${n.id}/read`).set(true);
                      });
                    }} style={{width:"100%",padding:"10px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:12,color:"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13}}>
                      সব পঠিত হিসেবে চিহ্নিত করুন
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    };

    const renderPostText=(text)=>{
      if(!text)return null;
      const parts=text.split(/(#\S+)/g);
      return parts.map((p,i)=>p.startsWith("#")?<span key={i} style={{color:"var(--blue)",fontWeight:600}}>{p}</span>:<span key={i}>{p}</span>);
    };

    const REACTIONS=[
      {id:"like",  emoji:"👍", label:"লাইক",    color:"#00d4ff"},
      {id:"love",  emoji:"❤️", label:"ভালোবাসা",color:"#ff3b5c"},
      {id:"haha",  emoji:"😂", label:"মজার",    color:"#ff9f43"},
      {id:"wow",   emoji:"😮", label:"অবাক",    color:"#a855f7"},
      {id:"sad",   emoji:"😢", label:"দুঃখিত",  color:"#94a3b8"},
      {id:"angry", emoji:"😡", label:"রাগ",     color:"#ff3b5c"},
    ];

    const calcPostScore=(post, friendsMap={})=>{
      const now=Date.now();
      const ts=post.ts||now;
      const hoursOld=(now-ts)/(1000*60*60);
      const recencyBoost=Math.max(0,100-hoursOld*2);
      const reactions=Object.keys(post.reactions||{}).length+Object.keys(post.likes||{}).length;
      const comments=post.commentCount||0;
      const shares=post.shareCount||0;
      let score=(reactions*3)+(comments*4)+(shares*2)+recencyBoost-(hoursOld*0.5);
      if(friendsMap[post.authorUid]) score*=1.5;
      return score;
    };

    const getTopReactions=(post)=>{
      const counts={};
      Object.values(post.reactions||{}).forEach(r=>{ counts[r]=(counts[r]||0)+1; });
      const legacyLikes=Object.keys(post.likes||{}).length;
      if(legacyLikes>0) counts["like"]=(counts["like"]||0)+legacyLikes;
      return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);
    };

    const getTotalReactions=(post)=>{
      return Object.keys(post.reactions||{}).length+Object.keys(post.likes||{}).length;
    };

    const PostCard = ({post, user, onComment, onEdit, isPopular=false, savedMap={}, onViewProfile, userPhotoMap={}}) => {
      const myReaction = post.reactions?.[user.uid] || (post.likes?.[user.uid]?"like":null);
      const myReport   = post.reports?.[user.uid];
      const reportCount= Object.keys(post.reports||{}).length;
      const isAdmin    = user.isAdmin;
      const isOwner    = post.authorUid===user.uid;
      const [showMenu,    setShowMenu]    = useState(false);
      const [showReacts,  setShowReacts]  = useState(false);
      const [saved,       setSaved]       = useState(!!savedMap[post.id]);
      const [reactLabel,  setReactLabel]  = useState(null);
      const reactBtnRef   = useRef(null);
      const holdTimer     = useRef(null);

      useEffect(()=>{ setSaved(!!savedMap[post.id]); },[savedMap, post.id]);

      const myRxInfo = REACTIONS.find(r=>r.id===myReaction);

      const setReaction = async(id) => {
        setShowReacts(false);
        // remove old legacy like/dislike
        await db.ref(`/posts/${post.id}/likes/${user.uid}`).remove();
        await db.ref(`/posts/${post.id}/dislikes/${user.uid}`).remove();
        if(myReaction===id){
          await db.ref(`/posts/${post.id}/reactions/${user.uid}`).remove();
        } else {
          await db.ref(`/posts/${post.id}/reactions/${user.uid}`).set(id);
          if(post.authorUid && post.authorUid!==user.uid){
            const rxInfo=REACTIONS.find(r=>r.id===id);
            writeNotif(post.authorUid,"react",user,`${user.name} আপনার পোস্টে ${rxInfo?.emoji||"❤️"} রিঅ্যাক্ট করেছে`,{postId:post.id});
          }
        }
      };

      const quickLike = () => {
        if(showReacts){setShowReacts(false);return;}
        setReaction("like");
      };

      const startHold = () => {
        holdTimer.current = setTimeout(()=>setShowReacts(true), 400);
      };
      const endHold = () => { clearTimeout(holdTimer.current); };

      const deletePost = async() => {
        if(!window.confirm("পোস্ট মুছে ফেলবেন?"))return;
        await db.ref(`/posts/${post.id}`).remove();
        await db.ref(`/postComments/${post.id}`).remove();
        setShowMenu(false);
      };
      const reportPost = async() => {
        if(myReport){alert("আপনি ইতিমধ্যে রিপোর্ট করেছেন।");setShowMenu(false);return;}
        await db.ref(`/posts/${post.id}/reports/${user.uid}`).set({uid:user.uid,name:user.name,ts:firebase.database.ServerValue.TIMESTAMP});
        await db.ref(`/posts/${post.id}/reportCount`).set((reportCount||0)+1);
        alert("রিপোর্ট করা হয়েছে। ধন্যবাদ।");setShowMenu(false);
      };
      const toggleSave = async() => {
        if(saved){ await db.ref(`/savedPosts/${user.uid}/${post.id}`).remove(); setSaved(false); }
        else { await db.ref(`/savedPosts/${user.uid}/${post.id}`).set({ts:Date.now()}); setSaved(true); }
        setShowMenu(false);
      };
      const sharePost = async() => {
        const postUrl = `${window.location.href.split('?')[0].split('#')[0]}?post=${post.id}`;
        const shareText = `📌 "${post.authorName}" এর পোস্ট:\n${post.text||"📸 ছবি/ভিডিও"}\n\n🔗 দেখুন: ${postUrl}`;
        if(navigator.share){
          try{ await navigator.share({title:"NEXORA Post", text:post.text||"", url:postUrl}); }
          catch(e){ if(e.name!=="AbortError"){ navigator.clipboard?.writeText(postUrl); alert("লিংক কপি করা হয়েছে!"); } }
        } else {
          try{ await navigator.clipboard.writeText(postUrl); alert("পোস্ট লিংক কপি হয়েছে! 🔗"); }
          catch(e){ alert("লিংক: "+postUrl); }
        }
        await db.ref(`/posts/${post.id}/shareCount`).transaction(c=>(c||0)+1);
        setShowMenu(false);
      };

      const topReacts   = getTopReactions(post);
      const totalReacts = getTotalReactions(post);

      return(
        <div className="post-card" style={{position:"relative"}}>
          {/* Header */}
          <div style={{padding:"14px 16px 10px",display:"flex",alignItems:"center",gap:12}}>
            <div onClick={()=>onViewProfile&&post.authorUid&&onViewProfile(post.authorUid)} style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.4),rgba(0,212,255,.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,overflow:"hidden",border:"2px solid rgba(0,212,255,.2)",cursor:onViewProfile&&post.authorUid?"pointer":"default"}}>{(userPhotoMap[post.authorUid]||post.authorPhoto)?<img src={userPhotoMap[post.authorUid]||post.authorPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:post.authorEmoji}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <p onClick={()=>onViewProfile&&post.authorUid&&onViewProfile(post.authorUid)} style={{fontWeight:700,fontSize:14,cursor:onViewProfile&&post.authorUid?"pointer":"default"}}>{post.authorName}</p>
                {isPopular&&<span className="popular-label">🔥 জনপ্রিয়</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                <p style={{fontSize:11,color:"var(--text2)"}}>{post.ts?new Date(post.ts).toLocaleDateString("bn-BD",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):""}</p>
                {post.category&&post.category!=="general"&&<span style={{fontSize:9,background:"rgba(0,212,255,.1)",border:"1px solid rgba(0,212,255,.2)",borderRadius:8,padding:"1px 6px",color:"var(--blue)"}}>{({news:"📰",question:"❓",funny:"😂",islamic:"☪️",tech:"💻"})[post.category]||""}</span>}
              </div>
            </div>
            {reportCount>=3&&!isAdmin&&<span style={{fontSize:9,background:"rgba(255,159,67,.15)",border:"1px solid rgba(255,159,67,.3)",borderRadius:6,padding:"2px 7px",color:"var(--amber)"}}>🚩</span>}
            <button onClick={()=>setShowMenu(!showMenu)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 8px",color:"var(--text2)",fontSize:20,lineHeight:1}}>⋯</button>
          </div>

          {/* Menu */}
          {showMenu&&(
            <div style={{position:"absolute",top:56,right:12,background:"var(--bg2)",border:"1px solid var(--gb)",borderRadius:14,padding:"6px",zIndex:200,minWidth:165,boxShadow:"0 8px 30px rgba(0,0,0,.6)"}}>
              <button onClick={toggleSave} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",background:"none",border:"none",color:saved?"var(--green)":"var(--text)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:8}}>{saved?"🔖 সেভ করা হয়েছে":"🔖 পোস্ট সেভ করুন"}</button>
              <button onClick={sharePost} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",background:"none",border:"none",color:"var(--text)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:8}}>🔗 শেয়ার করুন</button>
              {isOwner&&<button onClick={()=>{onEdit&&onEdit(post);setShowMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:8}}>✏️ পোস্ট এডিট করুন</button>}
              {(isOwner||isAdmin)&&<button onClick={deletePost} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:8}}>🗑 পোস্ট মুছুন</button>}
              {!isOwner&&<button onClick={reportPost} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",background:"none",border:"none",color:myReport?"var(--text2)":"var(--amber)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:8}}>{myReport?"🚩 রিপোর্টেড":"🚩 রিপোর্ট করুন"}</button>}
              <button onClick={()=>setShowMenu(false)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",background:"none",border:"none",color:"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:8}}>✕ বাতিল</button>
            </div>
          )}
          {showMenu&&<div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setShowMenu(false)}/>}

          {/* Post image */}
          {post.image&&<img src={post.image} alt="post" style={{width:"100%",maxHeight:340,objectFit:"cover",display:"block"}}/>}

          {/* Post video */}
          {post.video&&<SmartPostVideo src={post.video}/>}

          {/* Post text */}
          {post.text&&<p style={{padding:"12px 16px 8px",fontSize:14,lineHeight:1.7,color:"var(--text)"}}>{renderPostText(post.text)}</p>}

          {/* Reaction summary bar */}
          {(totalReacts>0||post.commentCount>0)&&(
            <div style={{padding:"6px 16px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                {topReacts.map(([id,count])=>{
                  const r=REACTIONS.find(x=>x.id===id);
                  return r?<span key={id} className="reaction-badge"><span style={{fontSize:13}}>{r.emoji}</span><span style={{color:"var(--text2)",fontSize:11}}>{count}</span></span>:null;
                })}
                {totalReacts===0&&null}
              </div>
              {post.commentCount>0&&<span style={{fontSize:11,color:"var(--text2)",cursor:"pointer"}} onClick={()=>onComment(post)}>{post.commentCount} টি মন্তব্য</span>}
            </div>
          )}

          {/* Action buttons */}
          <div style={{padding:"10px 12px 14px",borderTop:"1px solid var(--gb)",marginTop:8,display:"flex",gap:6}}>
            {/* React button with popup */}
            <div style={{position:"relative",flex:1}} ref={reactBtnRef}>
              {showReacts&&(
                <div className="reaction-popup">
                  {REACTIONS.map(r=>(
                    <div key={r.id} style={{textAlign:"center"}}>
                      <div className="r-emoji"
                        onClick={()=>setReaction(r.id)}
                        onMouseEnter={()=>setReactLabel(r.label)}
                        onMouseLeave={()=>setReactLabel(null)}
                        title={r.label}
                      >{r.emoji}</div>
                    </div>
                  ))}
                </div>
              )}
              {showReacts&&<div style={{position:"fixed",inset:0,zIndex:299}} onClick={()=>setShowReacts(false)}/>}
              <button
                className={`react-btn ${myReaction?"active":""}`}
                onClick={quickLike}
                onMouseDown={startHold}
                onMouseUp={endHold}
                onTouchStart={startHold}
                onTouchEnd={endHold}
                style={{width:"100%",justifyContent:"center",color:myRxInfo?myRxInfo.color:"var(--text2)",borderColor:myRxInfo?myRxInfo.color+"55":"var(--gb)",background:myRxInfo?`${myRxInfo.color}18`:"rgba(255,255,255,.04)"}}
              >
                {myRxInfo?<>{myRxInfo.emoji} {myRxInfo.label}</>:<>👍 রিঅ্যাক্ট</>}
              </button>
            </div>

            {/* Comment button */}
            <button onClick={()=>onComment(post)} className="react-btn" style={{flex:1,justifyContent:"center"}}>
              💬 {post.commentCount>0?post.commentCount:""} মন্তব্য
            </button>

            {/* Share button */}
            <button onClick={sharePost} className="react-btn" style={{flex:1,justifyContent:"center"}}>
              🔗 {post.shareCount>0?post.shareCount+" ":""} শেয়ার
            </button>
          </div>
        </div>
      );
    };

    const PostCommentsModal = ({post, user, onClose}) => {
      const [comments, setComments] = useState([]);
      const [input, setInput] = useState("");
      const [sending, setSending] = useState(false);
      const bottom = useRef(null);

      useEffect(()=>{
        const r = db.ref(`/postComments/${post.id}`);
        r.on("value", s => {
          const d = s.val()||{};
          setComments(Object.entries(d).map(([id,c])=>({id,...c})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
        });
        return()=>r.off();
      },[post.id]);
      useEffect(()=>{ bottom.current?.scrollIntoView({behavior:"smooth"}); },[comments]);

      const sendComment = async () => {
        const text = input.trim();
        if (!text) return;
        setSending(true);
        const ref = db.ref(`/postComments/${post.id}`).push();
        await ref.set({ text, authorUid:user.uid, authorName:user.name, authorEmoji:user.emoji, authorPhoto:user.photo||null, ts:firebase.database.ServerValue.TIMESTAMP });
        await db.ref(`/posts/${post.id}/commentCount`).transaction(c=>(c||0)+1);
        if(post.authorUid && post.authorUid!==user.uid){
          writeNotif(post.authorUid,"comment",user,`${user.name} আপনার পোস্টে মন্তব্য করেছে: "${text.slice(0,40)}"`,{postId:post.id});
        }
        setInput(""); setSending(false);
      };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div style={{width:"100%",maxWidth:480,background:"var(--bg2)",borderRadius:"24px 24px 0 0",border:"1px solid var(--gb)",display:"flex",flexDirection:"column",maxHeight:"80vh",animation:"slide-up .25s ease"}}>
            <div style={{padding:"16px 18px",borderBottom:"1px solid var(--gb)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:14}}>মন্তব্য</p>
              <button onClick={onClose} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"var(--text2)",fontSize:15}}>✕</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
              {comments.length===0&&<p style={{textAlign:"center",color:"var(--text2)",padding:"30px 0",fontSize:13}}>এখনো কোনো মন্তব্য নেই।</p>}
              {comments.map(c=>(
                <div key={c.id} style={{display:"flex",gap:10,marginBottom:12}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,212,255,.15))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,overflow:"hidden"}}>
                    {c.authorPhoto?<img src={c.authorPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:c.authorEmoji}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:14,padding:"8px 12px",position:"relative"}}>
                      <p style={{fontWeight:700,fontSize:12,color:"var(--blue)",marginBottom:4}}>{c.authorName}</p>
                      <p style={{fontSize:13,lineHeight:1.55,wordBreak:"break-word"}}>{c.text}</p>
                      {(c.authorUid===user.uid||user.isAdmin)&&<button onClick={async()=>{await db.ref(`/postComments/${post.id}/${c.id}`).remove();await db.ref(`/posts/${post.id}/commentCount`).transaction(n=>Math.max(0,(n||1)-1));}} style={{position:"absolute",top:6,right:6,background:"none",border:"none",cursor:"pointer",color:"var(--text2)",fontSize:12,padding:2}}>🗑</button>}
                    </div>
                    <p style={{fontSize:10,color:"var(--text2)",marginTop:3,paddingLeft:4}}>{c.ts?new Date(c.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}</p>
                  </div>
                </div>
              ))}
              <div ref={bottom}/>
            </div>
            <div style={{padding:"10px 14px 16px",borderTop:"1px solid var(--gb)",display:"flex",gap:8,flexShrink:0}}>
              <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendComment();}}} placeholder="মন্তব্য লিখুন..." rows={1} style={{flex:1,minHeight:42,maxHeight:80}}/>
              <button onClick={sendComment} disabled={!input.trim()||sending} style={{background:input.trim()?"linear-gradient(135deg,var(--purple),var(--blue))":"rgba(255,255,255,.07)",border:"none",borderRadius:10,padding:"10px 14px",cursor:input.trim()?"pointer":"default",flexShrink:0,height:42}}>
                {sending?<Spinner size={16}/>:<Ic n="send" s={16} c={input.trim()?"white":"var(--text2)"}/>}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const POST_MAX_CHARS = 500;
    // ── পোস্ট ছবি আপলোড সুরক্ষা ──────────────────────────────────────────────
    const POST_MAX_IMAGE_BYTES  = 10 * 1024 * 1024; // 10 MB
    const POST_IMG_MAX_DIM      = 1200;               // HD max (ব্যান্ডউইথ বাঁচাতে 4K→HD)
    const POST_IMG_QUALITY      = 0.82;               // balanced quality (ফাইল সাইজ ~৩০% কমবে)
    // session-based rate limit — app reload ছাড়া এর বেশি image post হবে না

    const CreatePostModal = ({user, onClose}) => {
      const [text, setText] = useState("");
      const [image, setImage] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [videoFile, setVideoFile] = useState(null);
      const [videoPreviewUrl, setVideoPreviewUrl] = useState(null);
      const [uploadProgress, setUploadProgress] = useState(0);
      const [posting, setPosting] = useState(false);
      const uploadAbortRef = useRef(null); // abort controller for ongoing video upload
      const [imgErr, setImgErr] = useState("");
      const [videoErr, setVideoErr] = useState("");
      const [category, setCategory] = useState("general");
      const [dailyVideosUsed, setDailyVideosUsed] = useState(0);

            {!videoFile&&<p style={{fontSize:11,color:"var(--green)",textAlign:"center",marginBottom:12,marginTop:!image&&!videoFile?-6:-10,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>📷 আপনি যত খুশি ছবি পোস্ট করতে পারেন</p>}
            <button onClick={submit} disabled={(!text.trim()&&!image&&!videoFile)||posting} style={{width:"100%",padding:"14px",background:(!text.trim()&&!image&&!videoFile)?"rgba(255,255,255,.07)":"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:13,color:"white",cursor:(!text.trim()&&!image&&!videoFile)?"default":"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>

            </button>
          </div>
        </div>
      );

          <div style={{width:"100%",maxWidth:480,background:"var(--bg2)",borderRadius:"24px 24px 0 0",border:"1px solid var(--gb)",padding:"20px 18px 32px",animation:"slide-up .25s ease",maxHeight:"90vh",overflowY:"auto"}}>

    const FeedScreen = ({user, pendingPostId=null, onPostIdConsumed=null, onViewProfile}) => {
      const [posts,       setPosts]       = useState([]);
      const [showCreate,  setShowCreate]  = useState(false);
      const [commentPost, setCommentPost] = useState(null);
      const [editPost,    setEditPost]    = useState(null);
      const [loading,     setLoading]     = useState(true);
      const [catFilter,   setCatFilter]   = useState("all");
      const [savedMap,    setSavedMap]    = useState({});
      const [friendsMap,  setFriendsMap]  = useState({});
      const [refreshing,  setRefreshing]  = useState(false);
      const [viewMode,    setViewMode]    = useState("feed"); // "feed" | "myposts"
      const [friendPostBadge, setFriendPostBadge] = useState(0);
      const pullStartY = useRef(null);
      const feedRef = useRef(null);
      const lastPostCountRef = useRef(0);
      const postMapRef = useRef({}); // in-memory post store for child events

      // Handle ?post=ID deep link from share (prop takes priority over URL param)
      useEffect(()=>{
        const targetId = pendingPostId || new URLSearchParams(window.location.search).get("post");
        if(targetId && posts.length>0){
          const el = document.getElementById(`post-${targetId}`);
          if(el){
            el.scrollIntoView({behavior:"smooth"});
            if(onPostIdConsumed) onPostIdConsumed();
            else window.history.replaceState({},"",window.location.pathname);
          }
        }
      },[posts, pendingPostId]);

      // Friend post notification badge from DB
      useEffect(()=>{
        if(!user?.uid) return;
        const r = db.ref(`/notifications/${user.uid}/friendPost`);
        r.on("value", s => {
          const val = s.val()||0;
          setFriendPostBadge(val);
        });
        return()=>r.off();
      },[user.uid]);

      const clearFriendPostBadge = () => {
        if(friendPostBadge>0) db.ref(`/notifications/${user.uid}/friendPost`).set(0);
        setFriendPostBadge(0);
      };

      useEffect(()=>{
        const r=db.ref(`/friends/${user.uid}`);
        r.on("value",s=>setFriendsMap(s.val()||{}));
        return()=>r.off();
      },[user.uid]);

      useEffect(()=>{
        const r=db.ref("/posts").orderByChild("ts").limitToLast(80);
        postMapRef.current={};

        // ── Step 1: initial load একবার once() দিয়ে ──────────────────────────
        r.once("value",snap=>{
          const d=snap.val()||{};
          Object.entries(d).forEach(([id,p])=>{ postMapRef.current[id]={id,...p}; });
          lastPostCountRef.current=Object.keys(d).length;
          setPosts(Object.values(postMapRef.current).sort((a,b)=>(b.ts||0)-(a.ts||0)));
          setLoading(false); setRefreshing(false);

          // ── Step 2: initial load শেষে child events subscribe ─────────────
          // child_added: শুধু নতুন পোস্টের জন্য (initial গুলো postMapRef-এ আছে, skip হবে)
          r.on("child_added",s=>{
            if(postMapRef.current[s.key]) return; // initial load-এ ছিল, skip
            const newPost={id:s.key,...s.val()};
            postMapRef.current[s.key]=newPost;
            lastPostCountRef.current++;
            if(newPost.authorUid!==user.uid){
              db.ref(`/friends/${user.uid}/${newPost.authorUid}`).once("value",fs=>{
                if(fs.exists()) showBrowserNotif("📸 নতুন পোস্ট",`${newPost.authorName} একটি নতুন পোস্ট করেছে`,"vc-friend-post");
              });
            }
            setPosts(prev=>[newPost,...prev].sort((a,b)=>(b.ts||0)-(a.ts||0)));
          });

          // child_changed: like/comment হলে শুধু ঐ একটা পোস্ট update — ৮০টা re-download নয়
          r.on("child_changed",s=>{
            if(!postMapRef.current[s.key]) return;
            postMapRef.current[s.key]={id:s.key,...s.val()};
            setPosts(prev=>prev.map(p=>p.id===s.key?postMapRef.current[s.key]:p));
          });

          // child_removed: delete হলে শুধু ঐ পোস্ট সরাও
          r.on("child_removed",s=>{
            delete postMapRef.current[s.key];
            lastPostCountRef.current=Math.max(0,lastPostCountRef.current-1);
            setPosts(prev=>prev.filter(p=>p.id!==s.key));
          });
        });

        return()=>{ r.off(); postMapRef.current={}; };
      },[user.uid]);

      useEffect(()=>{
        const r=db.ref(`/savedPosts/${user.uid}`).once("value",s=>setSavedMap(s.val()||{}));
      },[user.uid]);

      // post author photo — /users আলাদা listener নেই, posts-এর ডেটা থেকেই নাও
      // এতে একটি পুরো /users real-time listener বাঁচবে (বড় DB read)
      const userPhotoMap = React.useMemo(()=>{
        const map={};
        posts.forEach(p=>{ if(p.authorUid&&p.authorPhoto) map[p.authorUid]=p.authorPhoto; });
        return map;
      },[posts]);

      const handlePullStart=(e)=>{
        if(feedRef.current&&feedRef.current.scrollTop<=0){
          pullStartY.current=e.touches?e.touches[0].clientY:e.clientY;
        }
      };
      const handlePullEnd=(e)=>{
        if(pullStartY.current!==null){
          const endY=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
          if(endY-pullStartY.current>80){
            setRefreshing(true);
            db.ref("/posts").orderByChild("ts").limitToLast(80).once("value",s=>{
              const d=s.val()||{};
              postMapRef.current={};
              Object.entries(d).forEach(([id,p])=>{ postMapRef.current[id]={id,...p}; });
              lastPostCountRef.current=Object.keys(d).length;
              setPosts(Object.values(postMapRef.current).sort((a,b)=>(b.ts||0)-(a.ts||0)));
              setRefreshing(false);
            });
          }
          pullStartY.current=null;
        }
      };

      const FEED_CATS=[{id:"all",label:"সব",emoji:"🌐"},{id:"general",label:"সাধারণ",emoji:"💬"},{id:"news",label:"খবর",emoji:"📰"},{id:"question",label:"প্রশ্ন",emoji:"❓"},{id:"funny",label:"মজার",emoji:"😂"},{id:"islamic",label:"ইসলামিক",emoji:"☪️"},{id:"tech",label:"টেক",emoji:"💻"}];

      const catPosts = catFilter==="all" ? posts : posts.filter(p=>p.category===catFilter);
      const displayedPosts = [...catPosts].sort((a,b)=>calcPostScore(b,friendsMap)-calcPostScore(a,friendsMap));
      const myPosts = [...posts].filter(p=>p.authorUid===user.uid).sort((a,b)=>(b.ts||0)-(a.ts||0));

      return(
        <div ref={feedRef} onTouchStart={handlePullStart} onTouchEnd={handlePullEnd} style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:90}}>
          {/* Sticky Header */}
          <div style={{background:"rgba(5,5,8,.97)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(0,212,255,.1)",position:"sticky",top:0,zIndex:50}}>
            <div style={{padding:"12px 16px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setViewMode("feed");clearFriendPostBadge();}} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"Orbitron",fontSize:15,fontWeight:700,letterSpacing:1,background:viewMode==="feed"?"linear-gradient(135deg,var(--blue),var(--purple2))":"none",WebkitBackgroundClip:viewMode==="feed"?"text":"none",WebkitTextFillColor:viewMode==="feed"?"transparent":"var(--text2)",position:"relative",padding:"0 4px 4px"}}>
                  📸 ফিড
                  {friendPostBadge>0&&viewMode!=="feed"&&<span style={{position:"absolute",top:-4,right:-6,minWidth:16,height:16,borderRadius:8,background:"var(--red)",color:"white",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,padding:"0 3px",border:"2px solid var(--bg)"}}>{friendPostBadge>9?"9+":friendPostBadge}</span>}
                </button>
                <button onClick={()=>setViewMode("myposts")} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"Orbitron",fontSize:15,fontWeight:700,letterSpacing:1,background:viewMode==="myposts"?"linear-gradient(135deg,var(--purple2),var(--blue))":"none",WebkitBackgroundClip:viewMode==="myposts"?"text":"none",WebkitTextFillColor:viewMode==="myposts"?"transparent":"var(--text2)",padding:"0 4px 4px"}}>
                  👤 আমার
                </button>
              </div>
              <button onClick={()=>setShowCreate(true)} style={{background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:12,padding:"8px 16px",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:6,boxShadow:"var(--glow-p)"}}>
                <Ic n="plus" s={15} c="white"/> নতুন
              </button>
            </div>
            {/* Category filter (only in feed mode) */}
            {viewMode==="feed"&&<div style={{display:"flex",gap:6,padding:"8px 12px",overflowX:"auto",scrollbarWidth:"none"}}>
              {FEED_CATS.map(c=>(
                <button key={c.id} onClick={()=>setCatFilter(c.id)} style={{flexShrink:0,padding:"4px 11px",background:catFilter===c.id?"rgba(0,212,255,.15)":"rgba(255,255,255,.04)",border:`1px solid ${catFilter===c.id?"rgba(0,212,255,.4)":"var(--gb)"}`,borderRadius:20,color:catFilter===c.id?"var(--blue)":"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>
                  {c.emoji} {c.label}
                </button>
              ))}
            </div>}
            {viewMode==="myposts"&&<div style={{padding:"6px 16px 8px"}}><p style={{fontSize:11,color:"var(--text2)"}}>আপনার মোট {myPosts.length}টি পোস্ট</p></div>}
          </div>

          <div style={{padding:"14px 14px 0"}}>
            {refreshing&&<div style={{textAlign:"center",padding:"10px 0"}}><Spinner size={20}/><p style={{fontSize:11,color:"var(--text2)",marginTop:4}}>রিফ্রেশ হচ্ছে...</p></div>}
            {loading&&!refreshing&&<div style={{textAlign:"center",padding:"50px 0"}}><Spinner size={36}/></div>}

            {/* Feed mode */}
            {viewMode==="feed"&&!loading&&displayedPosts.length===0&&(
              <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text2)"}}>
                <p style={{fontSize:48,marginBottom:16}}>📸</p>
                <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>এখনো কোনো পোস্ট নেই</p>
                <button onClick={()=>setShowCreate(true)} style={{background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:13,padding:"12px 28px",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14}}>পোস্ট করুন →</button>
              </div>
            )}
            {viewMode==="feed"&&displayedPosts.map(p=>(
              <div key={p.id} id={`post-${p.id}`}>
                <PostCard post={p} user={user} onComment={setCommentPost} onEdit={setEditPost} savedMap={savedMap} onViewProfile={onViewProfile} userPhotoMap={userPhotoMap}/>
              </div>
            ))}
            {viewMode==="feed"&&displayedPosts.length>0&&<DevFooter/>}

            {/* My posts mode */}
            {viewMode==="myposts"&&!loading&&myPosts.length===0&&(
              <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text2)"}}>
                <p style={{fontSize:48,marginBottom:16}}>📝</p>
                <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>আপনি এখনো কোনো পোস্ট করেননি</p>
                <button onClick={()=>setShowCreate(true)} style={{background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:13,padding:"12px 28px",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14}}>প্রথম পোস্ট করুন →</button>
              </div>
            )}
            {viewMode==="myposts"&&myPosts.map(p=>(
              <div key={p.id} id={`post-${p.id}`}>
                <PostCard post={p} user={user} onComment={setCommentPost} onEdit={setEditPost} savedMap={savedMap} onViewProfile={onViewProfile} userPhotoMap={userPhotoMap}/>
              </div>
            ))}
            {viewMode==="myposts"&&myPosts.length>0&&<DevFooter/>}
          </div>

          {showCreate&&<CreatePostModal user={user} onClose={()=>setShowCreate(false)}/>}
          {commentPost&&<PostCommentsModal post={commentPost} user={user} onClose={()=>setCommentPost(null)}/>}
          {editPost&&<EditPostModal post={editPost} user={user} onClose={()=>setEditPost(null)} onUpdated={(updated)=>{setPosts(prev=>prev.map(p=>p.id===updated.id?{...p,text:updated.text,editedAt:updated.editedAt}:p));}}/>}
        </div>
      );
    };

    const ProfileScreen = ({profileUid, currentUser, setScreen, setContact, prevScreen="messages"}) => {
      const [profileUser, setProfileUser] = useState(null);
      const [posts, setPosts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState("posts");
      const [isFriend, setIsFriend] = useState(false);
      const [reqSent, setReqSent] = useState(false);
      const [reqReceived, setReqReceived] = useState(false); // profileUser sent us a request
      const [commentPost, setCommentPost] = useState(null);
      const [mutualCount, setMutualCount] = useState(0);
      const [coverUploading, setCoverUploading] = useState(false);
      const coverInputRef = useRef(null);
      const photoInputRef = useRef(null);
      const [photoUploading, setPhotoUploading] = useState(false);
      const [editModal, setEditModal] = useState(false);
      const [profileSaving, setProfileSaving] = useState(false);
      const [usernameError, setUsernameError] = useState("");
      const [usernameChecking, setUsernameChecking] = useState(false);
      const [shareCopied, setShareCopied] = useState(false);
      const isSelf = profileUid === currentUser.uid;

      // Edit fields state
      const [editUsername, setEditUsername]     = useState("");
      const [editBio, setEditBio]               = useState("");
      const [editBirthDate, setEditBirthDate]   = useState("");
      const [editGender, setEditGender]         = useState("");
      const [editCity, setEditCity]             = useState("");
      const [editCountry, setEditCountry]       = useState("");
      const [editPhone, setEditPhone]           = useState("");
      const [editEmail, setEditEmail]           = useState("");
      const [editUniversity, setEditUniversity] = useState("");
      const [editCollege, setEditCollege]       = useState("");
      const [editHighschool, setEditHighschool] = useState("");
      const [editRelStatus, setEditRelStatus]   = useState("");

      // Profile pic upload (same resize logic as SettingsScreen)
      const handleProfilePhotoUpload = async (e) => {
        const file = e.target.files?.[0]; if(!file) return;
        if(!file.type.startsWith("image/")){ alert("শুধু ছবি আপলোড করুন!"); return; }
        setPhotoUploading(true);
        try {
          const canvas = document.createElement("canvas");
          const img = new Image();
          await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = ev => {
              img.onload = () => {
                const MAX=320; let w=img.width, h=img.height;
                if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
                canvas.width=w; canvas.height=h;
                canvas.getContext("2d").drawImage(img,0,0,w,h);
                resolve();
              };
              img.onerror=reject; img.src=ev.target.result;
            };
            reader.onerror=reject; reader.readAsDataURL(file);
          });
          const base64 = canvas.toDataURL("image/jpeg", 0.82);
          const url = await uploadToImgBB(base64, `profile_${currentUser.uid}_${Date.now()}`);
          await db.ref(`/users/${currentUser.uid}/photo`).set(url);
          // cache invalidate করো — অন্যরা এই profile খুললে সাথে সাথে নতুন ছবি পাবে
          delete _userProfileCache[currentUser.uid];
          setProfileUser(prev => prev ? {...prev, photo: url} : prev);
          // সব existing posts-এর authorPhoto আপডেট করো
          const postsSnap = await db.ref("/posts").orderByChild("authorUid").equalTo(currentUser.uid).once("value");
          const postsData = postsSnap.val()||{};
          const updates = {};
          Object.keys(postsData).forEach(pid=>{ updates[`/posts/${pid}/authorPhoto`]=url; });
          if(Object.keys(updates).length>0) await db.ref().update(updates);
          // friends list-এও photo আপডেট করো
          const friendsSnap = await db.ref(`/friends/${currentUser.uid}`).once("value");
          const friendsData = friendsSnap.val()||{};
          const friendUpdates = {};
          Object.keys(friendsData).forEach(fid=>{ friendUpdates[`/friends/${fid}/${currentUser.uid}/photo`]=url; });
          if(Object.keys(friendUpdates).length>0) await db.ref().update(friendUpdates);
        } catch(err) { alert("ছবি আপলোড ব্যর্থ: " + err.message); }
        setPhotoUploading(false);
        e.target.value = "";
      };

      // Username uniqueness check (debounced)
      const checkUsername = async (val) => {
        const cleaned = val.toLowerCase().replace(/[^a-z0-9_.]/g,"");
        setEditUsername(cleaned);
        if(!cleaned || cleaned === (profileUser?.username||"").toLowerCase()) { setUsernameError(""); return; }
        if(cleaned.length < 3) { setUsernameError("কমপক্ষে ৩ অক্ষর দিন"); return; }
        setUsernameChecking(true);
