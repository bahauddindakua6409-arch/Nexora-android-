    };

    const VideoTile = ({track, isLocal=false, name="", emoji="👤", photo=null, speaking=false}) => {
      const vidRef = useRef(null);
      useEffect(() => {
        const videoEl = vidRef.current;
        if (!track || !videoEl) return;
        // Primary: LiveKit attach
        try {
          track.attach(videoEl);
        } catch(e) {
          // Fallback: set srcObject directly using the raw MediaStreamTrack
          try {
            if (track.mediaStreamTrack) {
              videoEl.srcObject = new MediaStream([track.mediaStreamTrack]);
            }
          } catch(e2) {}
        }
        safePlay(videoEl);
        return () => {
          try { track.detach(videoEl); } catch(e) {}
          try { videoEl.srcObject = null; } catch(e) {}
        };
      }, [track]);

      // track.isMuted = publisher muted their cam; hasVideo = track exists & not muted
      const hasVideo = !!(track && !track.isMuted);

      return (
        <div style={{position:"relative",width:"100%",height:"100%",background:"rgba(13,13,24,.9)",borderRadius:16,overflow:"hidden",
          border: speaking ? "2px solid var(--green)" : "1px solid rgba(0,212,255,.15)",
          boxShadow: speaking ? "0 0 18px rgba(16,255,176,.45)" : "none",
          transition:"border-color .2s,box-shadow .2s"
        }}>
          {/* Always render <video> so ref is available when track arrives */}
          <video ref={vidRef} autoPlay playsInline muted={isLocal}
            style={{width:"100%",height:"100%",objectFit:"cover",display:hasVideo?"block":"none",transform:isLocal?"scaleX(-1)":"none"}}/>
          {!hasVideo && (
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
              <div style={{width:56,height:56,borderRadius:"50%",overflow:"hidden",border:`2px solid ${speaking?"var(--green)":"rgba(0,212,255,.3)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,background:"rgba(124,58,237,.25)"}}>
                {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:emoji}
              </div>
              <p style={{fontSize:11,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif",fontWeight:500}}>{name}</p>
            </div>
          )}
          <div style={{position:"absolute",bottom:6,left:8,background:"rgba(0,0,0,.65)",borderRadius:8,padding:"3px 8px",fontSize:10,color:"white",fontFamily:"'Exo 2',sans-serif",maxWidth:"82%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
            {speaking&&<span style={{color:"var(--green)",fontSize:9,animation:"wave 0.6s ease-in-out infinite"}}>🎤</span>}
            {name}{isLocal?" (আপনি)":""}
          </div>
        </div>
      );
    };

    const GroupCallScreen = ({user, setScreen, callConfig, onMinimize, pipState}) => {
      const LK = window.LivekitClient;
      const roomRef = useRef(null);
      const destroyedRef = useRef(false);
      const timerRef = useRef(null);
      const isPipRef = useRef(false);
      const facingModeRef = useRef('user');
      const [phase, setPhase] = useState(pipState ? "call" : "lobby");
      const [inputId, setInputId] = useState(pipState ? pipState.roomDisplayId||"" : (callConfig?.roomId||""));
      const [isVideo, setIsVideo] = useState(pipState ? (pipState.isVideo!==undefined?pipState.isVideo:true) : (callConfig?.callType!=="audio"));
      const [joining, setJoining] = useState(false);
      const [err, setErr] = useState("");
      const [sec, setSec] = useState(pipState ? pipState.sec||0 : 0);
      const [roomDisplayId, setRoomDisplayId] = useState(pipState ? pipState.roomDisplayId||"" : "");
      const [participants, setParticipants] = useState([]);
      const [muted, setMuted] = useState(pipState ? pipState.muted||false : false);
      const [camOff, setCamOff] = useState(pipState ? pipState.camOff||false : false);
      const [netQuality, setNetQuality] = useState("good");
      const [activeSpeakerIds, setActiveSpeakerIds] = useState(new Set());
      const audioElsRef = useRef(pipState && pipState.audioElsRef ? pipState.audioElsRef.current : []);
      const remoteTracksRef = useRef(pipState && pipState.remoteTracksRef ? pipState.remoteTracksRef.current : {});
      const [permDenied, setPermDenied] = useState(false);

      const buildParticipantList = useCallback((room) => {
        const list = [];
        // Local participant
        const localNameRaw = room.localParticipant.name || "";
        const localNameData = (() => { try { const d=JSON.parse(localNameRaw); return typeof d==="object"?d:{name:localNameRaw}; } catch(e){ return {name:localNameRaw||user.name}; } })();
        const localCamPub = getTrackPub(room.localParticipant, LK.Track.Source.Camera);
        list.push({
          identity: room.localParticipant.identity,
          name: localNameData.name || user.name,
          emoji: user.emoji, photo: user.photo||null,
          cameraTrack: localCamPub?.track || null,
          isLocal: true,
        });
        // Remote participants — use remoteParticipants map
        const remotes = (room.remoteParticipants instanceof Map)
          ? room.remoteParticipants
          : (room.participants instanceof Map ? room.participants : new Map());
        remotes.forEach((p) => {
          if (p.identity === room.localParticipant.identity) return;
          const nameData = (() => { try { const d=JSON.parse(p.name||"{}"); return typeof d==="object"?d:{name:p.name||p.identity}; } catch(e) { return {name:p.name||p.identity,emoji:"👤",photo:null}; } })();
          // Use remoteTracksRef which is updated directly from TrackSubscribed events
          // (camPub?.track may be null if publication exists but track isn't subscribed yet)
          const storedTrack = remoteTracksRef.current[p.identity] || null;
          list.push({
            identity: p.identity,
            name: nameData.name || p.identity,
            emoji: nameData.emoji || "👤",
            photo: nameData.photo || null,
            cameraTrack: storedTrack,
            isLocal: false,
          });
        });
        setParticipants(list);
      }, [user, LK]);

      const leaveCall = async () => {
        isPipRef.current = false;
        destroyedRef.current = true;
        clearInterval(timerRef.current);
        clearTimeout(reconnectTimerRef.current);
        reconnectAttemptsRef.current = 0;
        if(roomRef.current?.__aloneTimer){ clearTimeout(roomRef.current.__aloneTimer); roomRef.current.__aloneTimer=null; }
        audioElsRef.current.forEach(el => { try{el.srcObject=null;el.remove();}catch(e){} });
        // Clear remote tracks map
        remoteTracksRef.current = {};
        // Remove Firebase session so "যোগ দিন" button disappears
        if(roomDisplayId) {
          try { await db.ref(`/groupCallSessions/${roomDisplayId}/${user.uid}`).remove(); } catch(e) {}
        }
        roomRef.current?.disconnect();
        await db.ref(`/users/${user.uid}/incomingGroupCall`).remove();
        setScreen("groups");
      };

      // গ্রুপ কল minimize করে floating window এ রাখো
      const handleMinimize = () => {
        if (onMinimize && phase === "call") {
          isPipRef.current = true;
          clearInterval(timerRef.current);
          timerRef.current = null;
          onMinimize({
            type: "group",
            contact: null,
            roomRef, destroyedRef, audioElsRef, remoteTracksRef,
            status: "active",
            sec, muted, camOff, isVideo,
            roomDisplayId,
            participantCount: participants.length,
            endCallFn: async () => {
              isPipRef.current = false;
              destroyedRef.current = true;
              audioElsRef.current.forEach(el => { try{el.srcObject=null;el.remove();}catch(e){} });
              remoteTracksRef.current = {};
              if(roomDisplayId) {
                try { await db.ref(`/groupCallSessions/${roomDisplayId}/${user.uid}`).remove(); } catch(e) {}
              }
              roomRef.current?.disconnect();
              try { await db.ref(`/users/${user.uid}/incomingGroupCall`).remove(); } catch(e) {}
            }
          });
        }
      };

      // Auto-reconnect tracker — কতবার reconnect চেষ্টা হয়েছে
      const reconnectAttemptsRef = useRef(0);
      const MAX_RECONNECT = 8;
      const reconnectTimerRef = useRef(null);

      const joinRoom = async (roomId, type) => {
        setErr(""); setJoining(true);

        // পুরনো room থাকলে আগে disconnect করো
        if (roomRef.current) {
          try { roomRef.current.disconnect(); } catch(e) {}
          roomRef.current = null;
        }

        // ── Inner connect helper — retry সহ ────────────────────────────────
        const doConnect = async (attempt=0) => {
          try {
            const namePayload = JSON.stringify({name:user.name, emoji:user.emoji, photo:user.photo||null});
            const room = buildLKRoom(true);
            roomRef.current = room;

            room.on(LK.RoomEvent.Connected, () => {
              reconnectAttemptsRef.current = 0; // সফল সংযোগে counter রিসেট
              setPhase("call");
              setJoining(false);
              setErr("");
              setRoomDisplayId(roomId);
              if(!timerRef.current) timerRef.current = setInterval(()=>setSec(s=>s+1), 1000);
              buildParticipantList(room);
            });
            room.on(LK.RoomEvent.ParticipantConnected, () => {
              // কেউ যোগ দিলে alone-timer বাতিল করো
              if(room.__aloneTimer){ clearTimeout(room.__aloneTimer); room.__aloneTimer=null; }
              buildParticipantList(room);
            });
            room.on(LK.RoomEvent.ParticipantDisconnected, () => {
              buildParticipantList(room);
              // কেউ বেরিয়ে গেলে দেখো শুধু local একা আছে কিনা
              const remotes = (room.remoteParticipants instanceof Map)
                ? room.remoteParticipants
                : (room.participants instanceof Map ? room.participants : new Map());
              const remoteCount = [...remotes.values()].filter(p => p.identity !== room.localParticipant.identity).length;
              if(remoteCount === 0 && !destroyedRef.current) {
                // ৫ সেকেন্ড অপেক্ষা করো — হয়তো অন্য কেউ যোগ দিতে পারে
                room.__aloneTimer = setTimeout(() => {
                  // আবার চেক করো — এর মধ্যে কেউ যোগ দিলে বের হবো না
                  const rm2 = (room.remoteParticipants instanceof Map)
                    ? room.remoteParticipants
                    : (room.participants instanceof Map ? room.participants : new Map());
                  const stillAlone = [...rm2.values()].filter(p => p.identity !== room.localParticipant.identity).length === 0;
                  if(stillAlone && !destroyedRef.current) leaveCall();
                }, 5000);
              }
            });
            room.on(LK.RoomEvent.TrackSubscribed, (track, pub, participant) => {
              if(track.kind===LK.Track.Kind.Audio){
                const el = track.attach(); el.autoplay=true;
                document.body.appendChild(el); audioElsRef.current.push(el);
              }
              if(track.kind===LK.Track.Kind.Video){
                remoteTracksRef.current[participant.identity] = track;
              }
              buildParticipantList(room);
            });
            room.on(LK.RoomEvent.TrackUnsubscribed, (track, pub, participant) => {
              if(track.kind===LK.Track.Kind.Video && participant){
                delete remoteTracksRef.current[participant.identity];
              }
              track.detach();
              buildParticipantList(room);
            });
            room.on(LK.RoomEvent.TrackMuted, () => buildParticipantList(room));
            room.on(LK.RoomEvent.TrackUnmuted, () => buildParticipantList(room));
            room.on(LK.RoomEvent.LocalTrackPublished, () => buildParticipantList(room));
            room.on(LK.RoomEvent.ActiveSpeakersChanged, (speakers) => {
              setActiveSpeakerIds(new Set(speakers.map(s => s.identity)));
            });
            room.on(LK.RoomEvent.ConnectionQualityChanged, (quality, participant) => {
              if(participant===room.localParticipant)
                setNetQuality(quality===LK.ConnectionQuality.Poor?"poor":quality===LK.ConnectionQuality.Good?"good":"medium");
            });
            room.on(LK.RoomEvent.Reconnecting, () => {
              setNetQuality("poor");
              setErr("পুনরায় সংযুক্ত হচ্ছে...");
            });
            room.on(LK.RoomEvent.Reconnected, () => {
              setNetQuality("good");
              setErr("");
              buildParticipantList(room);
            });
            room.on(LK.RoomEvent.Disconnected, (reason) => {
              if(destroyedRef.current || isPipRef.current) return;
              if(reason===LK.DisconnectReason?.CLIENT_INITIATED) return;
              // ── Auto-reconnect logic ─────────────────────────────────────
              if(reconnectAttemptsRef.current < MAX_RECONNECT) {
                reconnectAttemptsRef.current += 1;
                const delay = Math.min(2000 * reconnectAttemptsRef.current, 10000);
                setErr(`সংযোগ বিচ্ছিন্ন। ${reconnectAttemptsRef.current}/${MAX_RECONNECT} পুনরায় চেষ্টা হচ্ছে...`);
                clearTimeout(reconnectTimerRef.current);
                reconnectTimerRef.current = setTimeout(() => {
                  if(!destroyedRef.current) doConnect(reconnectAttemptsRef.current);
                }, delay);
              } else {
                setErr("সংযোগ বিচ্ছিন্ন হয়েছে। আবার চেষ্টা করুন।");
                setPhase("lobby");
                reconnectAttemptsRef.current = 0;
              }
            });

            await LKRotation.connectRoom(room, `group-${roomId}`, user.uid, namePayload, {autoSubscribe:true});

            // Firebase session register
            const sessionRef = db.ref(`/groupCallSessions/${roomId}/${user.uid}`);
            sessionRef.onDisconnect().remove();
            await sessionRef.set(true);

            // Publish media
            if(type==="audio"){
              await room.localParticipant.setMicrophoneEnabled(true);
            } else {
              await room.localParticipant.enableCameraAndMicrophone();
            }

          } catch(e) {
            if(destroyedRef.current) return;
            // Initial connect fail — retry করো (৩ বার)
            if(attempt < 2) {
              const delay = 1500 * (attempt + 1);
              setErr(`সংযোগ হচ্ছে... (${attempt+2}/3)`);
              clearTimeout(reconnectTimerRef.current);
              reconnectTimerRef.current = setTimeout(() => {
                if(!destroyedRef.current) doConnect(attempt + 1);
              }, delay);
            } else {
              setErr(e.message?.includes("LiveKit SDK") ? e.message : (e.message||"সংযোগ ব্যর্থ হয়েছে। পুনরায় চেষ্টা করুন।"));
              setJoining(false);
            }
          }
        };

        // Permission check
        try {
          const perm = await ensureMediaPermission(type !== "audio");
          if (perm.denied) { setJoining(false); setPermDenied(true); return; }
        } catch(e) { setJoining(false); return; }

        doConnect(0);
      };

      useEffect(() => {
        // PiP থেকে ফিরলে আগের room পুনরায় ব্যবহার করি
        if (pipState && pipState.roomRef && pipState.roomRef.current) {
          roomRef.current = pipState.roomRef.current;
          destroyedRef.current = pipState.destroyedRef ? pipState.destroyedRef.current : false;
          // audioElsRef & remoteTracksRef already initialized from pipState in useState
          const room = roomRef.current;
          if (!timerRef.current) {
            timerRef.current = setInterval(() => setSec(s => s+1), 1000);
          }
          setTimeout(() => buildParticipantList(room), 150);
          return () => {
            if (isPipRef.current) return;
            destroyedRef.current = true;
            clearInterval(timerRef.current);
            clearTimeout(reconnectTimerRef.current);
            audioElsRef.current.forEach(el => { try{el.srcObject=null;el.remove();}catch(e){} });
            room.disconnect();
          };
        }

        if(callConfig?.roomId){
          setInputId(callConfig.roomId);
          setIsVideo(callConfig.callType!=="audio");
          setTimeout(()=>joinRoom(callConfig.roomId, callConfig.callType||"video"), 400);
        }
        return () => {
          if (isPipRef.current) return;
          destroyedRef.current = true;
          clearInterval(timerRef.current);
          clearTimeout(reconnectTimerRef.current);
          audioElsRef.current.forEach(el => { try{el.srcObject=null;el.remove();}catch(e){} });
          roomRef.current?.disconnect();
        };
      }, []);

      const createRoom = async () => {
        if(!window.LivekitClient?.Room){setErr("LiveKit SDK লোড হয়নি। পেজ রিফ্রেশ করুন।");return;}
        const id = Math.random().toString(36).substr(2,6).toUpperCase();
        await joinRoom(id, isVideo?"video":"audio");
      };
      const joinByCode = async () => {
        if(!window.LivekitClient?.Room){setErr("LiveKit SDK লোড হয়নি। পেজ রিফ্রেশ করুন।");return;}
        const id = inputId.trim().toUpperCase();
        if(id.length<4){setErr("সঠিক Room Code লিখুন।");return;}
        await joinRoom(id, isVideo?"video":"audio");
      };

      const toggleMic = async () => {
        const v=!muted; setMuted(v);
        await roomRef.current?.localParticipant.setMicrophoneEnabled(!v);
      };
      const toggleCam = async () => {
        const v=!camOff; setCamOff(v);
        await roomRef.current?.localParticipant.setCameraEnabled(!v);
      };

      // ── Background handling: গ্রুপ কল ব্যাকগ্রাউন্ডে চলে, ক্যামেরা বন্ধ অডিও চালু ──
      const gcCamWasOnRef = useRef(false);
      useEffect(() => {
        const handleVisibility = async () => {
          const room = roomRef.current;
          if (!room || destroyedRef.current) return;
          if (document.hidden) {
            gcCamWasOnRef.current = !camOff;
            try { await room.localParticipant.setCameraEnabled(false); } catch(e) {}
          } else {
            if (gcCamWasOnRef.current && !camOff) {
              try { await room.localParticipant.setCameraEnabled(true); } catch(e) {}
            }
            if (!muted) {
              try { await room.localParticipant.setMicrophoneEnabled(true); } catch(e) {}
            }
          }
        };
        document.addEventListener('visibilitychange', handleVisibility);
        return () => document.removeEventListener('visibilitychange', handleVisibility);
      }, [camOff, muted]);
      const switchCamera = async () => {
        const room = roomRef.current;
        if (!room || !LK) return;
        const newFacing = facingModeRef.current === 'user' ? 'environment' : 'user';
        facingModeRef.current = newFacing;
        try {
          const pub = getTrackPub(room.localParticipant, LK.Track.Source.Camera);
          if (pub?.track) {
            const oldTrack = pub.track.mediaStreamTrack;
            const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: newFacing } } });
            const newVideoTrack = newStream.getVideoTracks()[0];
            await pub.track.replaceTrack(newVideoTrack);
            if (oldTrack) oldTrack.stop();
            buildParticipantList(room);
          } else {
            // Camera was off — just switch facing mode for next enable
          }
        } catch(e) { console.error('Switch camera:', e); }
      };
      const shareRoom = () => {
        const msg=`NEXORA গ্রুপ কলে যোগ দিন! Room code: ${roomDisplayId}`;
        if(navigator.share)navigator.share({title:"Group Call",text:msg,url:window.location.href});
        else{try{navigator.clipboard.writeText(roomDisplayId);}catch(e){}alert("Room code copied: "+roomDisplayId);}
      };
      const inviteFriends = async () => {
        const friendsSnap = await db.ref(`/friends/${user.uid}`).get();
        const friendUids = Object.keys(friendsSnap.val()||{});
        const roomId = roomDisplayId;
        const callType = isVideo?"video":"audio";
        for(const uid of friendUids){
          const friendSnap=await db.ref(`/users/${uid}`).get();
          if(friendSnap.exists()){
            db.ref(`/users/${uid}/incomingGroupCall`).set({
              roomId, callType, callerUid:user.uid, callerName:user.name, callerEmoji:user.emoji, ts:firebase.database.ServerValue.TIMESTAMP
            });
          }
        }
        alert(`সব বন্ধুকে গ্রুপ কলে আমন্ত্রণ পাঠানো হয়েছে! Room: ${roomId}`);
      };

      const netColor = netQuality==="poor"?"var(--red)":netQuality==="medium"?"var(--amber)":"var(--green)";

      // ── These hooks MUST be here (before any conditional return) ─────────────
      const [showParticipants, setShowParticipants] = useState(false);
      const [toasts, setToasts] = useState([]);
      const prevParticipantsRef = useRef(new Set());

      useEffect(()=>{
        const curIds=new Set(participants.map(p=>p.identity));
        const prevIds=prevParticipantsRef.current;
        if(prevIds.size>0){
          curIds.forEach(id=>{
            if(!prevIds.has(id)){
              const p=participants.find(pp=>pp.identity===id);
              if(p&&!p.isLocal){
                const t={id:Date.now(),text:`${p.name||"কেউ"} যোগ দিয়েছে`,type:"join"};
                setToasts(ts=>[...ts,t]);
                setTimeout(()=>setToasts(ts=>ts.filter(tt=>tt.id!==t.id)),3000);
              }
            }
          });
          prevIds.forEach(id=>{
            if(!curIds.has(id)){
              const t={id:Date.now()+Math.random(),text:"কেউ বের হয়ে গেছে",type:"leave"};
              setToasts(ts=>[...ts,t]);
              setTimeout(()=>setToasts(ts=>ts.filter(tt=>tt.id!==t.id)),3000);
            }
          });
        }
        prevParticipantsRef.current=curIds;
      },[participants]);

      // ── LOBBY ────────────────────────────────────────────────────────────────
      const lkLoaded = !!(window.LivekitClient && window.LivekitClient.Room);

      if (permDenied) return (
        <PermissionDeniedScreen needVideo={isVideo} onBack={(granted) => {
          if (granted) setPermDenied(false);
          else setScreen("groups");
        }}/>
      );

      if(phase==="lobby") return(
        <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at center,#0d0d25 0%,#050508 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:22,padding:24,position:"relative"}}>
          <button onClick={()=>setScreen("groups")} style={{position:"absolute",top:20,left:20,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:10,padding:10,cursor:"pointer",backdropFilter:"blur(12px)"}}><Ic n="back" s={18} c="white"/></button>
          <div style={{textAlign:"center"}}>
            <p style={{fontSize:56,marginBottom:10}}>📹</p>
            <h2 style={{fontFamily:"Orbitron",fontSize:18,fontWeight:700,background:"linear-gradient(135deg,var(--purple2),var(--blue))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>GROUP CALL</h2>
            <p style={{color:"var(--text2)",fontSize:12,marginTop:6}}>SFU • সর্বোচ্চ ২০ জন</p>
            {!lkLoaded&&<p style={{color:"var(--amber)",fontSize:11,marginTop:8,background:"rgba(255,159,67,.08)",border:"1px solid rgba(255,159,67,.25)",borderRadius:8,padding:"6px 12px"}}>⚠️ লোড হচ্ছে... পেজ রিফ্রেশ করুন যদি সমস্যা হয়।</p>}
          </div>
          <div style={{width:"100%",maxWidth:340}}>
            <div style={{display:"flex",gap:10,marginBottom:16,background:"rgba(255,255,255,.06)",borderRadius:14,padding:4}}>
              <button onClick={()=>setIsVideo(true)} style={{flex:1,padding:"9px",borderRadius:11,border:"none",background:isVideo?"linear-gradient(135deg,var(--purple),var(--blue))":"none",color:isVideo?"white":"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13}}>📹 ভিডিও</button>
              <button onClick={()=>setIsVideo(false)} style={{flex:1,padding:"9px",borderRadius:11,border:"none",background:!isVideo?"linear-gradient(135deg,var(--purple),var(--blue))":"none",color:!isVideo?"white":"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13}}>🎙️ শুধু অডিও</button>
            </div>
            <button onClick={createRoom} disabled={joining} style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:14,color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:15,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:joining?0.7:1}}>
              {joining?<Spinner size={18} color="white"/>:<>✨ নতুন Room তৈরি করুন</>}
            </button>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
              <div style={{flex:1,height:1,background:"var(--gb)"}}/>
              <span style={{color:"var(--text2)",fontSize:12}}>অথবা</span>
              <div style={{flex:1,height:1,background:"var(--gb)"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={inputId} onChange={e=>setInputId(e.target.value.toUpperCase())} placeholder="Room Code লিখুন..." style={{flex:1,textTransform:"uppercase",letterSpacing:2,fontWeight:700,textAlign:"center"}} maxLength={8}/>
              <button onClick={joinByCode} disabled={joining} style={{padding:"12px 16px",background:"rgba(0,212,255,.15)",border:"1px solid rgba(0,212,255,.3)",borderRadius:12,color:"var(--blue)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14}}>
                {joining?<Spinner size={16} color="var(--blue)"/>:"যোগ"}
              </button>
            </div>
            {err&&<p style={{color:"var(--red)",fontSize:13,marginTop:10,textAlign:"center"}}>{err}</p>}
          </div>
        </div>
      );

      // ── CALL SCREEN ────────────────────────────────────────────────────────────
      const pCount=participants.length;
      const hasDominant=pCount>=5;
      const dominantSpeaker=hasDominant?participants.find(p=>activeSpeakerIds.has(p.identity))||participants[0]:null;
      const otherParticipants=hasDominant?participants.filter(p=>p!==dominantSpeaker):participants;

      const NetQIcon=({quality})=>{
        const c=quality==="poor"?"var(--red)":quality==="medium"?"var(--amber)":"var(--green)";
        return <div style={{position:"absolute",top:6,right:6,zIndex:5}} title={quality}><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M1 20h4V10h-4v10z" fill={c} opacity={quality==="poor"?.4:1}/><path d="M7 20h4V7H7v13z" fill={c} opacity={quality==="poor"?.3:quality==="medium"?.5:1}/><path d="M13 20h4V4h-4v16z" fill={c} opacity={quality==="good"?1:.3}/><path d="M19 20h4V1h-4v19z" fill={c} opacity={quality==="good"?1:.2}/></svg></div>;
      };

      return(
        <div style={{height:"100vh",background:"#050508",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
          {/* Toast notifications */}
          <div style={{position:"absolute",top:60,left:"50%",transform:"translateX(-50%)",zIndex:100,display:"flex",flexDirection:"column",gap:6,alignItems:"center",pointerEvents:"none"}}>
            {toasts.map(t=>(
              <div key={t.id} style={{padding:"6px 16px",borderRadius:20,background:t.type==="join"?"rgba(16,255,176,.15)":"rgba(255,59,92,.15)",border:`1px solid ${t.type==="join"?"rgba(16,255,176,.3)":"rgba(255,59,92,.3)"}`,color:t.type==="join"?"var(--green)":"var(--red)",fontSize:12,fontFamily:"'Exo 2',sans-serif",fontWeight:600,animation:"slide-up .3s ease",backdropFilter:"blur(8px)"}}>
                {t.type==="join"?"✅ ":"👋 "}{t.text}
              </div>
            ))}
          </div>

          {/* Header */}
          <div style={{padding:"8px 14px",background:"rgba(5,5,8,.95)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(168,85,247,.15)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {onMinimize&&<button onClick={handleMinimize} title="মিনিমাইজ করুন" style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:10,padding:"5px 8px",cursor:"pointer",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",gap:4}}><Ic n="back" s={16} c="white"/><span style={{fontSize:9,color:"rgba(255,255,255,.7)",fontFamily:"'Exo 2',sans-serif"}}>মিনি</span></button>}
              <div>
                <p style={{fontFamily:"Orbitron",fontSize:11,fontWeight:700,color:"var(--blue)"}}>ROOM: {roomDisplayId}</p>
                <p style={{fontSize:10,color:netColor}}>{netQuality==="poor"?"● দুর্বল":netQuality==="medium"?"● সাধারণ":"● ভালো"}</p>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4,background:"rgba(255,159,67,.1)",padding:"4px 10px",borderRadius:12,border:"1px solid rgba(255,159,67,.2)"}}>
              <span style={{fontFamily:"Orbitron",fontSize:14,fontWeight:700,color:"var(--amber)"}}>{fmtTime(sec)}</span>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>setShowParticipants(true)} style={{background:"rgba(168,85,247,.12)",border:"1px solid rgba(168,85,247,.25)",borderRadius:10,padding:"6px 10px",cursor:"pointer",color:"var(--purple2)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>👥 {pCount}</button>
              <button onClick={shareRoom} style={{background:"rgba(0,212,255,.12)",border:"1px solid rgba(0,212,255,.25)",borderRadius:10,padding:"6px 8px",cursor:"pointer",color:"var(--blue)",fontSize:11}}>📋</button>
              <button onClick={inviteFriends} style={{background:"rgba(168,85,247,.12)",border:"1px solid rgba(168,85,247,.25)",borderRadius:10,padding:"6px 8px",cursor:"pointer",color:"var(--purple2)",fontSize:11}}>➕</button>
            </div>
          </div>

          {/* Video Grid - Adaptive Layout */}
          <div style={{flex:1,overflowY:"auto",padding:6,display:"flex",flexDirection:"column",gap:6}}>
            {hasDominant&&dominantSpeaker&&(
              <div style={{flex:2,minHeight:200,position:"relative"}}>
                <NetQIcon quality={netQuality}/>
                <VideoTile track={dominantSpeaker.cameraTrack} isLocal={dominantSpeaker.isLocal} name={dominantSpeaker.name} emoji={dominantSpeaker.emoji} photo={dominantSpeaker.photo} speaking={activeSpeakerIds.has(dominantSpeaker.identity)}/>
              </div>
            )}
            <div style={{flex:hasDominant?1:1,display:"grid",gridTemplateColumns:pCount<=1?"1fr":pCount<=2?"1fr 1fr":pCount<=4?"1fr 1fr":"repeat(auto-fill,minmax(120px,1fr))",gap:6,alignContent:"start",minHeight:hasDominant?120:undefined}}>
              {(hasDominant?otherParticipants:participants).map(p=>(
                <div key={p.identity} style={{height:pCount<=2?"calc(100vh - 180px)":pCount<=4?"calc((100vh-200px)/2)":hasDominant?120:"calc((100vh-220px)/3)",minHeight:hasDominant?100:100,position:"relative"}}>
                  <NetQIcon quality={netQuality}/>
                  <VideoTile track={p.cameraTrack} isLocal={p.isLocal} name={p.name} emoji={p.emoji} photo={p.photo} speaking={activeSpeakerIds.has(p.identity)}/>
                </div>
              ))}
            </div>
          </div>

          {/* Controls */}
          <div style={{padding:"12px 0 26px",display:"flex",flexDirection:"column",alignItems:"center",gap:10,background:"linear-gradient(transparent,rgba(0,0,0,.8))",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"center",gap:14}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <button className="call-btn" onClick={toggleMic} style={{background:muted?"rgba(255,59,92,.2)":"rgba(255,255,255,.1)",border:`1px solid ${muted?"rgba(255,59,92,.5)":"rgba(255,255,255,.2)"}`}}><Ic n={muted?"micOff":"mic"} s={22} c={muted?"var(--red)":"white"}/></button>
                <span style={{fontSize:9,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif"}}>{muted?"মিউট":"মাইক"}</span>
              </div>
              {isVideo&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <button className="call-btn" onClick={toggleCam} style={{background:camOff?"rgba(255,59,92,.2)":"rgba(255,255,255,.1)",border:`1px solid ${camOff?"rgba(255,59,92,.5)":"rgba(255,255,255,.2)"}`}}><Ic n={camOff?"camOff":"cam"} s={22} c={camOff?"var(--red)":"white"}/></button>
                <span style={{fontSize:9,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif"}}>{camOff?"ক্যাম বন্ধ":"ক্যামেরা"}</span>
              </div>}
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <button className="call-btn" onClick={leaveCall} style={{background:"var(--red)",border:"none",width:64,height:64,boxShadow:"var(--glow-r)"}}><Ic n="endCall" s={24} c="white"/></button>
                <span style={{fontSize:9,color:"var(--red)",fontFamily:"'Exo 2',sans-serif"}}>শেষ</span>
              </div>
            </div>
          </div>

          {/* Participants Panel */}
          {showParticipants&&(
            <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,.7)",backdropFilter:"blur(8px)"}} onClick={e=>{if(e.target===e.currentTarget)setShowParticipants(false);}}>
              <div style={{position:"absolute",bottom:0,left:0,right:0,maxHeight:"60vh",background:"var(--bg2)",borderRadius:"24px 24px 0 0",border:"1px solid var(--gb)",padding:"20px 16px 30px",animation:"slide-up .25s ease",overflowY:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <h3 style={{fontFamily:"Orbitron",fontSize:15,fontWeight:700,color:"var(--blue)"}}>👥 অংশগ্রহণকারী ({pCount})</h3>
                  <button onClick={()=>setShowParticipants(false)} style={{background:"none",border:"none",color:"var(--text2)",cursor:"pointer",fontSize:18}}>✕</button>
                </div>
                {participants.map(p=>(
                  <div key={p.identity} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 8px",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,overflow:"hidden",border:activeSpeakerIds.has(p.identity)?"2px solid var(--green)":"2px solid transparent"}}>
                      {p.photo?<img src={p.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:p.emoji}
                    </div>
                    <div style={{flex:1}}>
                      <p style={{fontWeight:600,fontSize:14}}>{p.name}{p.isLocal?" (আপনি)":""}</p>
                      <p style={{fontSize:10,color:activeSpeakerIds.has(p.identity)?"var(--green)":"var(--text2)"}}>{activeSpeakerIds.has(p.identity)?"🎙️ কথা বলছে":"নীরব"}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };
    const AVATAR_EMOJIS=["🧑‍💻","👩‍🎨","👨‍🎤","👩‍💼","🧑‍🚀","👩‍🔬","👨‍🍳","👩‍🎓","🧑‍🎨","👨‍💼","🧑‍🔧","👩‍🏫","😎","🦊","🐺","🦁","🐻","🐼","🦋","🌟","🎭","🚀","🎯","💎"];

    const SettingsScreen = ({user,setUser,onLogout}) => {
      const [notifs,setNotifs]=useState(true);
      const [modal,setModal]=useState(null);
      const [newName,setNewName]=useState(user?.name||"");
      const [saving,setSaving]=useState(false);
      const [photoUploading,setPhotoUploading]=useState(false);
      // ── Developer Info ─────────────────────────────────────────────────────────
      const [devPhoto,setDevPhoto]=useState(null);
      const [devPhotoLoading,setDevPhotoLoading]=useState(false);
      const devPhotoInputRef=useRef(null);

      useEffect(()=>{
        // Firebase থেকে developer ছবি লোড করো
        db.ref("/devInfo/photo").once("value",snap=>{
          if(snap.val()) setDevPhoto(snap.val());
        });
      },[]);

      const handleDevPhotoUpload=async(e)=>{
        const file=e.target.files?.[0]; if(!file) return;
        if(!file.type.startsWith("image/")){alert("শুধু ছবি আপলোড করুন!");return;}
        setDevPhotoLoading(true);
        try {
          const canvas=document.createElement("canvas");
          const img=new Image();
          await new Promise((resolve,reject)=>{
            const reader=new FileReader();
            reader.onload=ev=>{
              img.onload=()=>{
                const MAX=600; let w=img.width,h=img.height;
                if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
                canvas.width=w; canvas.height=h;
                canvas.getContext("2d").drawImage(img,0,0,w,h);
                resolve();
              };
              img.onerror=reject; img.src=ev.target.result;
            };
            reader.onerror=reject; reader.readAsDataURL(file);
          });
          const base64=canvas.toDataURL("image/jpeg",0.88);
          const url=await uploadToImgBB(base64,`developer_photo_${Date.now()}`);
          await db.ref("/devInfo/photo").set(url);
          setDevPhoto(url);
        } catch(err){ alert("ছবি আপলোড ব্যর্থ: "+err.message); }
        setDevPhotoLoading(false);
        e.target.value="";
      };

      const saveName=async()=>{
        const n=newName.trim();if(!n||n===user.name)return setModal(null);
        setSaving(true);
        await db.ref(`/users/${user.uid}/name`).set(n);
        setUser(u=>({...u,name:n}));
        setSaving(false);setModal(null);
      };
      const saveAvatar=async(emoji)=>{
        await db.ref(`/users/${user.uid}/emoji`).set(emoji);
        setUser(u=>({...u,emoji}));setModal(null);
      };
      const handlePhotoFile=async(e)=>{
        const file=e.target.files?.[0];if(!file)return;
        if(!file.type.startsWith("image/")){alert("শুধু ছবি আপলোড করুন!");return;}
        setPhotoUploading(true);
        try {
          const canvas=document.createElement("canvas");
          const img=new Image();
          const reader=new FileReader();
          await new Promise((resolve,reject)=>{
            reader.onload=ev=>{
              img.onload=()=>{
                const MAX=320;let w=img.width,h=img.height;
                if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
                canvas.width=w;canvas.height=h;
                canvas.getContext("2d").drawImage(img,0,0,w,h);
                resolve();
              };
              img.onerror=reject;
              img.src=ev.target.result;
            };
            reader.onerror=reject;
            reader.readAsDataURL(file);
          });
          const base64=canvas.toDataURL("image/jpeg",0.82);
          const fileName=`profile_${user.uid}_${Date.now()}`;
          const photoUrl=await uploadToImgBB(base64,fileName);
          await db.ref(`/users/${user.uid}/photo`).set(photoUrl);
          setUser(u=>({...u,photo:photoUrl}));
        } catch(err) {
          alert("ছবি আপলোড ব্যর্থ হয়েছে: "+(err.message||"আবার চেষ্টা করুন"));
        }
        setPhotoUploading(false);setModal(null);
        e.target.value="";
      };
      const removePhoto=async()=>{
        await db.ref(`/users/${user.uid}/photo`).remove();
        setUser(u=>({...u,photo:null}));setModal(null);
      };
      const ProfilePic=({size=68,fontSize=30})=>(
        user?.photo
          ?<img src={user.photo} alt="profile" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",display:"block"}}/>
          :<div style={{width:size,height:size,borderRadius:"50%",background:"linear-gradient(135deg,var(--purple),var(--blue))",display:"flex",alignItems:"center",justifyContent:"center",fontSize,boxShadow:"var(--glow-p)"}}>{user?.emoji}</div>
      );

      return(
        <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:90}}>
          <div style={{padding:"16px 20px",background:"rgba(5,5,8,.92)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(0,212,255,.1)"}}>
            <h1 style={{fontFamily:"Orbitron",fontSize:18,fontWeight:700,letterSpacing:1,background:"linear-gradient(135deg,var(--blue),var(--purple2))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Settings</h1>
          </div>
          <div style={{padding:"20px 16px"}}>
            <div className="glass" style={{padding:"20px",marginBottom:22,borderRadius:22,display:"flex",alignItems:"center",gap:16,background:"linear-gradient(135deg,rgba(124,58,237,.1),rgba(0,212,255,.05))"}}>
              <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setModal("photo")}>
                <ProfilePic/>
                <div style={{position:"absolute",bottom:0,right:0,width:22,height:22,borderRadius:"50%",background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,border:"2px solid var(--bg)"}}>📷</div>
              </div>
              <div style={{flex:1}}>
                <p style={{fontWeight:700,fontSize:19}}>{user?.name}</p>
                <p style={{color:"var(--text2)",fontSize:12,marginTop:3}}>{user?.email}</p>
                <p style={{color:"var(--green)",fontSize:11,marginTop:5}}>● Online</p>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              <div onClick={()=>{setNewName(user?.name||"");setModal("name");}} className="glass" style={{padding:"14px 16px",borderRadius:17,display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                <div style={{width:42,height:42,borderRadius:13,background:"rgba(0,212,255,.11)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="user" s={20} c="var(--blue)"/></div>
                <div style={{flex:1}}><p style={{fontWeight:600,fontSize:14}}>অ্যাকাউন্ট</p><p style={{color:"var(--text2)",fontSize:12,marginTop:1}}>{user?.email}</p></div>
                <Ic n="back" s={16} c="var(--text2)"/>
              </div>
              <div className="glass" style={{padding:"14px 16px",borderRadius:17,display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:42,height:42,borderRadius:13,background:"rgba(16,255,176,.11)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="bell" s={20} c="var(--green)"/></div>
                <div style={{flex:1}}><p style={{fontWeight:600,fontSize:14}}>নোটিফিকেশন</p></div>
                <Toggle on={notifs} onChange={v=>{setNotifs(v);if(v)requestNotifPermission();}} color="var(--green)"/>
              </div>
              <div onClick={()=>setModal("saved")} className="glass" style={{padding:"14px 16px",borderRadius:17,display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                <div style={{width:42,height:42,borderRadius:13,background:"rgba(168,85,247,.11)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>🔖</div>
                <div style={{flex:1}}><p style={{fontWeight:600,fontSize:14}}>সেভ করা পোস্ট</p><p style={{color:"var(--text2)",fontSize:12,marginTop:1}}>আপনার সংরক্ষিত পোস্ট দেখুন</p></div>
                <Ic n="back" s={16} c="var(--text2)"/>
              </div>
              <div onClick={()=>setModal("developer")} className="glass" style={{padding:"14px 16px",borderRadius:17,display:"flex",alignItems:"center",gap:14,cursor:"pointer",border:"1px solid rgba(255,215,0,.15)"}}>
                <div style={{width:42,height:42,borderRadius:13,background:"rgba(255,215,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>👨‍💻</div>
                <div style={{flex:1}}><p style={{fontWeight:600,fontSize:14}}>ডেভলপারের সাথে পরিচিত হন</p><p style={{color:"var(--text2)",fontSize:12,marginTop:1}}>অ্যাপটি কে তৈরি করেছে জানুন</p></div>
                <Ic n="back" s={16} c="var(--text2)"/>
              </div>
              <div onClick={onLogout} className="glass" style={{padding:"14px 16px",borderRadius:17,display:"flex",alignItems:"center",gap:14,cursor:"pointer",border:"1px solid rgba(255,59,92,.2)"}}>
                <div style={{width:42,height:42,borderRadius:13,background:"rgba(255,59,92,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="logout" s={20} c="var(--red)"/></div>
                <div style={{flex:1}}><p style={{fontWeight:600,fontSize:14,color:"var(--red)"}}>সাইন আউট</p></div>
              </div>
            </div>
            <DevFooter/>
          </div>
          {modal==="photo"&&(
            <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,.75)",backdropFilter:"blur(12px)"}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
              <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"24px 20px 36px",border:"1px solid var(--gb)",animation:"slide-up .25s ease"}}>
                <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:15,marginBottom:20}}>প্রোফাইল ছবি</p>
                <div style={{display:"flex",justifyContent:"center",marginBottom:22}}><ProfilePic size={90} fontSize={40}/></div>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
                  <label style={{display:"block"}}>
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoFile} disabled={photoUploading}/>
                    <div style={{padding:"13px",background:"linear-gradient(135deg,var(--purple),var(--blue))",borderRadius:13,color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:photoUploading?0.6:1}}>
                      {photoUploading?<Spinner size={16}/>:"📷 ফোন থেকে ছবি আপলোড করুন"}
                    </div>
                  </label>
                  <button onClick={()=>setModal("avatar")} style={{padding:"13px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:13,color:"var(--text)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13}}>
                    😊 Emoji Avatar বেছে নিন
                  </button>
                  {user?.photo&&<button onClick={removePhoto} style={{padding:"11px",background:"rgba(255,59,92,.08)",border:"1px solid rgba(255,59,92,.25)",borderRadius:13,color:"var(--red)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13}}>🗑️ ছবি সরিয়ে দিন</button>}
                </div>
                <button onClick={()=>setModal(null)} style={{width:"100%",padding:"12px",background:"rgba(255,255,255,.05)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif"}}>বাতিল</button>
              </div>
            </div>
          )}
          {modal==="avatar"&&(
            <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,.75)",backdropFilter:"blur(12px)"}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
              <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"24px 20px 36px",border:"1px solid var(--gb)",animation:"slide-up .25s ease"}}>
                <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:15,marginBottom:20}}>Avatar বেছে নিন</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:20}}>
                  {AVATAR_EMOJIS.map(e=>(
                    <button key={e} onClick={()=>saveAvatar(e)} style={{fontSize:28,background:user.emoji===e?"rgba(0,212,255,.15)":"none",border:`2px solid ${user.emoji===e?"var(--blue)":"transparent"}`,borderRadius:12,padding:6,cursor:"pointer"}}>
                      {e}
                    </button>
                  ))}
                </div>
                <button onClick={()=>setModal(null)} style={{width:"100%",padding:"12px",background:"rgba(255,255,255,.05)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif"}}>বাতিল</button>
              </div>
            </div>
          )}
          {modal==="name"&&(
            <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,.75)",backdropFilter:"blur(12px)"}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
              <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"24px 20px 36px",border:"1px solid var(--gb)",animation:"slide-up .25s ease"}}>
                <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:15,marginBottom:16}}>Display Name পরিবর্তন করুন</p>
                <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="আপনার নাম" style={{marginBottom:14}} onKeyDown={e=>e.key==="Enter"&&saveName()}/>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setModal(null)} style={{flex:1,padding:"12px",background:"rgba(255,255,255,.05)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif"}}>বাতিল</button>
                  <button onClick={saveName} disabled={saving} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:12,color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    {saving?<><Spinner size={14}/> সেভ হচ্ছে...</>:"সেভ করুন"}
                  </button>
                </div>
              </div>
            </div>
          )}
          {modal==="developer"&&(
            <div style={{position:"fixed",inset:0,zIndex:500,overflowY:"auto",background:"rgba(0,0,0,.85)",backdropFilter:"blur(14px)"}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
              <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"24px 20px 50px",border:"1px solid rgba(255,215,0,.2)",marginTop:60,animation:"slide-up .25s ease"}}>
                {/* Header */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
                  <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:15,background:"linear-gradient(135deg,#ffd700,var(--amber))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>👨‍💻 ডেভলপারের সাথে পরিচিত হন</p>
                  <button onClick={()=>setModal(null)} style={{background:"none",border:"none",color:"var(--text2)",fontSize:20,cursor:"pointer",padding:4}}>✕</button>
                </div>

                {/* Developer Photo */}
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:20}}>
                  <div style={{position:"relative",marginBottom:12}}>
                    {devPhoto
                      ? <img src={devPhoto} alt="Developer" style={{width:130,height:130,borderRadius:"50%",objectFit:"cover",border:"3px solid rgba(255,215,0,.5)",boxShadow:"0 0 24px rgba(255,215,0,.2)"}}/>
                      : <div style={{width:130,height:130,borderRadius:"50%",background:"linear-gradient(135deg,rgba(255,215,0,.2),rgba(124,58,237,.3))",display:"flex",alignItems:"center",justifyContent:"center",border:"3px solid rgba(255,215,0,.3)",fontSize:50}}>👨‍💻</div>
                    }
                    {/* Admin-only upload button */}
                    {user?.isAdmin&&(
                      <>
                        <input ref={devPhotoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleDevPhotoUpload}/>
                        <button
                          onClick={()=>devPhotoInputRef.current?.click()}
                          disabled={devPhotoLoading}
                          style={{position:"absolute",bottom:4,right:4,width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#ffd700,var(--amber))",border:"2px solid var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",cursor:devPhotoLoading?"not-allowed":"pointer",fontSize:14,boxShadow:"0 2px 8px rgba(0,0,0,.4)"}}
                          title="ছবি পরিবর্তন করুন"
                        >
                          {devPhotoLoading?<Spinner size={12} color="#000"/>:"📷"}
                        </button>
                      </>
                    )}
                  </div>
                  {user?.isAdmin&&(
                    <p style={{fontSize:10,color:"rgba(255,215,0,.7)",fontFamily:"'Exo 2',sans-serif",marginBottom:4}}>📷 আইকনে ক্লিক করে ছবি পরিবর্তন করুন</p>
                  )}
                </div>

                {/* Developer Bio Text */}
                <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,215,0,.12)",borderRadius:16,padding:"18px 16px",lineHeight:1.8}}>
                  <p style={{fontSize:13,color:"var(--text)",marginBottom:10,fontFamily:"'Exo 2',sans-serif"}}>
                    আসসালামু আলাইকুম ওয়া রহমাতুল্লাহ।<br/>
                    আশা করি সবাই ভালো আছেন।
                  </p>
                  <p style={{fontSize:13,color:"var(--text)",marginBottom:10,fontFamily:"'Exo 2',sans-serif"}}>
                    আমি <strong style={{color:"#ffd700"}}>মোঃ বাহাউদ্দিন ডাকুয়া</strong>। আমার পিতার নাম আলী আহমেদ ডাকুয়া। বর্তমানে আমি জাতীয় বিশ্ববিদ্যালয়ের অন-ক্যাম্পাসে ফুড অ্যান্ড নিউট্রিশন সায়েন্স বিষয়ে অধ্যয়নরত।
                  </p>
                  <p style={{fontSize:13,color:"var(--text2)",marginBottom:10,fontFamily:"'Exo 2',sans-serif"}}>
                    যদিও আমার একাডেমিক বিষয় আইটি-সম্পর্কিত নয়, তবুও প্রযুক্তি নিয়ে কাজ করার প্রতি আমার গভীর আগ্রহ ও দীর্ঘদিনের স্বপ্ন ছিল। সেই আগ্রহ থেকেই একটি অ্যাপ তৈরি করার উদ্যোগ নেওয়া—যা আমার জন্য ছিল এক বড় চ্যালেঞ্জ।
                  </p>
                  <p style={{fontSize:13,color:"var(--text2)",marginBottom:10,fontFamily:"'Exo 2',sans-serif"}}>
                    এই অ্যাপটি তৈরির পেছনে একটি ভিন্ন অভিজ্ঞতা রয়েছে। রিয়েল-টাইম ডাটাবেজ নিয়ে পড়াশোনা করার সময় হঠাৎ আমার মনে একটি চিন্তা আসে—আমি কি আমার বন্ধু-বান্ধবদের সাথে যোগাযোগের জন্য সম্পূর্ণ বিনামূল্যে ফেসবুক ও মেসেঞ্জারের মতো একটি কম্বাইন্ড অ্যাপ তৈরি করতে পারি? <strong style={{color:"var(--amber)"}}>আল্লাহু আকবার!</strong> এই চিন্তাটিই আমাকে অনুপ্রাণিত করে।
                  </p>
                  <p style={{fontSize:13,color:"var(--text2)",marginBottom:10,fontFamily:"'Exo 2',sans-serif"}}>
                    সেই রাতেই, প্রায় একটার সময়—ঘুমহীন এক মুহূর্তে—আমি কাজ শুরু করি। সম্ভবত তারিখ ছিল ৭ই এপ্রিল, ২০২৬। এরপর অল্প কিছুদিনের মধ্যেই, <strong style={{color:"var(--green)"}}>আলহামদুলিল্লাহ</strong>, আমি প্রাথমিকভাবে অ্যাপটি তৈরি করতে সক্ষম হই। সম্পূর্ণ ফ্রি রিসোর্স ব্যবহার করে তৈরি হওয়া সত্ত্বেও, <strong style={{color:"var(--amber)"}}>মাশাআল্লাহ</strong>, এটি বর্তমানে প্রায় ১০০ জন বা তার কিছু বেশি ব্যবহারকারী পরিচালনা করতে সক্ষম।

                  <p style={{fontSize:13,color:"var(--text2)",marginBottom:10,fontFamily:"'Exo 2',sans-serif"}}>
                    এই যাত্রায় কৃত্রিম বুদ্ধিমত্তা আমাকে ব্যাপকভাবে সহায়তা করেছে। পাশাপাশি আমাকে অনুপ্রেরণা দিয়েছেন আমার বড় ভাই <strong style={{color:"var(--blue)"}}>ডাকুয়া আল-আমিন আহমেদ</strong>, আমার খালাতো ভাই <strong style={{color:"var(--blue)"}}>ফয়সাল শিকদার</strong>, এবং আমার প্রিয় বন্ধুরা—বিশেষ করে <strong style={{color:"var(--blue)"}}>কেএম রাউফুর রাহিম রবি</strong>, <strong style={{color:"var(--blue)"}}>ইয়াদিত আহমেদ</strong> এবং আমার চাচাতো ভাই <strong style={{color:"var(--blue)"}}>হাসান ডাকুয়া</strong>।
                  </p>
                  <p style={{fontSize:13,color:"var(--text)",marginBottom:6,fontFamily:"'Exo 2',sans-serif"}}>
                    সবশেষে, আমি মহান আল্লাহর কাছে শুকরিয়া আদায় করছি—<strong style={{color:"var(--green)"}}>আলহামদুলিল্লাহ</strong>।
                  </p>

    };

    // ── Saved Posts Modal (Settings-এ ব্যবহৃত) ────────────────────────────────
    const SavedPostsModal = ({user, onClose}) => {
      const [savedPosts, setSavedPosts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [unsaving, setUnsaving] = useState(null);

      useEffect(()=>{
        let cancelled=false;
        const loadSaved=async()=>{
          setLoading(true);
          try {
            const snap=await db.ref(`/savedPosts/${user.uid}`).once("value");
            const savedMap=snap.val()||{};
            const ids=Object.keys(savedMap);
            if(ids.length===0){setSavedPosts([]);setLoading(false);return;}
            const postSnaps=await Promise.all(ids.map(id=>db.ref(`/posts/${id}`).once("value")));
            const posts=postSnaps
              .map((s,i)=>s.val()?{id:ids[i],...s.val(),savedTs:savedMap[ids[i]]?.ts||0}:null)
              .filter(Boolean)
              .sort((a,b)=>(b.savedTs||0)-(a.savedTs||0));
            if(!cancelled){setSavedPosts(posts);setLoading(false);}
          } catch(e){if(!cancelled){setSavedPosts([]);setLoading(false);}}
        };
        loadSaved();
        return()=>{cancelled=true;};
      },[user.uid]);

      const unsavePost=async(postId)=>{
        setUnsaving(postId);
        await db.ref(`/savedPosts/${user.uid}/${postId}`).remove();
        setSavedPosts(prev=>prev.filter(p=>p.id!==postId));
        setUnsaving(null);
      };

      return(
        <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,.85)",backdropFilter:"blur(12px)",display:"flex",flexDirection:"column"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
          <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"var(--bg)",flex:1,display:"flex",flexDirection:"column",borderRadius:"0",overflow:"hidden",animation:"slide-up .25s ease"}}>
            {/* Header */}
            <div style={{padding:"16px 18px",background:"rgba(5,5,8,.97)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(168,85,247,.2)",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
              <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",padding:"4px",color:"var(--text2)",display:"flex",alignItems:"center"}}>
                <Ic n="back" s={22} c="var(--text)"/>
              </button>
              <h2 style={{fontFamily:"Orbitron",fontSize:16,fontWeight:700,background:"linear-gradient(135deg,var(--purple2),var(--blue))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🔖 সেভ করা পোস্ট</h2>
              <span style={{marginLeft:"auto",fontSize:12,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif"}}>{savedPosts.length}টি</span>
            </div>
            {/* Content */}
            <div style={{flex:1,overflowY:"auto",padding:"14px 14px 30px"}}>
              {loading&&<div style={{textAlign:"center",padding:"60px 0"}}><Spinner size={36}/></div>}
              {!loading&&savedPosts.length===0&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text2)"}}>
                  <p style={{fontSize:48,marginBottom:16}}>🔖</p>
                  <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>কোনো সেভ করা পোস্ট নেই</p>
                  <p style={{fontSize:12}}>ফিডে পোস্টের মেনু থেকে সেভ করুন</p>
                </div>
              )}
              {!loading&&savedPosts.map(p=>(
                <div key={p.id} className="post-card" style={{marginBottom:12}}>
                  <div style={{padding:"12px 14px 10px",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.4),rgba(0,212,255,.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,overflow:"hidden",border:"2px solid rgba(0,212,255,.15)"}}>
                      {p.authorPhoto?<img src={p.authorPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:p.authorEmoji}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.authorName}</p>
                      <p style={{fontSize:10,color:"var(--text2)"}}>{p.ts?new Date(p.ts).toLocaleDateString("bn-BD",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):""}</p>
                    </div>
                    <button onClick={()=>unsavePost(p.id)} disabled={unsaving===p.id} style={{background:"rgba(168,85,247,.12)",border:"1px solid rgba(168,85,247,.3)",borderRadius:9,padding:"5px 10px",cursor:"pointer",color:"var(--purple2)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:600,flexShrink:0}}>
                      {unsaving===p.id?<Spinner size={11} color="var(--purple2)"/>:"🔖 সরান"}
                    </button>
                  </div>
                  {p.image&&<img src={p.image} alt="post" style={{width:"100%",maxHeight:280,objectFit:"cover",display:"block"}}/>}
                  {p.video&&(
                    <div style={{position:"relative",background:"#000",maxHeight:280,overflow:"hidden"}}>
                      <video src={p.video} controls playsInline preload="metadata" style={{width:"100%",maxHeight:280,display:"block",background:"#000"}}
                        onPlay={e=>{const cur=e.target;document.querySelectorAll("video").forEach(v=>{if(v!==cur&&!v.paused)v.pause();});}}
                      />
                      <div style={{position:"absolute",top:8,left:10,background:"rgba(0,0,0,.6)",borderRadius:8,padding:"2px 8px",fontSize:10,color:"#fff",fontWeight:600}}>▶ ভিডিও</div>
                    </div>
                  )}
                  {p.text&&<p style={{fontSize:13,lineHeight:1.55,padding:"8px 14px 12px",wordBreak:"break-word",whiteSpace:"pre-wrap",color:"var(--text)"}}>{p.text.length>200?p.text.slice(0,200)+"…":p.text}</p>}
                  <div style={{padding:"6px 14px 12px",display:"flex",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"var(--text2)"}}>❤️ {Object.keys(p.reactions||p.likes||{}).length}</span>
                    <span style={{fontSize:11,color:"var(--text2)"}}>💬 {p.commentCount||0}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const AdminScreen = ({user, setScreen}) => {
      const [tab, setTab] = useState("users");
      const [users, setUsers] = useState([]);
      const [banning, setBanning] = useState(null);
      const [search, setSearch] = useState("");
      const [allPosts, setAllPosts] = useState([]);
      const [allDMs, setAllDMs] = useState([]);
      const [allGroupMsgs, setAllGroupMsgs] = useState([]);
      const [groups, setGroups] = useState([]);
      const [selectedConv, setSelectedConv] = useState(null);
      const [selectedGroup, setSelectedGroup] = useState(null);
      const [convMsgs, setConvMsgs] = useState([]);
      const [groupMsgs, setGroupMsgs] = useState([]);
      const [deletingPost, setDeletingPost] = useState(null);
      const [deletingMsg, setDeletingMsg] = useState(null);
      const [deletingGroup, setDeletingGroup] = useState(null);
      // Custom confirm state — window.confirm() PWA-তে block হয়
      const [confirmState, setConfirmState] = useState(null); // {msg, onOk}
      const showConfirm = (msg, onOk) => setConfirmState({msg, onOk});
      // uid → name lookup helper
      const [usersMap, setUsersMap] = useState({});
      const [cleaningB64, setCleaningB64] = useState(false);
      const [cleanB64Result, setCleanB64Result] = useState(null);
      const [cleaningPostB64, setCleaningPostB64] = useState(false);
      const [cleanPostB64Result, setCleanPostB64Result] = useState(null);

      useEffect(()=>{
        // Admin panel: cache ব্যবহার করো — real-time দরকার নেই
        // তবে admin সবসময় fresh data দেখবে (TTL bypass করতে cache flush)
        _allUsersCache.data = null;
        loadUsersOnce(d=>{
          setUsers(Object.values(d).filter(u=>u&&u.uid&&u.uid!==user.uid));
          const map={};
          Object.values(d).forEach(u=>{ if(u&&u.uid) map[u.uid]=u.name||u.uid; });
          setUsersMap(map);
        });
      },[]);

      useEffect(()=>{
        if(tab!=="posts")return;
        const r=db.ref("/posts").orderByChild("ts").limitToLast(100);
        r.on("value",s=>{const d=s.val()||{};setAllPosts(Object.entries(d).map(([id,p])=>({id,...p})).sort((a,b)=>(b.ts||0)-(a.ts||0)));});
        return()=>r.off();
      },[tab]);

      useEffect(()=>{
        if(tab!=="dms")return;
        const r=db.ref("/userConvs");
        r.on("value",s=>{
          const d=s.val()||{};
          const convs=[];
          const seen=new Set();
          Object.entries(d).forEach(([uid,convMap])=>{
            Object.entries(convMap||{}).forEach(([otherUid,conv])=>{
              const key=[uid,otherUid].sort().join("_");
              if(!seen.has(key)){seen.add(key);convs.push({chatId:key,uid1:uid,uid2:otherUid,...conv});}
            });
          });
          setAllDMs(convs.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0)));
        });
        return()=>r.off();
      },[tab]);

      useEffect(()=>{
        if(tab!=="groups")return;
        const r=db.ref("/groups");
        r.on("value",s=>{const d=s.val()||{};setGroups(Object.entries(d).map(([id,g])=>g?{id,...g}:null).filter(Boolean).sort((a,b)=>(b.lastTs||0)-(a.lastTs||0)));});
        return()=>r.off();
      },[tab]);

      useEffect(()=>{
        if(!selectedConv)return;
        const r=db.ref(`/messages/${selectedConv}`).limitToLast(50);
        r.on("value",s=>{const d=s.val()||{};setConvMsgs(Object.entries(d).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));});
        return()=>r.off();
      },[selectedConv]);

      useEffect(()=>{
        if(!selectedGroup)return;
        const r=db.ref(`/groupMessages/${selectedGroup}`).limitToLast(50);
        r.on("value",s=>{const d=s.val()||{};setGroupMsgs(Object.entries(d).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));});
        return()=>r.off();
      },[selectedGroup]);

      const banUser=async(u)=>{
        showConfirm(`"${u.name}" কে ব্যান করবেন?`, async()=>{
          setBanning(u.uid);
          await db.ref(`/users/${u.uid}/banned`).set(true);
          await db.ref(`/users/${u.uid}/forceLogout`).set(Date.now());
          setBanning(null);setUsers(prev=>prev.map(x=>x.uid===u.uid?{...x,banned:true}:x));
        });
      };
      const unbanUser=async(u)=>{
        setBanning(u.uid);
        await db.ref(`/users/${u.uid}/banned`).remove();
        await db.ref(`/users/${u.uid}/forceLogout`).remove();
        setBanning(null);setUsers(prev=>prev.map(x=>x.uid===u.uid?{...x,banned:false}:x));
      };
      const adminDeletePost=async(postId)=>{
        showConfirm("এই পোস্ট মুছবেন?", async()=>{
          setDeletingPost(postId);
          await db.ref(`/posts/${postId}`).remove();
          await db.ref(`/postComments/${postId}`).remove();
          setDeletingPost(null);
        });
      };
      const adminDeleteGroup=async(groupId, groupName)=>{
        showConfirm(`"${groupName}" গ্রুপটি মুছবেন?`, async()=>{
          setDeletingGroup(groupId);
          await db.ref(`/groups/${groupId}`).remove();
          await db.ref(`/groupMessages/${groupId}`).remove();
          setDeletingGroup(null);
          setSelectedGroup(null);
          setGroupMsgs([]);
        });
      };
      const adminDeleteMsg=async(chatId,msgId)=>{
        showConfirm("এই বার্তা মুছবেন?", async()=>{
          setDeletingMsg(msgId);
          await db.ref(`/messages/${chatId}/${msgId}`).remove();
          setDeletingMsg(null);
        });
      };
      const adminDeleteGroupMsg=async(groupId,msgId)=>{
        showConfirm("এই বার্তা মুছবেন?", async()=>{
          setDeletingMsg(msgId);
          await db.ref(`/groupMessages/${groupId}/${msgId}`).remove();
          setDeletingMsg(null);
        });
      };

      const cleanBase64Photos=async()=>{
        showConfirm("সব ইউজারের base64 প্রোফাইল ছবি Firebase থেকে মুছে ফেলবেন?", async()=>{
          setCleaningB64(true);
          setCleanB64Result(null);
          try {
            const snap=await db.ref("/users").once("value");
            const all=snap.val()||{};
            let count=0;
            const updates={};
            Object.entries(all).forEach(([uid,u])=>{
              if(u&&u.photo&&u.photo.startsWith("data:")){
                updates[`/users/${uid}/photo`]=null;
                count++;
              }
            });
            if(count>0) await db.ref().update(updates);
            setCleanB64Result(`সম্পন্ন! ${count} জন ইউজারের base64 ছবি মুছে ফেলা হয়েছে।`);
          } catch(e) {
            setCleanB64Result("ত্রুটি: "+(e.message||"আবার চেষ্টা করুন"));
          }
          setCleaningB64(false);
        });
      };

      const cleanBase64PostImages=async()=>{
        showConfirm("সব পোস্টের base64 ছবি Firebase থেকে মুছে ফেলবেন?", async()=>{
          setCleaningPostB64(true);
          setCleanPostB64Result(null);
          try {
            const snap=await db.ref("/posts").once("value");
            const all=snap.val()||{};
            let count=0;
            const updates={};
            Object.entries(all).forEach(([postId,p])=>{
              if(p&&p.image&&p.image.startsWith("data:")){
                updates[`/posts/${postId}/image`]=null;
                count++;
              }
            });
            if(count>0) await db.ref().update(updates);
            setCleanPostB64Result(`সম্পন্ন! ${count}টি পোস্টের base64 ছবি মুছে ফেলা হয়েছে।`);
          } catch(e) {
            setCleanPostB64Result("ত্রুটি: "+(e.message||"আবার চেষ্টা করুন"));
          }
          setCleaningPostB64(false);
        });
      };

      const filteredUsers=users.filter(u=>u.name?.toLowerCase().includes(search.toLowerCase())||u.email?.toLowerCase().includes(search.toLowerCase()));
      const tabStyle=(t)=>({flex:1,padding:"9px 4px",background:tab===t?"rgba(255,59,92,.15)":"none",border:"none",borderBottom:`2px solid ${tab===t?"var(--red)":"transparent"}`,color:tab===t?"var(--red)":"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:11,letterSpacing:.5});

      return(
        <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:20}}>
          {/* Custom Confirm Modal */}
          {confirmState&&(
            <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,.75)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:"var(--bg2)",border:"1px solid rgba(255,59,92,.35)",borderRadius:18,padding:"24px 22px",maxWidth:340,width:"100%",textAlign:"center"}}>
                <p style={{fontSize:16,fontWeight:700,marginBottom:8}}>⚠️ নিশ্চিত করুন</p>
                <p style={{fontSize:14,color:"var(--text2)",marginBottom:20,lineHeight:1.5}}>{confirmState.msg}</p>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setConfirmState(null)} style={{flex:1,padding:"11px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"var(--text)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14}}>বাতিল</button>
                  <button onClick={async()=>{const fn=confirmState.onOk;setConfirmState(null);await fn();}} style={{flex:1,padding:"11px",background:"rgba(255,59,92,.15)",border:"1px solid rgba(255,59,92,.4)",borderRadius:12,color:"var(--red)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14}}>✓ হ্যাঁ, মুছুন</button>
                </div>
              </div>
            </div>
          )}
          <div style={{padding:"14px 18px 0",background:"rgba(5,5,8,.97)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(255,59,92,.25)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div>
                <h1 style={{fontFamily:"Orbitron",fontSize:16,fontWeight:900,color:"var(--red)",letterSpacing:2}}>🔐 ADMIN PANEL</h1>
                <p style={{fontSize:11,color:"rgba(255,59,92,.6)",marginTop:2}}>System Administrator · {users.length} Users</p>
              </div>
              <button onClick={()=>setScreen("home")} style={{background:"rgba(255,59,92,.1)",border:"1px solid rgba(255,59,92,.25)",borderRadius:10,padding:"7px 13px",cursor:"pointer",color:"var(--red)",fontSize:12,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>← App</button>
            </div>
            <div style={{display:"flex",gap:2}}>
              <button style={tabStyle("users")} onClick={()=>{setTab("users");setSelectedConv(null);setSelectedGroup(null);}}>👥 Users</button>
              <button style={tabStyle("posts")} onClick={()=>{setTab("posts");setSelectedConv(null);setSelectedGroup(null);}}>📸 Posts</button>
              <button style={tabStyle("dms")} onClick={()=>{setTab("dms");setSelectedConv(null);setSelectedGroup(null);}}>💬 DMs</button>
              <button style={tabStyle("groups")} onClick={()=>{setTab("groups");setSelectedConv(null);setSelectedGroup(null);}}>👥 Groups</button>

          <div style={{padding:"12px 16px"}}>

              </div>
              <div style={{marginBottom:14,padding:"12px 14px",background:"rgba(255,200,0,.05)",border:"1px solid rgba(255,200,0,.2)",borderRadius:13}}>
                <p style={{fontSize:12,color:"rgba(255,200,0,.85)",fontWeight:600,marginBottom:8}}>🗄️ Database ক্লিনআপ</p>
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:10,lineHeight:1.5}}>পুরনো base64 প্রোফাইল ছবি Firebase থেকে মুছে ফেলুন। ImgBB URL-এ থাকা ছবি অক্ষত থাকবে।</p>
                <button onClick={cleanBase64Photos} disabled={cleaningB64} style={{background:"rgba(255,200,0,.12)",border:"1px solid rgba(255,200,0,.35)",borderRadius:10,padding:"8px 14px",cursor:"pointer",color:"rgba(255,200,0,.9)",fontSize:12,fontFamily:"'Exo 2',sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:8,opacity:cleaningB64?0.7:1}}>
                  {cleaningB64?<><Spinner size={12} color="rgba(255,200,0,.9)"/> মুছছে...</>:"🗑️ Base64 ছবি মুছুন"}
                </button>

              {filteredUsers.map(u=>(
                <div key={u.uid} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:8,background:"rgba(255,255,255,.03)",border:`1px solid ${u.banned?"rgba(255,59,92,.4)":"rgba(255,255,255,.08)"}`,borderRadius:14}}>
                  <div style={{width:42,height:42,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.35),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,overflow:"hidden"}}>
                    {u.photo?<img src={u.photo} style={{width:42,height:42,borderRadius:"50%",objectFit:"cover"}}/>:u.emoji}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}{u.banned&&<span style={{marginLeft:6,fontSize:9,color:"var(--red)",background:"rgba(255,59,92,.15)",padding:"1px 6px",borderRadius:6}}>BANNED</span>}</p>
                    <p style={{fontSize:10,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</p>
                  </div>
                  {u.banned
                    ?<button onClick={()=>unbanUser(u)} disabled={banning===u.uid} style={{background:"rgba(16,255,176,.1)",border:"1px solid rgba(16,255,176,.3)",borderRadius:9,padding:"5px 9px",cursor:"pointer",color:"var(--green)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:600,flexShrink:0}}>
