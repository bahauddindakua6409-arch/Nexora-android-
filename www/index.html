        setUsernameError("");
        try {
          const snap = await db.ref("/usernames/" + cleaned).get();
          if(snap.exists() && snap.val() !== currentUser.uid) {
            setUsernameError("এই username টি অন্য কেউ ব্যবহার করছে");
          } else {
            setUsernameError("✅ ব্যবহারযোগ্য");
          }
        } catch(e) {}
        setUsernameChecking(false);
      };

      // Save all profile info
      const saveProfileInfo = async () => {
        if(usernameError && !usernameError.startsWith("✅")) { alert("Username ঠিক করুন"); return; }
        setProfileSaving(true);
        try {
          const updates = {
            bio:              editBio.trim()         || null,
            birthDate:        editBirthDate          || null,
            gender:           editGender             || null,
            city:             editCity.trim()        || null,
            country:          editCountry.trim()     || null,
            phoneNumber:      editPhone.trim()       || null,
            contactEmail:     editEmail.trim()       || null,
            university:       editUniversity.trim()  || null,
            college:          editCollege.trim()     || null,
            highschool:       editHighschool.trim()  || null,
            relationshipStatus: editRelStatus        || null,
          };
          // Username — atomic write to /usernames index
          const newUsername = editUsername.trim();
          const oldUsername = (profileUser?.username||"").toLowerCase();
          if(newUsername && newUsername !== oldUsername) {
            // Remove old username index
            if(oldUsername) await db.ref("/usernames/" + oldUsername).remove();
            // Claim new username
            await db.ref("/usernames/" + newUsername).set(currentUser.uid);
            updates.username = newUsername;
          } else if(!newUsername && oldUsername) {
            await db.ref("/usernames/" + oldUsername).remove();
            updates.username = null;
          }
          await db.ref(`/users/${currentUser.uid}`).update(updates);
          // cache invalidate করো
          delete _userProfileCache[currentUser.uid];
          setProfileUser(prev => prev ? {...prev, ...updates, username: newUsername||prev.username} : prev);
          setEditModal(false);
        } catch(e) { alert("সেভ ব্যর্থ: " + e.message); }
        setProfileSaving(false);
      };

      const handleCoverUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if(!file.type.startsWith("image/")){ alert("শুধু ছবি আপলোড করুন!"); return; }
        setCoverUploading(true);
        try {
          const canvas = document.createElement("canvas");
          const img = new Image();
          await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = ev => {
              img.onload = () => {
                // Cover: max width 1280px, maintain aspect ratio
                const MAX_W = 1280;
                let w = img.width, h = img.height;
                if(w > MAX_W){ h = Math.round(h * MAX_W / w); w = MAX_W; }
                canvas.width = w; canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                resolve();
              };
              img.onerror = reject;
              img.src = ev.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
          const base64 = canvas.toDataURL("image/jpeg", 0.85);
          const url = await uploadToImgBB(base64, `cover_${currentUser.uid}_${Date.now()}`);
          await db.ref(`/users/${currentUser.uid}/coverPhoto`).set(url);
          // cache invalidate করো
          delete _userProfileCache[currentUser.uid];
          setProfileUser(prev => prev ? {...prev, coverPhoto: url} : prev);
        } catch(err) { alert("কভার আপলোড ব্যর্থ: " + err.message); }
        setCoverUploading(false);
        e.target.value = "";
      };

      useEffect(()=>{
        if(!profileUid) return;
        setLoading(true);
        setPosts([]); setProfileUser(null); setIsFriend(false); setReqSent(false); setReqReceived(false); setMutualCount(0);

        // Load profile data once (non-online fields) — cache দিয়ে Firebase read বাঁচাও
        const _applyProfileData = (data) => {
          if(data) {
            setProfileUser({uid:profileUid,...data});
            if(isSelf) {
              setEditRelStatus(data.relationshipStatus || "");
              setEditBirthDate(data.birthDate || "");
              setEditBio(data.bio || "");
              setEditGender(data.gender || "");
              setEditCity(data.city || "");
              setEditCountry(data.country || "");
              setEditPhone(data.phoneNumber || "");
              setEditEmail(data.contactEmail || "");
              setEditUniversity(data.university || "");
              setEditCollege(data.college || "");
              setEditHighschool(data.highschool || "");
              setEditUsername(data.username || "");
            }
          }
        };
        // cache check: isSelf হলে সবসময় fresh (edit করতে পারে), অন্যদের জন্য cache ব্যবহার
        const _cached = _userProfileCache[profileUid];
        if(!isSelf && _cached && (Date.now()-_cached.ts) < USER_CACHE_TTL) {
          _applyProfileData(_cached.data);
        } else {
          db.ref(`/users/${profileUid}`).once("value", snap=>{
            const data = snap.val();
            if(data) { _userProfileCache[profileUid] = {data, ts:Date.now()}; }
            _applyProfileData(data);
          });
        }

        // Real-time online status listener — presence path থেকে পড়া
        const onlineRef = db.ref(`/presence/${profileUid}`);
        const onlineHandler = onlineRef.on("value", snap=>{
          const data = snap.val();
          setProfileUser(prev => prev ? {...prev, online: data?.online||false} : prev);
        });

        db.ref("/posts").orderByChild("authorUid").equalTo(profileUid).once("value", snap=>{
          const d = snap.val()||{};
          const list = Object.entries(d).map(([id,p])=>({id,...p})).sort((a,b)=>(b.ts||0)-(a.ts||0));
          setPosts(list);
          setLoading(false);
        });

        if(!isSelf){
          db.ref(`/friends/${currentUser.uid}/${profileUid}`).once("value", s=>setIsFriend(s.exists()));
          // Check if WE sent a request to them
          db.ref(`/friendRequests/${profileUid}/${currentUser.uid}`).once("value", s=>setReqSent(s.exists()));
          // Check if THEY sent a request to us
          db.ref(`/friendRequests/${currentUser.uid}/${profileUid}`).once("value", s=>setReqReceived(s.exists()));
          Promise.all([
            db.ref(`/friends/${currentUser.uid}`).once("value"),
            db.ref(`/friends/${profileUid}`).once("value")
          ]).then(([mySnap, theirSnap])=>{
            const mine = Object.keys(mySnap.val()||{});
            const theirs = new Set(Object.keys(theirSnap.val()||{}));
            setMutualCount(mine.filter(u=>theirs.has(u)).length);
          });
        }

        return () => { onlineRef.off("value", onlineHandler); };
      },[profileUid]);

      const sendFriendReq = async()=>{
        await db.ref(`/friendRequests/${profileUid}/${currentUser.uid}`).set({
          fromUid:currentUser.uid, from:currentUser.uid, name:currentUser.name, emoji:currentUser.emoji, photo:currentUser.photo||null,
          ts:firebase.database.ServerValue.TIMESTAMP, status:"pending"
        });
        await db.ref(`/sentRequests/${currentUser.uid}/${profileUid}`).set({toUid:profileUid,status:"pending",ts:firebase.database.ServerValue.TIMESTAMP});
        writeNotif(profileUid,"friendReq",currentUser,`${currentUser.name} আপনাকে বন্ধুত্বের অনুরোধ পাঠিয়েছে`);
        setReqSent(true);
      };

      const acceptFriendReq = async()=>{
        const ts = firebase.database.ServerValue.TIMESTAMP;
        await db.ref(`/friends/${currentUser.uid}/${profileUid}`).set({uid:profileUid,name:profileUser.name,emoji:profileUser.emoji,photo:profileUser.photo||null,ts});
        await db.ref(`/friends/${profileUid}/${currentUser.uid}`).set({uid:currentUser.uid,name:currentUser.name,emoji:currentUser.emoji,photo:currentUser.photo||null,ts});
        await db.ref(`/friendRequests/${currentUser.uid}/${profileUid}`).remove();
        writeNotif(profileUid,"friendAccepted",currentUser,`${currentUser.name} আপনার বন্ধুত্বের অনুরোধ গ্রহণ করেছে`);
        setReqReceived(false);
        setIsFriend(true);
      };

      const declineFriendReq = async()=>{
        await db.ref(`/friendRequests/${currentUser.uid}/${profileUid}`).remove();
        setReqReceived(false);
      };

      const shareProfile = () => {
        const url = `${window.location.origin}/?profile=${profileUid}`;
        if(navigator.share) {
          navigator.share({ title: profileUser.name + " — Nexora", url }).catch(()=>{});
        } else {
          navigator.clipboard.writeText(url).then(()=>{ setShareCopied(true); setTimeout(()=>setShareCopied(false),2500); }).catch(()=>{});
        }
      };

      const photoPosts = posts.filter(p=>p.image||p.video);

      // Helper: info row (shown to everyone)
      const InfoRow = ({icon, text}) => text ? (
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
          <span style={{fontSize:15,flexShrink:0}}>{icon}</span>
          <p style={{fontSize:12,color:"var(--text2)",lineHeight:1.4}}>{text}</p>
        </div>
      ) : null;

      if(loading || !profileUser) return(
        <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
          <Spinner size={36}/>
          <p style={{fontSize:12,color:"var(--text2)"}}>প্রোফাইল লোড হচ্ছে...</p>
        </div>
      );

      const hasInfo = profileUser.bio || profileUser.city || profileUser.country || profileUser.birthDate ||
                      profileUser.gender || profileUser.university || profileUser.college ||
                      profileUser.highschool || profileUser.relationshipStatus;

      return(
        <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:90}}>

          {/* ── Sticky Header ── */}
          <div style={{background:"rgba(5,5,8,.97)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(0,212,255,.08)",padding:"11px 14px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:50}}>
            <button onClick={()=>setScreen(prevScreen)} style={{background:"none",border:"none",cursor:"pointer",padding:4,flexShrink:0}}><Ic n="back" s={22} c="var(--blue)"/></button>
            <p style={{fontFamily:"Orbitron",fontSize:15,fontWeight:700,background:"linear-gradient(135deg,var(--blue),var(--purple2))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profileUser.name}</p>
            <button onClick={shareProfile} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"var(--text2)",fontSize:18}}>
              {shareCopied?"✅":"🔗"}
            </button>
            {isSelf&&<button onClick={()=>setScreen("settings")} style={{background:"none",border:"none",cursor:"pointer",padding:4,fontSize:18}}>⚙️</button>}
          </div>

          {/* ── Cover Photo ── */}
          {isSelf&&<input ref={coverInputRef} type="file" accept="image/*" style={{display:"none",position:"fixed"}} onChange={handleCoverUpload}/>}
          <div style={{position:"relative",width:"100%",height:220,background:"linear-gradient(160deg,#0d0d25 0%,rgba(124,58,237,.45) 55%,rgba(0,212,255,.22) 100%)",overflow:"hidden"}}>
            {profileUser.coverPhoto
              ? <img src={profileUser.coverPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}} loading="lazy"/>
              : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:6,opacity:.18}}>
                  <span style={{fontSize:48}}>🖼️</span>
                </div>
            }
          </div>
          {/* Cover edit button — outside overflow:hidden so file input works on mobile */}
          {isSelf&&(
            <div style={{position:"relative",height:0}}>
              <button onClick={()=>{ if(coverInputRef.current){coverInputRef.current.value="";coverInputRef.current.click();} }} disabled={coverUploading}
                style={{position:"absolute",bottom:10,right:10,transform:"translateY(-46px)",background:"rgba(10,10,20,.82)",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,.18)",borderRadius:8,padding:"6px 12px",color:"white",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:600,cursor:coverUploading?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:5,zIndex:10}}>
                {coverUploading?<><Spinner size={11}/> আপলোড...</>:<>📷 কভার পরিবর্তন</>}
              </button>
            </div>
          )}

          {/* ── Profile Card (Facebook style) ── */}
          <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--gb)",paddingBottom:4}}>

            {/* Avatar — centered, overlapping cover */}
            <div style={{display:"flex",justifyContent:"center",marginTop:-52,marginBottom:10,position:"relative",zIndex:5}}>
              <div style={{position:"relative",display:"inline-block"}}>
                <div style={{width:104,height:104,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.5),rgba(0,212,255,.3))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,overflow:"hidden",border:"4px solid var(--bg2)",boxShadow:"0 4px 24px rgba(0,0,0,.6)"}}>
                  {profileUser.photo?<img src={profileUser.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span>{profileUser.emoji||"👤"}</span>}
                </div>
                {isSelf&&(
                  <>
                    <input ref={photoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleProfilePhotoUpload}/>
                    <button onClick={()=>photoInputRef.current?.click()} disabled={photoUploading}
                      style={{position:"absolute",bottom:3,right:3,width:28,height:28,borderRadius:"50%",background:"var(--blue)",border:"3px solid var(--bg2)",display:"flex",alignItems:"center",justifyContent:"center",cursor:photoUploading?"not-allowed":"pointer",fontSize:12,boxShadow:"0 2px 8px rgba(0,0,0,.5)"}}>
                      {photoUploading?<Spinner size={10}/>:"📷"}
                    </button>
                  </>
                )}
                {/* Online dot */}
                {profileUser.online&&<span style={{position:"absolute",bottom:7,left:5,width:14,height:14,borderRadius:"50%",background:"var(--green)",border:"2px solid var(--bg2)",display:"block"}}/>}
              </div>
            </div>

            {/* Name + username */}
            <div style={{textAlign:"center",padding:"0 16px",marginBottom:6}}>
              <p style={{fontSize:22,fontWeight:800,letterSpacing:.2,lineHeight:1.2,marginBottom:2}}>{profileUser.name}</p>
              {profileUser.username&&<p style={{fontSize:12,color:"var(--blue)",fontFamily:"'Exo 2',sans-serif",marginBottom:4}}>@{profileUser.username}</p>}
              <p style={{fontSize:12,color:profileUser.online?"var(--green)":"var(--text2)"}}>
                {profileUser.online?"🟢 এখন অনলাইন":"⚫ অফলাইন"}
              </p>
            </div>

            {/* Stats row */}
            <div style={{display:"flex",justifyContent:"center",gap:28,padding:"10px 0",borderTop:"1px solid var(--gb)",borderBottom:"1px solid var(--gb)",margin:"8px 16px"}}>
              <div style={{textAlign:"center"}}>
                <p style={{fontSize:17,fontWeight:800,color:"var(--blue)"}}>{posts.length}</p>
                <p style={{fontSize:10,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif"}}>পোস্ট</p>
              </div>
              <div style={{textAlign:"center"}}>
                <p style={{fontSize:17,fontWeight:800,color:"var(--purple2)"}}>{photoPosts.length}</p>
                <p style={{fontSize:10,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif"}}>মিডিয়া</p>
              </div>
              {!isSelf&&mutualCount>0&&(
                <div style={{textAlign:"center"}}>
                  <p style={{fontSize:17,fontWeight:800,color:"#f59e0b"}}>{mutualCount}</p>
                  <p style={{fontSize:10,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif"}}>পারস্পরিক</p>
                </div>
              )}
            </div>

            {/* Bio */}
            {profileUser.bio&&(
              <p style={{textAlign:"center",fontSize:13,color:"var(--text2)",lineHeight:1.6,padding:"8px 20px 4px"}}>{profileUser.bio}</p>
            )}

            {/* ── Action buttons (Facebook style) ── */}
            <div style={{padding:"10px 14px 12px",display:"flex",gap:8,flexWrap:"wrap"}}>
              {isSelf?(
                <>
                  <button onClick={()=>setEditModal(true)}
                    style={{flex:1,padding:"10px 0",background:"rgba(124,58,237,.18)",border:"1px solid rgba(124,58,237,.35)",borderRadius:10,color:"var(--purple2)",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    ✏️ প্রোফাইল সম্পাদনা
                  </button>
                  <button onClick={shareProfile}
                    style={{padding:"10px 14px",background:"rgba(0,212,255,.1)",border:"1px solid rgba(0,212,255,.3)",borderRadius:10,color:"var(--blue)",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                    {shareCopied?"✅":"🔗"}
                  </button>
                </>
              ):(
                <>
                  {/* Friend action */}
                  {isFriend?(
                    <button style={{flex:1,padding:"10px 0",background:"rgba(255,255,255,.07)",border:"1px solid var(--gb)",borderRadius:10,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      👥 বন্ধু
                    </button>
                  ):reqReceived?(
                    <>
                      <button onClick={acceptFriendReq}
                        style={{flex:1,padding:"10px 0",background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:10,color:"white",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:"var(--glow-p)"}}>
                        ✅ গ্রহণ করুন
                      </button>
                      <button onClick={declineFriendReq}
                        style={{padding:"10px 14px",background:"rgba(255,255,255,.06)",border:"1px solid var(--gb)",borderRadius:10,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                        ✕
                      </button>
                    </>
                  ):reqSent?(
                    <button disabled
                      style={{flex:1,padding:"10px 0",background:"rgba(255,255,255,.05)",border:"1px solid var(--gb)",borderRadius:10,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13,cursor:"default",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      ✅ রিকোয়েস্ট পাঠানো হয়েছে
                    </button>
                  ):(
                    <button onClick={sendFriendReq}
                      style={{flex:1,padding:"10px 0",background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:10,color:"white",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:"var(--glow-p)"}}>
                      👤+ বন্ধু হন
                    </button>
                  )}
                  {/* Chat */}
                  <button onClick={()=>{setContact(profileUser);setScreen("chat");}}
                    style={{flex:1,padding:"10px 0",background:"rgba(0,212,255,.12)",border:"1px solid rgba(0,212,255,.3)",borderRadius:10,color:"var(--blue)",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <Ic n="msg" s={14} c="var(--blue)"/> চ্যাট
                  </button>
                  {/* Share */}
                  <button onClick={shareProfile}
                    style={{padding:"10px 13px",background:"rgba(255,255,255,.06)",border:"1px solid var(--gb)",borderRadius:10,color:"var(--text2)",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13,cursor:"pointer"}}>
                    {shareCopied?"✅":"🔗"}
                  </button>
                </>
              )}
            </div>
          </div>

          {/* ── Info Section (Facebook "About" style) ── */}
          {hasInfo&&(
            <div style={{margin:"10px 12px",background:"var(--bg2)",borderRadius:14,border:"1px solid var(--gb)",overflow:"hidden"}}>
              <p style={{fontFamily:"Orbitron",fontSize:12,fontWeight:700,padding:"12px 14px 8px",borderBottom:"1px solid var(--gb)",color:"var(--text2)",letterSpacing:.5}}>📋 পরিচিতি</p>
              <div style={{padding:"10px 14px 12px"}}>
                <InfoRow icon="🎂" text={profileUser.birthDate?new Date(profileUser.birthDate).toLocaleDateString("bn-BD",{day:"numeric",month:"long",year:"numeric"}):null}/>
                <InfoRow icon={profileUser.gender==="পুরুষ"?"👨":profileUser.gender==="মহিলা"?"👩":"🧑"} text={profileUser.gender}/>
                <InfoRow icon="📍" text={[profileUser.city,profileUser.country].filter(Boolean).join(", ")}/>
                <InfoRow icon="💑" text={profileUser.relationshipStatus}/>
                <InfoRow icon="🎓" text={profileUser.university}/>
                <InfoRow icon="🏫" text={profileUser.college}/>
                <InfoRow icon="📚" text={profileUser.highschool}/>
                {isSelf&&<InfoRow icon="📱" text={profileUser.phoneNumber?"📱 "+profileUser.phoneNumber+" (শুধু আপনি দেখছেন)":null}/>}
                {isSelf&&<InfoRow icon="📧" text={profileUser.contactEmail?"📧 "+profileUser.contactEmail+" (শুধু আপনি দেখছেন)":null}/>}
              </div>
            </div>
          )}

          {/* ── Posts header ── */}
          <div style={{margin:"10px 12px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <p style={{fontFamily:"Orbitron",fontSize:12,fontWeight:700,color:"var(--text2)",letterSpacing:.5}}>📝 পোস্টসমূহ</p>
          </div>

          {/* ── Posts feed ── */}
          <div style={{padding:"8px 12px"}}>
            {posts.length===0&&(
              <div style={{textAlign:"center",padding:"50px 0",color:"var(--text2)",background:"var(--bg2)",borderRadius:14,border:"1px solid var(--gb)",marginTop:8}}>
                <p style={{fontSize:36,marginBottom:8}}>📝</p>
                <p style={{fontSize:13}}>{isSelf?"আপনি এখনো কোনো পোস্ট করেননি":"এখনো কোনো পোস্ট নেই"}</p>
              </div>
            )}
            {posts.map(p=>(
              <div key={p.id} id={`post-${p.id}`}>
                <PostCard post={p} user={currentUser} onComment={setCommentPost} onEdit={null} savedMap={{}}/>
              </div>
            ))}
          </div>
          {/* ── Edit Profile Modal ── */}
          {editModal&&(
            <div style={{position:"fixed",inset:0,zIndex:500,overflowY:"auto",background:"rgba(0,0,0,.8)",backdropFilter:"blur(12px)"}} onClick={e=>{if(e.target===e.currentTarget)setEditModal(false);}}>
              <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:"24px 20px 50px",border:"1px solid var(--gb)",marginTop:40,animation:"slide-up .25s ease"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
                  <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:15}}>✏️ প্রোফাইল সম্পাদনা</p>
                  <button onClick={()=>setEditModal(false)} style={{background:"none",border:"none",color:"var(--text2)",fontSize:20,cursor:"pointer"}}>✕</button>
                </div>

                {/* ── Username ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>🆔 ইউজারনেম (unique — @দিয়ে চেনা যাবে)</p>
                <div style={{position:"relative",marginBottom:4}}>
                  <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--blue)",fontSize:14,fontWeight:700}}>@</span>
                  <input value={editUsername} onChange={e=>checkUsername(e.target.value)} placeholder="your_username" maxLength={30}
                    style={{width:"100%",padding:"11px 14px 11px 26px",background:"var(--glass)",border:`1px solid ${usernameError&&!usernameError.startsWith("✅")?"var(--red, #ef4444)":usernameError.startsWith("✅")?"var(--green)":"var(--gb)"}`,borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:14,boxSizing:"border-box"}}/>
                </div>
                {usernameChecking && <p style={{fontSize:11,color:"var(--text2)",marginBottom:8}}>⏳ যাচাই করছি...</p>}
                {!usernameChecking && usernameError && (
                  <p style={{fontSize:11,color:usernameError.startsWith("✅")?"var(--green)":"#ef4444",marginBottom:8}}>{usernameError}</p>
                )}
                {!usernameError && !usernameChecking && <div style={{marginBottom:16}}/>}

                {/* ── Bio ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>📝 Bio (নিজের সম্পর্কে)</p>
                <textarea value={editBio} onChange={e=>setEditBio(e.target.value)} placeholder="নিজের সম্পর্কে কিছু লিখুন..." maxLength={200} rows={3}
                  style={{width:"100%",padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13,resize:"none",boxSizing:"border-box",marginBottom:4}}/>
                <p style={{fontSize:10,color:"var(--text2)",textAlign:"right",marginBottom:14}}>{editBio.length}/200</p>

                {/* ── Gender ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:8,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>🧕 লিঙ্গ</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:18}}>
                  {["পুরুষ","মহিলা","অন্যান্য"].map(g=>(
                    <button key={g} onClick={()=>setEditGender(editGender===g?"":g)}
                      style={{padding:"9px 8px",borderRadius:10,border:`1.5px solid ${editGender===g?"var(--blue)":"var(--gb)"}`,background:editGender===g?"rgba(0,212,255,.12)":"rgba(255,255,255,.04)",color:editGender===g?"var(--blue)":"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:12,fontWeight:editGender===g?700:400,cursor:"pointer"}}>
                      {g==="পুরুষ"?"👨 পুরুষ":g==="মহিলা"?"👩 মহিলা":"🧑 অন্যান্য"}
                    </button>
                  ))}
                </div>

                {/* ── Birth Date ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>🎂 জন্ম তারিখ</p>
                <input type="date" value={editBirthDate} onChange={e=>setEditBirthDate(e.target.value)} max={new Date().toISOString().split("T")[0]}
                  style={{width:"100%",padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:14,marginBottom:18,boxSizing:"border-box"}}/>

                {/* ── Location ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>📍 লোকেশন</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
                  <input value={editCity} onChange={e=>setEditCity(e.target.value)} placeholder="শহর / City" maxLength={50}
                    style={{padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13}}/>
                  <input value={editCountry} onChange={e=>setEditCountry(e.target.value)} placeholder="দেশ / Country" maxLength={50}
                    style={{padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13}}/>
                </div>

                {/* ── Education ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>🎓 শিক্ষা প্রতিষ্ঠান</p>
                <input value={editUniversity} onChange={e=>setEditUniversity(e.target.value)} placeholder="বিশ্ববিদ্যালয়ের নাম" maxLength={100}
                  style={{width:"100%",padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13,marginBottom:8,boxSizing:"border-box"}}/>
                <input value={editCollege} onChange={e=>setEditCollege(e.target.value)} placeholder="কলেজের নাম" maxLength={100}
                  style={{width:"100%",padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13,marginBottom:8,boxSizing:"border-box"}}/>
                <input value={editHighschool} onChange={e=>setEditHighschool(e.target.value)} placeholder="হাইস্কুলের নাম" maxLength={100}
                  style={{width:"100%",padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13,marginBottom:18,boxSizing:"border-box"}}/>

                {/* ── Relationship Status ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:8,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>💑 সম্পর্কের অবস্থা</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:18}}>
                  {["সিঙ্গেল 🙂","সম্পর্কে আছি 💕","বিবাহিত 💍","জটিল অবস্থায় 😅","বিবাহবিচ্ছেদ 💔","উল্লেখ করতে চাই না"].map(opt=>(
                    <button key={opt} onClick={()=>setEditRelStatus(editRelStatus===opt?"":opt)}
                      style={{padding:"9px 8px",borderRadius:10,border:`1.5px solid ${editRelStatus===opt?"var(--blue)":"var(--gb)"}`,background:editRelStatus===opt?"rgba(0,212,255,.12)":"rgba(255,255,255,.04)",color:editRelStatus===opt?"var(--blue)":"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:11,fontWeight:editRelStatus===opt?700:400,cursor:"pointer",textAlign:"center"}}>
                      {opt}
                    </button>
                  ))}
                </div>

                {/* ── Contact (private) ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>📱 ফোন নাম্বার <span style={{color:"var(--amber)",fontSize:10}}>(শুধু আপনি দেখবেন)</span></p>
                <input value={editPhone} onChange={e=>setEditPhone(e.target.value)} placeholder="+880 1X..." maxLength={20} type="tel"
                  style={{width:"100%",padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13,marginBottom:12,boxSizing:"border-box"}}/>
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>📧 ইমেইল <span style={{color:"var(--amber)",fontSize:10}}>(শুধু আপনি দেখবেন)</span></p>
                <input value={editEmail} onChange={e=>setEditEmail(e.target.value)} placeholder="your@email.com" maxLength={80} type="email"
                  style={{width:"100%",padding:"11px 14px",background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text)",fontFamily:"'Exo 2',sans-serif",fontSize:13,marginBottom:22,boxSizing:"border-box"}}/>

                {/* ── Profile Share Link ── */}
                <p style={{fontSize:11,color:"var(--text2)",marginBottom:5,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>🔗 প্রোফাইল লিংক শেয়ার করুন</p>
                <div style={{display:"flex",gap:8,marginBottom:24}}>
                  <div style={{flex:1,padding:"11px 14px",background:"rgba(0,212,255,.06)",border:"1px solid rgba(0,212,255,.2)",borderRadius:12,fontSize:12,color:"var(--blue)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Exo 2',sans-serif"}}>
                    {window.location.origin}/?profile={profileUid}
                  </div>
                  <button onClick={shareProfile}
                    style={{padding:"11px 16px",background:"linear-gradient(135deg,rgba(0,212,255,.2),rgba(124,58,237,.2))",border:"1px solid rgba(0,212,255,.3)",borderRadius:12,color:"var(--blue)",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
                    {shareCopied?"✅ কপি!":"📋 কপি"}
                  </button>
                </div>

                {/* Save / Cancel */}
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setEditModal(false)} style={{flex:1,padding:"12px",background:"rgba(255,255,255,.05)",border:"1px solid var(--gb)",borderRadius:12,color:"var(--text2)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif"}}>বাতিল</button>
                  <button onClick={saveProfileInfo} disabled={profileSaving||(usernameError&&!usernameError.startsWith("✅"))}
                    style={{flex:2,padding:"12px",background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:12,color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:(profileSaving||(usernameError&&!usernameError.startsWith("✅")))?0.7:1}}>
                    {profileSaving?<><Spinner size={14}/> সেভ হচ্ছে...</>:"✅ সেভ করুন"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {commentPost&&<PostCommentsModal post={commentPost} user={currentUser} onClose={()=>setCommentPost(null)}/>}
        </div>
      );
    };

    const MessagesScreen = ({user,setScreen,setContact,defaultTab="chats",onTabReset,onViewProfile}) => {
      const [tab,setTab]=useState(defaultTab);
      const [q,setQ]=useState("");

      // Reset tab for next visit when this screen unmounts
      useEffect(()=>{ return ()=>{ if(onTabReset) onTabReset(); }; },[]);
      const [friends,setFriends]=useState({});
      const [allUsers,setAllUsers]=useState([]);
      const [onlineUsers,setOnlineUsers]=useState([]);
      const [requests,setRequests]=useState([]);
      const [sentReqs,setSentReqs]=useState({});
      const [convs,setConvs]=useState([]);
      const [busy,setBusy]=useState({});

      useEffect(()=>{const r=db.ref(`/friends/${user.uid}`);r.on("value",s=>setFriends(s.val()||{}));return()=>r.off();},[user.uid]);
      useEffect(()=>{
        const r=db.ref(`/friendRequests/${user.uid}`);
        r.on("value",s=>{const d=s.val()||{};setRequests(Object.values(d).filter(r=>r.status==="pending"));});
        return()=>r.off();
      },[user.uid]);
      useEffect(()=>{const r=db.ref(`/sentRequests/${user.uid}`);r.on("value",s=>setSentReqs(s.val()||{}));return()=>r.off();},[user.uid]);
      useEffect(()=>{
        let ud={},pd={},mergeTimer=null;
        const merge=()=>{
          if(mergeTimer)clearTimeout(mergeTimer);
          mergeTimer=setTimeout(()=>{
            const list=Object.values(ud).filter(u=>u.uid!==user.uid).map(u=>({...u,online:pd[u.uid]?.online||false}));
            setAllUsers(list);setOnlineUsers(list.filter(u=>u.online));
          },50);
        };
        // /users: cache — "People" tab-এ নতুন user 5 মিনিটের মধ্যে দেখাবে
        loadUsersOnce(data=>{ ud=data; merge(); });
        // /presence: real-time — online status সাথে সাথে দেখাবে
        const pr=db.ref("/presence");
        pr.on("child_added",  s=>{pd[s.key]=s.val();merge();});
        pr.on("child_changed",s=>{pd[s.key]=s.val();merge();});
        pr.on("child_removed",s=>{delete pd[s.key];merge();});
        return()=>{pr.off();if(mergeTimer)clearTimeout(mergeTimer);};
      },[user.uid]);
      useEffect(()=>{
        const r=db.ref(`/userConvs/${user.uid}`);
        r.on("value",s=>{const d=s.val()||{};setConvs(Object.values(d).sort((a,b)=>(b.lastTs||0)-(a.lastTs||0)));});
        return()=>r.off();
      },[user.uid]);

      const sendRequest=async(u)=>{
        setBusy(b=>({...b,[u.uid]:true}));
        const ts=firebase.database.ServerValue.TIMESTAMP;
        await db.ref(`/friendRequests/${u.uid}/${user.uid}`).set({fromUid:user.uid,name:user.name,emoji:user.emoji,photo:user.photo||null,ts,status:"pending"});
        await db.ref(`/sentRequests/${user.uid}/${u.uid}`).set({toUid:u.uid,status:"pending",ts});
        writeNotif(u.uid,"friendReq",user,`${user.name} আপনাকে বন্ধুত্বের অনুরোধ পাঠিয়েছে`);
        setBusy(b=>({...b,[u.uid]:false}));
      };
      const cancelRequest=async(uid)=>{
        await db.ref(`/friendRequests/${uid}/${user.uid}`).remove();
        await db.ref(`/sentRequests/${user.uid}/${uid}`).remove();
      };
      const acceptReq=async(req)=>{
        const ts=firebase.database.ServerValue.TIMESTAMP;
        await db.ref(`/friends/${user.uid}/${req.fromUid}`).set({uid:req.fromUid,name:req.name,emoji:req.emoji,photo:req.photo||null,ts});
        await db.ref(`/friends/${req.fromUid}/${user.uid}`).set({uid:user.uid,name:user.name,emoji:user.emoji,photo:user.photo||null,ts});
        await db.ref(`/friendRequests/${user.uid}/${req.fromUid}`).remove();
        await db.ref(`/sentRequests/${req.fromUid}/${user.uid}`).remove();
      };
      const rejectReq=async(req)=>{
        await db.ref(`/friendRequests/${user.uid}/${req.fromUid}`).remove();
        await db.ref(`/sentRequests/${req.fromUid}/${user.uid}`).remove();
      };
      const unfriend=async(uid)=>{
        await db.ref(`/friends/${user.uid}/${uid}`).remove();
        await db.ref(`/friends/${uid}/${user.uid}`).remove();
      };
      const rel=(uid)=>{
        if(friends[uid])return"friend";
        if(sentReqs[uid])return"sent";
        if(requests.find(r=>r.fromUid===uid))return"received";
        return"none";
      };
      const filt=(list)=>list.filter(u=>u.name?.toLowerCase().includes(q.toLowerCase())||u.email?.toLowerCase().includes(q.toLowerCase()));
      const friendList=allUsers.filter(u=>friends[u.uid]);
      // Online users first, then alphabetical
      const strangerList=allUsers
        .filter(u=>!friends[u.uid])
        .sort((a,b)=>{
          const aOnline=onlineUsers.some(o=>o.uid===a.uid)?1:0;
          const bOnline=onlineUsers.some(o=>o.uid===b.uid)?1:0;
          if(bOnline!==aOnline) return bOnline-aOnline; // online first
          return (a.name||"").localeCompare(b.name||"");
        });
      const onlineFriends=onlineUsers.filter(u=>friends[u.uid]);
      const TAB_BTN=(id,label,badge=0)=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 4px",background:"none",border:"none",cursor:"pointer",color:tab===id?"var(--blue)":"var(--text2)",fontFamily:"'Exo 2',sans-serif",fontSize:12,fontWeight:tab===id?700:500,borderBottom:`2px solid ${tab===id?"var(--blue)":"transparent"}`,transition:"all .2s",position:"relative"}}>
          {label}{badge>0&&<span style={{marginLeft:5,background:"var(--red)",color:"white",borderRadius:"50%",width:16,height:16,fontSize:9,display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{badge}</span>}
        </button>
      );

      return(
        <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:90}}>
          <div style={{padding:"12px 16px",background:"rgba(5,5,8,.96)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(0,212,255,.1)",position:"sticky",top:0,zIndex:50}}>
            <h1 style={{fontFamily:"Orbitron",fontSize:17,fontWeight:700,letterSpacing:1,background:"linear-gradient(135deg,var(--blue),var(--purple2))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:12}}>Messages</h1>
            <div style={{position:"relative",marginBottom:10}}>
              <input placeholder="Search..." value={q} onChange={e=>setQ(e.target.value)} style={{paddingLeft:40}}/>
              <div style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Ic n="search" s={16} c="var(--text2)"/></div>
            </div>
            {onlineFriends.length>0&&tab==="chats"&&(
              <div style={{marginBottom:10}}>
                <p style={{fontSize:10,fontWeight:600,color:"var(--green)",letterSpacing:1,marginBottom:7}}>🟢 Online Friends</p>
                <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6,scrollbarWidth:"none"}}>
                  {onlineFriends.map(u=>(
                    <div key={u.uid} onClick={()=>{setContact(u);setScreen("chat");}} style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer"}}>
                      <div style={{position:"relative"}}>
                        <div style={{position:"absolute",top:-3,left:-3,right:-3,bottom:-3,borderRadius:"50%",border:"1px solid var(--green)",opacity:.4,animation:"pulse-ring 2s ease-out infinite"}}/>
                        <div style={{width:46,height:46,borderRadius:"50%",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,212,255,.18))",border:"2px solid var(--green)",overflow:"hidden"}}>{u.photo?<img src={u.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:u.emoji}</div>
                        <div style={{position:"absolute",bottom:1,right:1,width:10,height:10,borderRadius:"50%",background:"var(--green)",border:"2px solid var(--bg)"}}/>
                      </div>
                      <p style={{fontSize:9,color:"var(--text2)",maxWidth:46,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"center"}}>{u.name.split(" ")[0]}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,.06)"}}>
              {TAB_BTN("chats","💬 Chats")}
              {TAB_BTN("people","👥 People")}
              {TAB_BTN("requests","🤝 Requests",requests.length)}
            </div>
          </div>
          {tab==="chats"&&(
            <div style={{padding:"12px 16px"}}>
              {filt(convs).length>0
                ?filt(convs).map((c,i)=>(
                    <div key={c.uid} onClick={()=>{setContact(c);setScreen("chat");}} className="glass" style={{padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,cursor:"pointer",borderRadius:17,animation:`slide-up .3s ease ${i*.05}s both`}}>
                      <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.4),rgba(0,212,255,.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,overflow:"hidden",flexShrink:0}}>{c.photo?<img src={c.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:c.emoji||"👤"}</div>
                      <div style={{flex:1,overflow:"hidden"}}>
                        <p style={{fontWeight:600,fontSize:15}}>{c.name}</p>
                        <p style={{fontSize:12,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{c.lastMsg||"চ্যাট শুরু করুন!"}</p>
                      </div>
                      {c.unread>0&&<div style={{width:22,height:22,borderRadius:"50%",background:"linear-gradient(135deg,var(--blue),var(--purple))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{c.unread}</div>}
                    </div>
                  ))
                :<div style={{textAlign:"center",padding:"50px 20px",color:"var(--text2)"}}>
                    <p style={{fontSize:40,marginBottom:12}}>💬</p>
                    <p style={{fontSize:14,fontWeight:600,marginBottom:6}}>এখনো কোনো কথোপকথন নেই</p>
                    <button onClick={()=>setTab("people")} style={{marginTop:16,background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:12,padding:"10px 24px",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13}}>মানুষ খুঁজুন →</button>
                  </div>
              }
              <DevFooter/>
            </div>
          )}
          {tab==="people"&&(
            <div style={{padding:"12px 16px"}}>
              {/* People You May Know - Suggestions */}
              {(()=>{
                const myFriendUids=Object.keys(friends);
                const suggestions=strangerList.filter(u=>rel(u.uid)==="none").map(u=>{
                  let mutualCount=0;
                  myFriendUids.forEach(fuid=>{});
                  const userCreated=u.createdAt||0;
                  const myCreated=allUsers.find(au=>au.uid===user.uid)?.createdAt||0;
                  const sameDay=userCreated&&myCreated&&new Date(userCreated).toDateString()===new Date(myCreated).toDateString();
                  const isRecent=userCreated&&(Date.now()-userCreated)<48*60*60*1000;
                  return {...u,mutualCount,sameDay,isRecent};
                }).filter(u=>u.mutualCount>0||u.sameDay||u.isRecent||u.online).slice(0,8);

                return suggestions.length>0&&!q.trim()?(
                  <div style={{marginBottom:20}}>
                    <p style={{fontSize:11,fontWeight:600,color:"var(--purple2)",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>👋 আপনি চিনতে পারেন</p>
                    <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:8,scrollbarWidth:"none"}}>
                      {suggestions.map((u,i)=>{
                        const r=rel(u.uid);
                        return(
                          <div key={u.uid} style={{flexShrink:0,width:140,background:"var(--glass)",border:`1px solid ${u.online?"rgba(16,255,176,.25)":"var(--gb)"}`,borderRadius:16,padding:"14px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:8,animation:`slide-up .3s ease ${i*.06}s both`}}>
                          <div onClick={()=>onViewProfile&&onViewProfile(u.uid,"messages")} style={{position:"relative",flexShrink:0,cursor:"pointer"}}>
                              <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.35),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,overflow:"hidden",border:`2px solid ${u.online?"var(--green)":"rgba(0,212,255,.2)"}`}}>
                                {u.photo?<img src={u.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:u.emoji}
                              </div>
                              {u.online&&<div style={{position:"absolute",bottom:1,right:1,width:11,height:11,borderRadius:"50%",background:"var(--green)",border:"2px solid var(--bg)"}}/>}
                            </div>
                            <p style={{fontWeight:600,fontSize:13,textAlign:"center",maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</p>
                            <p style={{fontSize:10,color:u.online?"var(--green)":"var(--text2)",textAlign:"center",fontWeight:u.online?600:400}}>
                              {u.mutualCount>0?`${u.mutualCount} জন mutual বন্ধু`:u.isRecent?"সদ্য যোগ দিয়েছে":u.sameDay?"একই দিনে যোগ দিয়েছে":u.online?"● Online":""}
                            </p>
                            {r==="sent"?(
                              <div style={{padding:"6px 14px",background:"rgba(255,159,67,.1)",border:"1px solid rgba(255,159,67,.3)",borderRadius:20,color:"var(--amber)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>Pending ✓</div>
                            ):(
                              <button onClick={()=>sendRequest(u)} disabled={busy[u.uid]} style={{padding:"7px 18px",background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:20,color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:12,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                                {busy[u.uid]?<Spinner size={12} color="white"/>:"+ বন্ধু হন"}
                              </button>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ):null;
              })()}

              {filt(friendList).length>0&&(
                <div style={{marginBottom:20}}>
                  <p style={{fontSize:11,fontWeight:600,color:"var(--blue)",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>✅ আমার বন্ধুরা ({filt(friendList).length})</p>
                  {filt(friendList).map((u,i)=>(
                    <div key={u.uid} className="glass" style={{padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,borderRadius:15,animation:`slide-up .2s ease ${i*.04}s both`}}>
                      <div onClick={()=>onViewProfile&&onViewProfile(u.uid,"messages")} style={{position:"relative",flexShrink:0,cursor:"pointer"}}>
                        <div style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,overflow:"hidden"}}>{u.photo?<img src={u.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:u.emoji}</div>
                        {u.online&&<div style={{position:"absolute",bottom:1,right:1,width:10,height:10,borderRadius:"50%",background:"var(--green)",border:"2px solid var(--bg)"}}/>}
                      </div>
                      <div style={{flex:1}}>
                        <p style={{fontWeight:600,fontSize:14}}>{u.name}</p>
                        <p style={{fontSize:11,color:u.online?"var(--green)":"var(--text2)"}}>{u.online?"● Online":"Offline"}</p>
                      </div>
                      <div style={{display:"flex",gap:7}}>
                        <button onClick={()=>{setContact(u);setScreen("chat");}} style={{background:"rgba(0,212,255,.12)",border:"1px solid rgba(0,212,255,.25)",borderRadius:9,padding:"6px 10px",cursor:"pointer",color:"var(--blue)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>Chat</button>
                        <button onClick={()=>unfriend(u.uid)} style={{background:"rgba(255,59,92,.08)",border:"1px solid rgba(255,59,92,.2)",borderRadius:9,padding:"6px 8px",cursor:"pointer",color:"var(--red)",fontSize:11}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Real-time search results */}
              {q.trim()&&filt(strangerList).length>0&&(
                <div style={{marginBottom:16}}>
                  <p style={{fontSize:11,fontWeight:600,color:"var(--green)",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>🔍 সার্চ রেজাল্ট ({filt(strangerList).length})</p>
                </div>
              )}

              {filt(strangerList).length>0&&(
                <div>
                  {(()=>{
                    const filtered = filt(strangerList);
                    const online  = filtered.filter(u=>onlineUsers.some(o=>o.uid===u.uid));
                    const offline = filtered.filter(u=>!onlineUsers.some(o=>o.uid===u.uid));

                    const renderRow = (u,i,isOnline) => {
                      const r=rel(u.uid);
                      return(
                        <div key={u.uid} className="glass" style={{padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,borderRadius:15,animation:`slide-up .2s ease ${i*.04}s both`,border:isOnline?"1px solid rgba(16,255,176,.25)":"1px solid rgba(255,255,255,.07)",boxShadow:isOnline?"0 0 12px rgba(16,255,176,.08)":"none"}}>
                          <div onClick={()=>onViewProfile&&onViewProfile(u.uid,"messages")} style={{position:"relative",flexShrink:0,cursor:"pointer"}}>
                            {isOnline&&<div style={{position:"absolute",top:-3,left:-3,right:-3,bottom:-3,borderRadius:"50%",border:"1px solid var(--green)",opacity:.4,animation:"pulse-ring 2.2s ease-out infinite"}}/>}
                            <div style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,overflow:"hidden",border:`2px solid ${isOnline?"var(--green)":"rgba(255,255,255,.1)"}`}}>{u.photo?<img src={u.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:u.emoji}</div>
                            <div style={{position:"absolute",bottom:1,right:1,width:10,height:10,borderRadius:"50%",background:isOnline?"var(--green)":"#444",border:"2px solid var(--bg2)"}}/>
                          </div>
                          <div style={{flex:1}}>
                            <p style={{fontWeight:600,fontSize:14}}>{u.name}</p>
                            <p style={{fontSize:11,color:isOnline?"var(--green)":"var(--text2)",fontWeight:isOnline?600:400}}>
                              {isOnline?"🟢 এখন লাইভ":"⚫ Offline"}
                            </p>
                          </div>
                          {r==="friend"?<span style={{fontSize:11,color:"var(--green)"}}>✅ বন্ধু</span>
                           :r==="sent"?<div style={{padding:"6px 10px",background:"rgba(255,159,67,.1)",border:"1px solid rgba(255,159,67,.3)",borderRadius:9,color:"var(--amber)",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>Pending ✓</div>
                           :r==="received"?<button onClick={()=>acceptReq(requests.find(rq=>rq.fromUid===u.uid))} style={{background:"linear-gradient(135deg,var(--green),rgba(0,180,100,.8))",border:"none",borderRadius:9,padding:"6px 10px",cursor:"pointer",color:"#050508",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:700}}>✓ গ্রহণ</button>
                           :<button onClick={()=>sendRequest(u)} disabled={busy[u.uid]} style={{background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:9,padding:"7px 14px",cursor:"pointer",color:"white",fontSize:11,fontFamily:"'Exo 2',sans-serif",fontWeight:700}}>{busy[u.uid]?<Spinner size={12} color="white"/>:"+ বন্ধু হন"}</button>
                          }
                        </div>
                      );
                    };

                    return(<>
                      {!q.trim()&&online.length>0&&(
                        <p style={{fontSize:11,fontWeight:700,color:"var(--green)",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>
                          🟢 এখন লাইভ ({online.length})
                        </p>
                      )}
                      {online.map((u,i)=>renderRow(u,i,true))}

                      {!q.trim()&&offline.length>0&&(
                        <p style={{fontSize:11,fontWeight:600,color:"var(--text2)",letterSpacing:1,textTransform:"uppercase",margin:`${online.length>0?16:0}px 0 10px`}}>
                          👥 অন্যান্য ব্যবহারকারী ({offline.length})
                        </p>
                      )}
                      {offline.map((u,i)=>renderRow(u,i,false))}

                      {q.trim()&&filtered.length===0&&(
                        <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text2)"}}>
                          <p style={{fontSize:32,marginBottom:8}}>🔍</p>
                          <p style={{fontSize:13}}>কোনো ব্যবহারকারী পাওয়া যায়নি</p>
                        </div>
                      )}
                    </>);
                  })()}
                </div>
              )}
              <DevFooter/>
            </div>
          )}
          {tab==="requests"&&(
            <div style={{padding:"12px 16px"}}>
              {requests.length===0
                ?<div style={{textAlign:"center",padding:"50px 20px",color:"var(--text2)"}}><p style={{fontSize:40,marginBottom:12}}>🤝</p><p style={{fontSize:14}}>কোনো বন্ধুত্বের অনুরোধ নেই</p></div>
                :<>{requests.map((req,i)=>(
                    <div key={req.fromUid} className="glass" style={{padding:"14px 16px",marginBottom:10,borderRadius:17,animation:`slide-up .3s ease ${i*.06}s both`}}>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                        <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.4),rgba(0,212,255,.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0,overflow:"hidden"}}>{req.photo?<img src={req.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:req.emoji}</div>
                        <div style={{flex:1}}><p style={{fontWeight:700,fontSize:15}}>{req.name}</p><p style={{fontSize:11,color:"var(--text2)",marginTop:2}}>বন্ধুত্বের অনুরোধ পাঠিয়েছে</p></div>
                      </div>
                      <div style={{display:"flex",gap:10}}>
                        <button onClick={()=>rejectReq(req)} style={{flex:1,padding:"10px",background:"rgba(255,59,92,.1)",border:"1px solid rgba(255,59,92,.25)",borderRadius:12,color:"var(--red)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13}}>প্রত্যাখ্যান</button>
                        <button onClick={()=>acceptReq(req)} style={{flex:2,padding:"10px",background:"linear-gradient(135deg,var(--green),rgba(0,180,100,.8))",border:"none",borderRadius:12,color:"#050508",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13}}>✓ গ্রহণ করুন</button>
                      </div>
                    </div>
                  ))}</>
              }
              <DevFooter/>
            </div>
          )}
        </div>
      );
    };

    const AudioPlayer = ({src, isMe}) => {
      const [playing, setPlaying] = useState(false);
      const [progress, setProgress] = useState(0);
      const [duration, setDuration] = useState(0);
      const audRef = useRef(null);
      const color = isMe ? "var(--blue)" : "var(--purple2)";
      return(
        <div style={{display:"flex",alignItems:"center",gap:9,minWidth:190,padding:"2px 0"}}>
          <button onClick={()=>{
            if(!audRef.current)return;
            if(playing){audRef.current.pause();setPlaying(false);}
            else{audRef.current.play().catch(()=>{});setPlaying(true);}
          }} style={{width:32,height:32,borderRadius:"50%",background:`rgba(${isMe?"0,212,255":"168,85,247"},.2)`,border:`1.5px solid ${color}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,color}}>
            {playing?"⏸":"▶"}
          </button>
          <div style={{flex:1}}>
            <div style={{height:4,background:"rgba(255,255,255,.12)",borderRadius:2,cursor:"pointer",position:"relative",marginBottom:4}}
              onClick={e=>{
                if(!audRef.current||!duration)return;
                const r=e.currentTarget.getBoundingClientRect();
                audRef.current.currentTime=((e.clientX-r.left)/r.width)*duration;
              }}>
              <div style={{height:"100%",width:`${progress}%`,background:color,borderRadius:2,transition:"width .15s"}}/>
            </div>
            <p style={{fontSize:9,color:"rgba(255,255,255,.45)",letterSpacing:.3}}>
              {fmtTime(Math.floor((duration*progress/100)||0))} / {fmtTime(Math.floor(duration||0))}
            </p>
          </div>
          <span style={{fontSize:14}}>🎵</span>
          <audio ref={audRef} src={src}
            onTimeUpdate={()=>{if(audRef.current&&audRef.current.duration)setProgress(audRef.current.currentTime/audRef.current.duration*100);}}
            onLoadedMetadata={()=>{if(audRef.current)setDuration(audRef.current.duration||0);}}
            onEnded={()=>{setPlaying(false);setProgress(0);}}
          />
        </div>
      );
    };

    const ChatScreen = ({user,contact,setScreen,setCallConfig}) => {
      const [msgs,setMsgs]=useState([]);
      const [input,setInput]=useState("");
      const [typing,setTyping]=useState(false);
      const [contactOnline,setContactOnline]=useState(false);
      const [selectedMsg,setSelectedMsg]=useState(null);
      const [editingMsg,setEditingMsg]=useState(null);
      const [editText,setEditText]=useState("");
      const [recording,setRecording]=useState(false);
      const [recSec,setRecSec]=useState(0);
      const [contactSeenAt,setContactSeenAt]=useState(0);
      const bottom=useRef(null);
      const inputRef=useRef(null);
      const typingTimeout=useRef(null);
      const mrRef=useRef(null);
      const recTimerRef=useRef(null);
      const chatId=getChatId(user.uid,contact.uid);

      useEffect(()=>{
        const r=db.ref(`/messages/${chatId}`);
        r.limitToLast(100).on("value",s=>{
          const d=s.val()||{};
          const list=Object.entries(d).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0));
          setMsgs(list);
        });
        return()=>r.off();
      },[chatId,user.uid,contact.uid]);

      // unread=0 — chat খোলার সময় একবার
      useEffect(()=>{
        db.ref(`/userConvs/${user.uid}/${contact.uid}/unread`).set(0);
      },[chatId,user.uid,contact.uid]);

      // chatSeen — নতুন message আসলে update করো, কিন্তু throttle: ১০ সেকেন্ডে সর্বোচ্চ একবার
      // এতে "সবে দেখেছে" সঠিক দেখাবে, কিন্তু প্রতি message-এ write হবে না
      const _lastSeenWrite = React.useRef(0);
      useEffect(()=>{
        if(msgs.length===0) return;
        const now = Date.now();
        if(now - _lastSeenWrite.current < 10000) return; // throttle: ১০ সেকেন্ড
        _lastSeenWrite.current = now;
        db.ref(`/chatSeen/${chatId}/${user.uid}`).set(firebase.database.ServerValue.TIMESTAMP);
      },[msgs, chatId, user.uid]);

      // ── Auto-delete: ৩০ দিনের পুরনো মেসেজ চ্যাট খুললে একবার মুছে দাও ──
      useEffect(()=>{
        const cutoff = Date.now() - (30 * 24 * 60 * 60 * 1000);
        db.ref(`/messages/${chatId}`)
          .orderByChild("ts")
          .endAt(cutoff)
          .once("value", snap => snap.forEach(c => c.ref.remove()));
      },[chatId]);

      useEffect(()=>{
        const r=db.ref(`/chatSeen/${chatId}/${contact.uid}`);
        r.on("value",s=>setContactSeenAt(s.val()||0));
        return()=>r.off();
      },[chatId,contact.uid]);

      useEffect(()=>{setTimeout(()=>bottom.current?.scrollIntoView({behavior:"smooth"}),100);},[msgs]);

      useEffect(()=>{
        const r=db.ref(`/presence/${contact.uid}`);
        r.on("value",s=>setContactOnline(s.val()?.online||false));
        return()=>r.off();
      },[contact.uid]);

      useEffect(()=>{
        const r=db.ref(`/typing/${chatId}/${contact.uid}`);
        r.on("value",s=>setTyping(s.val()?.typing||false));
        return()=>r.off();
      },[chatId,contact.uid]);

      useEffect(()=>{
        return()=>{
          // ── cleanup: typing false করো যখন screen ছেড়ে যাবে ──
          try{ db.ref(`/typing/${chatId}/${user.uid}`).set({typing:false}); }catch(e){}
          if(typingTimeout.current) clearTimeout(typingTimeout.current);
          clearInterval(recTimerRef.current);
          if(mrRef.current&&mrRef.current.state!=="inactive"){
            try{mrRef.current.stream?.getTracks().forEach(t=>t.stop());}catch(e){}
          }
        };
      },[chatId,user.uid]);

      // typing debounce: প্রতি keystroke-এ Firebase write না করে 600ms পরে করো
      const _typingDebounceRef = React.useRef(null);
      const _lastTypingVal = React.useRef(null);
      const updateTyping=(v)=>{
        // একই value বারবার লিখবে না
        if(_lastTypingVal.current===v) return;
        if(_typingDebounceRef.current) clearTimeout(_typingDebounceRef.current);
        _typingDebounceRef.current = setTimeout(()=>{
          _lastTypingVal.current=v;
          db.ref(`/typing/${chatId}/${user.uid}`).set({typing:v});
          if(typingTimeout.current)clearTimeout(typingTimeout.current);
          if(v)typingTimeout.current=setTimeout(()=>{
            _lastTypingVal.current=false;
            db.ref(`/typing/${chatId}/${user.uid}`).set({typing:false});
          },3000);
        }, v ? 600 : 200); // টাইপ শুরু: 600ms, বন্ধ: 200ms
      };

      const sendMsg=useCallback(async()=>{
        const text=input.trim();if(!text)return;
        setInput("");updateTyping(false);
        const ts=firebase.database.ServerValue.TIMESTAMP;
        const msgRef=db.ref(`/messages/${chatId}`).push();
        await msgRef.set({text,from:user.uid,ts,type:"text"});
        db.ref(`/userConvs/${user.uid}/${contact.uid}`).update({uid:contact.uid,name:contact.name,emoji:contact.emoji,photo:contact.photo||null,lastMsg:text,lastTs:ts});
        db.ref(`/userConvs/${contact.uid}/${user.uid}`).update({uid:user.uid,name:user.name,emoji:user.emoji,photo:user.photo||null,lastMsg:text,lastTs:ts,unread:firebase.database.ServerValue.increment(1)});
        setTimeout(()=>inputRef.current?.focus(),50);
      },[input,chatId,user,contact]);

      const saveEdit=async()=>{
        if(!editingMsg||!editText.trim())return;
        await db.ref(`/messages/${chatId}/${editingMsg.id}`).update({text:editText.trim(),editedAt:firebase.database.ServerValue.TIMESTAMP});
        setEditingMsg(null);setEditText("");
      };

      const deleteForMe=async(msg)=>{
        await db.ref(`/messages/${chatId}/${msg.id}/deletedFor/${user.uid}`).set(true);
        setSelectedMsg(null);
      };

      const deleteForEveryone=async(msg)=>{
        await db.ref(`/messages/${chatId}/${msg.id}`).update({deletedForEveryone:true,text:"",audioData:null,audioUrl:null,type:"text"});
        setSelectedMsg(null);
      };

      const MAX_REC_SEC = 1800; // 30 মিনিট = 1800 সেকেন্ড

      const startRecording=async()=>{
        try{
          const stream=await navigator.mediaDevices.getUserMedia({audio:true});
          const chunks=[];
          const mime=MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/ogg";
          // audioBitsPerSecond: 64kbps — ভয়েস মেসেজের জন্য যথেষ্ট, Cloudinary quota বাঁচবে
          const mr=new MediaRecorder(stream,{mimeType:mime, audioBitsPerSecond:64000});
          mrRef.current=mr;
          mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
          mr.onstop=async()=>{
            stream.getTracks().forEach(t=>t.stop());
            const blob=new Blob(chunks,{type:mime});
            try {
              const audioUrl = await uploadAudioToCloudinary(blob, user.uid);
              const ts=firebase.database.ServerValue.TIMESTAMP;
              const ref=db.ref(`/messages/${chatId}`).push();
              await ref.set({type:"audio",audioUrl,from:user.uid,ts});
              db.ref(`/userConvs/${user.uid}/${contact.uid}`).update({uid:contact.uid,name:contact.name,emoji:contact.emoji,photo:contact.photo||null,lastMsg:"🎵 ভয়েস মেসেজ",lastTs:ts});
              db.ref(`/userConvs/${contact.uid}/${user.uid}`).update({uid:user.uid,name:user.name,emoji:user.emoji,photo:user.photo||null,lastMsg:"🎵 ভয়েস মেসেজ",lastTs:ts,unread:firebase.database.ServerValue.increment(1)});
            } catch(err) {
              alert("অডিও আপলোড ব্যর্থ হয়েছে। আবার চেষ্টা করুন।");
            }
          };
          mr.start();
          setRecording(true);setRecSec(0);
          recTimerRef.current=setInterval(()=>{
            setRecSec(v=>{
              if(v+1>=MAX_REC_SEC){
                // সময় শেষ — auto stop & send
                clearInterval(recTimerRef.current);
                setTimeout(()=>stopRecording(true),50);
                return MAX_REC_SEC;
              }
              return v+1;
            });
          },1000);
        }catch(e){alert("মাইক অ্যাক্সেস দিন!");}
      };

      const stopRecording=(send=true)=>{
        clearInterval(recTimerRef.current);
        setRecording(false);setRecSec(0);
        if(mrRef.current&&mrRef.current.state!=="inactive"){
          if(!send){try{mrRef.current.stream?.getTracks().forEach(t=>t.stop());}catch(e){}mrRef.current=null;return;}
          mrRef.current.stop();
        }
      };

      const startCall=async(type)=>{
        const callId=db.ref("/calls").push().key;
        db.ref(`/calls/${callId}`).set({callerUid:user.uid,calleeUid:contact.uid,type,status:"ringing",callerName:user.name,callerEmoji:user.emoji,callerPhoto:user.photo||null,ts:firebase.database.ServerValue.TIMESTAMP});
        db.ref(`/users/${contact.uid}/incomingCall`).set({callId,callerUid:user.uid,callerName:user.name,callerEmoji:user.emoji,callerPhoto:user.photo||null,type});
        setCallConfig({callId,isCaller:true,type});setScreen(type);
        // FCM push — Netlify Function দিয়ে পাঠাও
        fetch("/.netlify/functions/send-push", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            uid: contact.uid,
            callData: { callId, callerUid: user.uid, callerName: user.name, callerEmoji: user.emoji, callerPhoto: user.photo||"", type, mediaType: type }
          })
        }).catch(e => console.warn("Push failed:", e));
      };

      const hasInput=editingMsg?editText.trim():input.trim();

      return(
        <div style={{height:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Header */}
          <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:12,background:"rgba(5,5,8,.96)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(0,212,255,.1)",flexShrink:0}}>
            <button onClick={()=>setScreen("messages")} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Ic n="back" s={22} c="var(--blue)"/></button>
            <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.4),rgba(0,212,255,.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,overflow:"hidden",flexShrink:0}}>
              {contact.photo?<img src={contact.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:contact.emoji}
            </div>
            <div style={{flex:1}}>
              <p style={{fontWeight:700,fontSize:15}}>{contact.name}</p>
              <p style={{fontSize:11,color:typing?"var(--amber)":contactOnline?"var(--green)":"var(--text2)"}}>{typing?"✍️ টাইপ করছে...":contactOnline?"● Online":"Offline"}</p>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>startCall("audio")} style={{background:"rgba(168,85,247,.12)",border:"1px solid rgba(168,85,247,.25)",borderRadius:10,padding:9,cursor:"pointer"}}><Ic n="phone" s={18} c="var(--purple2)"/></button>
              <button onClick={()=>startCall("video")} style={{background:"rgba(0,212,255,.12)",border:"1px solid rgba(0,212,255,.25)",borderRadius:10,padding:9,cursor:"pointer"}}><Ic n="video" s={18} c="var(--blue)"/></button>
            </div>
          </div>

          {/* Messages list */}
          <div style={{flex:1,overflowY:"auto",padding:"14px 14px 10px"}} onClick={()=>setSelectedMsg(null)}>
            {msgs.length===0&&(
              <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text2)"}}>
                <p style={{fontSize:36,marginBottom:10}}>👋</p>
                <p style={{fontSize:13}}>হ্যালো বলুন! 👋</p>
              </div>
            )}
            {(()=>{
              const lastSentId = [...msgs].reverse().find(m=>m.from===user.uid&&!m.deletedFor?.[user.uid]&&!m.deletedForEveryone)?.id;
              const MsgStatus = ({m}) => {
                if(m.id!==lastSentId) return null;
                const ts = m.ts||0;
                const isSeen = contactSeenAt>0 && contactSeenAt>=ts;
                const isDelivered = contactOnline;
                if(isSeen) return (
                  <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:3,marginTop:2,paddingRight:4}}>
                    <div style={{width:14,height:14,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:"1px solid rgba(0,212,255,.4)"}}>
                      {contact.photo?<img src={contact.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:8,lineHeight:"14px",display:"block",textAlign:"center"}}>{contact.emoji}</span>}
                    </div>
                    <span style={{fontSize:10,color:"var(--blue)",fontWeight:600}}>Seen</span>
                  </div>
                );
                if(isDelivered) return (
                  <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:2,marginTop:2,paddingRight:4}}>
                    <svg width="16" height="10" viewBox="0 0 16 10" fill="none">
                      <path d="M1 5l3 3 5-7" stroke="var(--text2)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                      <path d="M5 5l3 3 5-7" stroke="var(--text2)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    <span style={{fontSize:10,color:"var(--text2)"}}>Delivered</span>
                  </div>
                );
                return (
                  <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:2,marginTop:2,paddingRight:4}}>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M1 5l3 3 5-7" stroke="var(--text2)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    <span style={{fontSize:10,color:"var(--text2)"}}>Sent</span>
                  </div>
                );
              };
              return msgs.map((m)=>{
              if(m.deletedFor?.[user.uid])return null;
              const isMe=m.from===user.uid;
              const isSel=selectedMsg?.id===m.id;
              if(m.deletedForEveryone)return(
                <div key={m.id} style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginBottom:6}}>
                  <div style={{maxWidth:"75%",padding:"8px 14px",borderRadius:18,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",color:"var(--text2)",fontSize:13,fontStyle:"italic"}}>
                    🚫 বার্তা মুছে ফেলা হয়েছে
                  </div>
                </div>
              );
              return(
                <div key={m.id} style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginBottom:6,position:"relative"}}>
                  {!isMe&&(
                    <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(124,58,237,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,marginRight:7,flexShrink:0,alignSelf:"flex-end",overflow:"hidden"}}>
                      {contact.photo?<img src={contact.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:contact.emoji}
                    </div>
                  )}
                  <div style={{maxWidth:"75%"}}>
                    <div
                      className={`msg-bubble ${isMe?"msg-sent":"msg-recv"}`}
                      onClick={e=>{e.stopPropagation();setSelectedMsg(isSel?null:m);setEditingMsg(null);}}
                      style={{cursor:"pointer",outline:isSel?`2px solid rgba(0,212,255,.45)`:"none",outlineOffset:2}}
                    >
                      {m.type==="audio"
                        ?<AudioPlayer src={m.audioUrl||m.audioData} isMe={isMe}/>
                        :m.text
                      }
                    </div>
                    <p style={{fontSize:10,color:"var(--text2)",textAlign:isMe?"right":"left",marginTop:2,paddingLeft:4,paddingRight:4}}>
                      {m.ts?new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}{m.editedAt?" · ✏️ সম্পাদিত":""}
                    </p>
                    {isMe&&<MsgStatus m={m}/>}
                    {isSel&&(
                      <div style={{position:"absolute",[isMe?"right":"left"]:0,top:"calc(100% + 2px)",zIndex:300,background:"var(--bg2)",border:"1px solid var(--gb)",borderRadius:14,padding:"5px",minWidth:185,boxShadow:"0 10px 30px rgba(0,0,0,.65)",animation:"slide-up .15s ease"}}>
                        {isMe&&m.type!=="audio"&&(
                          <button onClick={()=>{setEditingMsg(m);setEditText(m.text);setSelectedMsg(null);}} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 13px",background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:9}}>
                            ✏️ এডিট করুন
                          </button>
                        )}
                        <button onClick={()=>deleteForMe(m)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 13px",background:"none",border:"none",color:"var(--text)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:9}}>
                          🗑️ আমার কাছ থেকে মুছুন
                        </button>
                        {isMe&&(
                          <button onClick={()=>deleteForEveryone(m)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 13px",background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:13,borderRadius:9}}>
                            🗑️ সবার জন্য মুছুন
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })})()}
            {typing&&(
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(124,58,237,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,overflow:"hidden"}}>
                  {contact.photo?<img src={contact.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:contact.emoji}
                </div>
                <div className="glass" style={{padding:"10px 14px",borderRadius:18,borderBottomLeftRadius:4}}>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"var(--blue)",animation:`typing-dot 1s ease-in-out ${i*.15}s infinite`}}/>)}
                  </div>
                </div>
              </div>
            )}
            <div ref={bottom}/>
          </div>

          {/* Edit mode banner */}
          {editingMsg&&(
            <div style={{padding:"8px 16px",background:"rgba(0,212,255,.07)",borderTop:"1px solid rgba(0,212,255,.18)",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
