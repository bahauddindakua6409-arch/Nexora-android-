    // ── Cloudinary: অডিও মেসেজ আপলোড ──────────────────────────────────────────

    // ── Cloudinary: পোস্ট ভিডিও আপলোড — Multi-Account Rotation System ──────────
    // 8টি অ্যাকাউন্ট একটি অ্যারেতে। একটির লিমিট শেষ হলে পরেরটি স্বয়ংক্রিয়ভাবে চালু হয়।
    // পুরানো অ্যাকাউন্টের ভিডিও URL পরিবর্তন হয় না, তাই আগের ভিডিও সবসময় দেখা যাবে।
    const CLOUDINARY_VIDEO_CREDENTIALS = [
      { cloud: "dw1blkz4x",  preset: "qmxzkdpp"    }, // original
      { cloud: "dso4yddot",  preset: "Hellos"       },
      { cloud: "dzxzyiyfc",  preset: "Djhgjhgh"     },
      { cloud: "dzt5ls3ol",  preset: "Ghjjjjj"      },
      { cloud: "dv94zmmmu",  preset: "Bvhuhvgg"     },
      { cloud: "dzewvsmrw",  preset: "Yxxyxycytf"   },
      { cloud: "dmf7bv7d4",  preset: "Xxy4yd"       },
      { cloud: "dnvdmn7ba",  preset: "ml_defaultyg" },
    ];

    const CldVideoRotation = (() => {
      const STORAGE_KEY = "cld_video_cred_idx";
      const TOTAL = CLOUDINARY_VIDEO_CREDENTIALS.length;

      let _idx = (() => {
        try {
          const v = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);
          return (isNaN(v) || v < 0 || v >= TOTAL) ? 0 : v;
        } catch(e) { return 0; }
      })();

      function getCurrent() { return CLOUDINARY_VIDEO_CREDENTIALS[_idx]; }

      function _rotate() {
        _idx = (_idx + 1) % TOTAL;
        try { localStorage.setItem(STORAGE_KEY, String(_idx)); } catch(e) {}
        console.warn(`[CldVideoRotation] Rotated → account #${_idx} (${getCurrent().cloud})`);
      }

      // একটি নির্দিষ্ট credential দিয়ে chunked upload — ব্যর্থ হলে reject করে
      function _uploadWithCred(file, uid, cred, onProgress, signal) {
        return new Promise((resolve, reject) => {
          const totalSize = file.size;
          const uploadId = `vc_${uid}_${Date.now()}_${Math.random().toString(36).substr(2,8)}`;
          let currentXhr = null;
          let aborted = false;

          if (signal) {
            signal.addEventListener("abort", () => {
              aborted = true;
              if (currentXhr) currentXhr.abort();
              reject(new Error("ABORTED"));
            }, { once: true });
          }

          const uploadChunk = (chunkStart, attempt) => {
            if (aborted || signal?.aborted) return;
            const chunkEnd = Math.min(chunkStart + VIDEO_CHUNK_SIZE, totalSize) - 1;
            const chunk = file.slice(chunkStart, chunkEnd + 1);

            const formData = new FormData();
            formData.append("file", chunk);
            formData.append("upload_preset", cred.preset);

            const xhr = new XMLHttpRequest();
            currentXhr = xhr;
            xhr.open("POST", `https://api.cloudinary.com/v1_1/${cred.cloud}/video/upload`);
            xhr.setRequestHeader("X-Unique-Upload-Id", uploadId);
            xhr.setRequestHeader("Content-Range", `bytes ${chunkStart}-${chunkEnd}/${totalSize}`);
            xhr.timeout = 300000; // 5 min per chunk

            xhr.upload.onprogress = e => {
              if (e.lengthComputable && e.total > 0 && onProgress) {
                const bytesDone = chunkStart + e.loaded;
                onProgress(Math.min(99, Math.round(bytesDone * 100 / totalSize)));
              }
            };

            xhr.onload = () => {
              if (aborted) return;
              if (xhr.status === 200) {
                let data;
                try { data = JSON.parse(xhr.responseText); } catch(e) { data = {}; }
                if (data.error) {
                  reject(new Error(data.error.message || "Cloudinary আপলোড ব্যর্থ হয়েছে"));
                } else if (data.secure_url) {
                  if (onProgress) onProgress(100);
                  resolve(data.secure_url);
                } else {
                  if (onProgress) onProgress(Math.min(99, Math.round((chunkEnd + 1) * 100 / totalSize)));
                  uploadChunk(chunkEnd + 1, 1);
                }
              } else if (xhr.status === 400) {
                try {
                  const d = JSON.parse(xhr.responseText);
                  reject(new Error(d.error?.message || "আপলোড ব্যর্থ — Cloudinary preset সেটিং চেক করুন"));
                } catch(e) { reject(new Error("আপলোড ব্যর্থ (HTTP 400)")); }
              } else if (xhr.status === 0) {
                reject(new Error("ABORTED"));
              } else {
                // সাময়িক সার্ভার ত্রুটি — এই chunk পুনরায় পাঠাও (শুরু থেকে নয়)
                if (attempt < 4) {
                  setTimeout(() => uploadChunk(chunkStart, attempt + 1), 2000 * attempt);
                } else {
                  reject(new Error(`আপলোড ব্যর্থ (HTTP ${xhr.status})`));
                }
              }
            };

            xhr.onerror = () => {
              if (aborted) return;
              if (attempt < 4) {
                setTimeout(() => uploadChunk(chunkStart, attempt + 1), 2000 * attempt);
              } else {
                reject(new Error("নেটওয়ার্ক সমস্যা — ইন্টারনেট সংযোগ চেক করুন"));
              }
            };

            xhr.ontimeout = () => {
              if (aborted) return;
              if (attempt < 4) {
                setTimeout(() => uploadChunk(chunkStart, attempt + 1), 2000 * attempt);
              } else {
                reject(new Error("আপলোড Timeout — ইন্টারনেট অনেক ধীর, আবার চেষ্টা করুন"));
              }
            };

            xhr.send(formData);
          };

          uploadChunk(0, 1);
        });
      }

      // Public: upload with automatic rotation on account failure
      async function upload(file, uid, onProgress, signal) {
        let lastErr;
        for (let attempt = 0; attempt < TOTAL; attempt++) {
          if (signal?.aborted) throw new Error("ABORTED");
          const cred = getCurrent();
          try {
            // প্রতিটি rotation-এ progress 0 থেকে শুরু হয়
            if (attempt > 0 && onProgress) onProgress(0);
            const url = await _uploadWithCred(file, uid, cred, onProgress, signal);
            return url; // ✓ সফল
          } catch(e) {
            if (e.message === "ABORTED") throw e; // user cancel — রোটেট করবে না
            lastErr = e;
            console.warn(`[CldVideoRotation] Account #${_idx} (${cred.cloud}) failed: ${e.message}`);
            _rotate();
          }
        }
        throw new Error("সকল Cloudinary অ্যাকাউন্ট সাময়িকভাবে অনুপলব্ধ। একটু পরে আবার চেষ্টা করুন।");
      }

      return { getCurrent, upload };
    })();

    const POST_MAX_VIDEO_BYTES = 100 * 1024 * 1024; // 100 MB

    // ── Global Background Upload Manager ────────────────────────────────────────
    // modal বন্ধ হলেও আপলোড চলতে থাকে; App-এ floating progress bar দেখায়
    const _bgUploadListeners = new Set();
    let _bgUploadState = null; // { progress: 0-100, fileName, cancel }

    function getBgUpload() { return _bgUploadState; }
    function setBgUpload(state) {
      _bgUploadState = state;
      _bgUploadListeners.forEach(fn => fn(state));
    }
    function useBgUpload() {
      const [state, setState] = useState(_bgUploadState);
      useEffect(() => {
        _bgUploadListeners.add(setState);
        return () => _bgUploadListeners.delete(setState);
      }, []);
      return state;
    }

    // ── Chunked video upload (20 MB per chunk) ──────────────────────────────────
    // • ফাইল ছোট ছোট অংশে (chunk) আপলোড হয়
    // • প্রতি chunk ৪ বার চেষ্টা করে, ব্যর্থ হলে exponential back-off
    // • AbortSignal দিয়ে যেকোনো সময় বাতিল করা যায়
    // • একটি অ্যাকাউন্ট fail হলে CldVideoRotation স্বয়ংক্রিয়ভাবে পরেরটিতে যায়
    const VIDEO_CHUNK_SIZE = 20 * 1024 * 1024; // 20 MB per chunk

    function uploadVideoToCloudinary(file, uid, onProgress, signal) {

    // ── Module-level caches: Firebase read কমাতে ──────────────────────────────
    const _userProfileCache = {};          // uid → {data, ts}
    const USER_CACHE_TTL = 5 * 60 * 1000; // 5 মিনিট cache

    // /users full list cache — real-time listener বন্ধ, 5 মিনিটে একবার ডাউনলোড
    // online status আলাদাভাবে /presence থেকে real-time আসবে
    const _allUsersCache = { data: null, ts: 0 };
    const USERS_LIST_TTL = 5 * 60 * 1000;
    function loadUsersOnce(callback) {
      const now = Date.now();
      if (_allUsersCache.data && (now - _allUsersCache.ts) < USERS_LIST_TTL) {
        callback(_allUsersCache.data);
        return;
      }
      db.ref("/users").once("value", snap => {
        _allUsersCache.data = snap.val() || {};
        _allUsersCache.ts = Date.now();
        callback(_allUsersCache.data);
      });

    const EMOJIS = ["🧑‍💻","👩‍🎨","👨‍🎤","👩‍💼","🧑‍🚀","👩‍🔬","👨‍🍳","👩‍🎓","🧑‍🎨","👨‍💼","🧑‍🔧","👩‍🏫"];
    const getEmoji = uid => { let h=0; for(let c of(uid||"x"))h=(h*31+c.charCodeAt(0))&0xffff; return EMOJIS[h%EMOJIS.length]; };
    const getChatId = (a,b) => [a,b].sort().join("_");
    const fmtTime  = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

    // ── FCM: Token init & Push sender ──────────────────────────────────────────
    let _fcmMessaging = null;

    async function initFCM(uid) {
      try {
        if (!firebase.messaging || VC_VAPID_KEY.includes("YOUR_")) return;
        _fcmMessaging = firebase.messaging();

        // sw.js registration নিশ্চিত করো — FCM push subscription এর সাথে tie করতে হবে।
        // serviceWorkerRegistration explicitly দিলে FCM push সরাসরি sw.js-এ যাবে।
        // না দিলে Firebase firebase-messaging-sw.js খোঁজে — যেটা "waiting" state-এ আটকে থাকে
        // এবং push event deliver হয় না → notification হারিয়ে যায়।
        let swReg = _swReg;
        if (!swReg) {
          try { swReg = await navigator.serviceWorker.ready; _swReg = swReg; } catch(e) {}
        }

        const tokenOpts = { vapidKey: VC_VAPID_KEY };
        if (swReg) tokenOpts.serviceWorkerRegistration = swReg;

        const token = await _fcmMessaging.getToken(tokenOpts);
        if (token) {
          _fcmToken = token;
          db.ref(`/users/${uid}/fcmToken`).set(token);
          // sw.js-কে auth token দাও যাতে reject action REST call করতে পারে
          const fbUser = firebase.auth().currentUser;
          if (fbUser && swReg && swReg.active) {
            fbUser.getIdToken().then(idToken => {
              swReg.active.postMessage({ type: "VC_SW_AUTH", uid, token: idToken });
            }).catch(() => {});
          }
        }
        // Token refresh হলে DB আপডেট করো
        _fcmMessaging.onTokenRefresh && _fcmMessaging.onTokenRefresh(async () => {
          try {
            const opts2 = { vapidKey: VC_VAPID_KEY };

    function playRingTone() {
      stopRing();
      try {
        ringAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
        let count=0;
        const doRing=()=>{
          if(count>20)return;
          count++;
          [0,0.35].forEach(offset=>{
            const osc=ringAudioCtx.createOscillator();
            const gain=ringAudioCtx.createGain();
            osc.connect(gain); gain.connect(ringAudioCtx.destination);
            osc.frequency.value=480; osc.type="sine";
            const t=ringAudioCtx.currentTime+offset;
            gain.gain.setValueAtTime(0,t);
            gain.gain.linearRampToValueAtTime(0.5,t+0.05);
            gain.gain.linearRampToValueAtTime(0.5,t+0.28);
            gain.gain.linearRampToValueAtTime(0,t+0.33);
            osc.start(t); osc.stop(t+0.34);
            ringNodes.push(osc);
          });
        };
        ringAudioCtx.resume().then(()=>{
          doRing();
          ringInterval=setInterval(doRing,2000);
        }).catch(()=>{
          doRing();
          ringInterval=setInterval(doRing,2000);
        });
      } catch(e){}
    }

    async function requestMediaPermissions() {
      // ── Smart Permission Guard ───────────────────────────────────────────────
      // Strategy:
      //   1. Use Permissions API to check current browser-level permission state.
      //   2. If BOTH camera & mic are already "granted" → skip getUserMedia entirely
      //      (no prompt, no track allocation).
      //   3. If state is "prompt" (never asked) → call getUserMedia once, then save
      //      a localStorage flag so subsequent app-opens know we already asked.
      //   4. If state is "denied" → skip silently (user will see error when they
      //      actually try to make a call — handled by ensureMediaPermission).
      //   5. localStorage flag "vc_media_perm_asked" is the fallback for browsers
      //      (e.g. Firefox) that don't fully support the Permissions API for camera/mic.
      //      Once we've asked once and the flag is set, we never proactively ask again.
      // ────────────────────────────────────────────────────────────────────────

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

      const PERM_KEY = "vc_media_perm_asked";

      try {
        // Try the Permissions API first (Chrome/Edge support camera & microphone queries)
        if (navigator.permissions && navigator.permissions.query) {
          let camState = "prompt";
          let micState = "prompt";

          try { camState = (await navigator.permissions.query({ name: "camera" })).state; } catch(_) {}
          try { micState = (await navigator.permissions.query({ name: "microphone" })).state; } catch(_) {}

          // Both already granted — nothing to do, skip getUserMedia entirely
          if (camState === "granted" && micState === "granted") {
            localStorage.setItem(PERM_KEY, "granted");
            return;
          }

          // Either denied — don't prompt again, let ensureMediaPermission handle it at call-time
          if (camState === "denied" || micState === "denied") {
            localStorage.setItem(PERM_KEY, "denied");
            return;
          }

          // State is "prompt" for one or both — fall through to getUserMedia below
          // ONLY if we haven't already asked in a previous session
        }

        // Fallback / complementary check: if we've already asked once, don't ask again
        const alreadyAsked = localStorage.getItem(PERM_KEY);
        if (alreadyAsked) return; // "granted" or "denied" or "asked" — all mean don't re-prompt

        // First time asking — call getUserMedia to trigger the browser prompt
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
          stream.getTracks().forEach(t => t.stop());
          localStorage.setItem(PERM_KEY, "granted");
        } catch(e) {
          if (e.name === "NotAllowedError" || e.name === "PermissionDeniedError" || e.name === "SecurityError") {
            // User denied — mark so we never ask again proactively
            localStorage.setItem(PERM_KEY, "denied");
          } else {
            // Camera unavailable (NotFoundError etc.) — try audio only
            try {
              const s = await navigator.mediaDevices.getUserMedia({ audio: true });
              s.getTracks().forEach(t => t.stop());
              localStorage.setItem(PERM_KEY, "granted");
            } catch(e2) {
              // Audio also denied/unavailable — mark as asked so we don't loop
              localStorage.setItem(PERM_KEY, "asked");
            }
          }
        }
      } catch(outerErr) {
        // Safety net — if anything above throws unexpectedly, don't crash the app
        console.warn("requestMediaPermissions:", outerErr);
      }
    }

    const LKRotation = (() => {
      const STORAGE_KEY = "lk_cred_idx";
      const TOTAL = LIVEKIT_CREDENTIALS.length;

      let _idx = 0;
      try {
        const v = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);
        _idx = (isNaN(v) || v < 0 || v >= TOTAL) ? 0 : v;
      } catch(e) {}

      function _save() {
        try { localStorage.setItem(STORAGE_KEY, String(_idx)); } catch(e) {}
      }

      function getCurrent() { return LIVEKIT_CREDENTIALS[_idx]; }

      // ── CRITICAL FIX: roomName থেকে deterministic starting index বের করো ──────
      // caller ও callee উভয়ই একই roomName hash থেকে শুরু করবে।
      // localStorage index ভিন্ন হলেও একই server এ connect হবে।
      function _roomHash(roomName) {
        let h = 5381;
        for (let i = 0; i < roomName.length; i++) {
          h = (((h << 5) + h) + roomName.charCodeAt(i)) & 0x7FFFFFFF;
        }
        return h % TOTAL;
      }

      // Build a JWT token for a given credential set
      async function _buildToken(roomName, identity, displayName, cred) {
        const enc = s => btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");
        const now = Math.floor(Date.now()/1000);
        const header  = enc({alg:"HS256",typ:"JWT"});
        const payload = enc({
          iss: cred.apiKey,
          sub: identity,
          iat: now, nbf: now,
          exp: now + 7200,
          name: displayName,
          video: {roomJoin:true, room:roomName, canPublish:true, canSubscribe:true, canPublishData:true}
        });
        const signing = `${header}.${payload}`;
        const key = await crypto.subtle.importKey("raw", new TextEncoder().encode(cred.apiSecret), {name:"HMAC",hash:"SHA-256"}, false, ["sign"]);
        const sig = await crypto.subtle.sign("HMAC", key, new TextEncoder().encode(signing));
        const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");
        return `${signing}.${sigB64}`;
      }

      // Public: generate token with current active credential
      async function generateToken(roomName, identity, displayName) {
        return _buildToken(roomName, identity, displayName, getCurrent());

      // caller ও callee উভয়ই একই roomName → একই hash → একই server।
      // কোনো server fail হলে পরেরটিতে যাও, সবসময় একই ক্রমে।
      async function connectRoom(room, roomName, identity, displayName, connectOptions) {
        const opts = connectOptions || { autoSubscribe: true };
        const startIdx = _roomHash(roomName); // deterministic, device-independent
        let lastErr;
        for (let attempt = 0; attempt < TOTAL; attempt++) {
          const idx = (startIdx + attempt) % TOTAL;
          const cred = LIVEKIT_CREDENTIALS[idx];
          try {
            const token = await _buildToken(roomName, identity, displayName, cred);
            await room.connect(cred.url, token, opts);
            _idx = idx; _save(); // পরবর্তী generateToken() এর জন্য update
            return; // ✓ connected
          } catch(e) {
            lastErr = e;
            console.warn(`[LKRotation] Connect failed on #${idx} (${cred.url}): ${e.message}`);

      }

      return { getCurrent, generateToken, connectRoom };
    })();
