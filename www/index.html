                <p style={{fontSize:10,color:"var(--blue)",fontWeight:700,marginBottom:2}}>✏️ মেসেজ এডিট</p>
                <p style={{fontSize:12,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{editingMsg.text}</p>
              </div>
              <button onClick={()=>{setEditingMsg(null);setEditText("");}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text2)",fontSize:18,flexShrink:0,padding:"0 4px"}}>✕</button>
            </div>
          )}

          {/* Input area */}
          <div style={{padding:"10px 14px 16px",background:"rgba(5,5,8,.97)",backdropFilter:"blur(22px)",borderTop:"1px solid rgba(0,212,255,.1)",flexShrink:0}}>
            {recording?(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"var(--red)",flexShrink:0,boxShadow:"0 0 8px var(--red)",animation:"glow-pulse 1s ease-in-out infinite"}}/>
                  <div style={{display:"flex",gap:2,alignItems:"center",flex:1}}>
                    {[3,5,8,6,9,7,5,8,4,6,9,5,7].map((h,i)=>(
                      <div key={i} style={{width:3,borderRadius:2,background:"var(--blue)",height:h+4,animation:`wave 1s ease-in-out ${i*.08}s infinite`}}/>
                    ))}
                  </div>
                  <span style={{fontSize:13,color:recSec>=1500?"var(--amber)":"var(--red)",fontWeight:700,fontFamily:"Orbitron",letterSpacing:1,flexShrink:0}}>{fmtTime(recSec)}<span style={{fontSize:9,fontWeight:400,color:"var(--text2)",marginLeft:3}}>/30:00</span></span>
                </div>
                <button onClick={()=>stopRecording(false)} style={{background:"rgba(255,255,255,.07)",border:"1px solid var(--gb)",borderRadius:10,padding:"9px 13px",cursor:"pointer",color:"var(--text2)",fontSize:13,flexShrink:0}}>✕</button>
                <button onClick={()=>stopRecording(true)} style={{background:"linear-gradient(135deg,var(--green),rgba(0,180,100,.8))",border:"none",borderRadius:10,padding:"9px 16px",cursor:"pointer",color:"#050508",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,flexShrink:0,display:"flex",alignItems:"center",gap:6}}>
                  <Ic n="send" s={15} c="#050508"/> পাঠান
                </button>
              </div>
            ):(
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <textarea
                  ref={inputRef}
                  value={editingMsg?editText:input}
                  onChange={e=>{
                    if(editingMsg)setEditText(e.target.value);
                    else{setInput(e.target.value);updateTyping(e.target.value.length>0);}
                  }}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();editingMsg?saveEdit():sendMsg();}}}
                  placeholder={editingMsg?"মেসেজ এডিট করুন...":"বার্তা লিখুন..."}
                  rows={1}
                  style={{flex:1,maxHeight:100,minHeight:44,resize:"none",borderColor:editingMsg?"rgba(0,212,255,.45)":undefined}}
                />
                {!editingMsg&&!input.trim()&&(
                  <button
                    onClick={startRecording}
                    style={{background:"rgba(16,255,176,.1)",border:"1px solid rgba(16,255,176,.28)",borderRadius:10,padding:"10px 12px",cursor:"pointer",flexShrink:0,height:44,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}
                  >🎙️</button>
                )}
                <button
                  onClick={editingMsg?saveEdit:sendMsg}
                  disabled={!hasInput}
                  style={{background:hasInput?"linear-gradient(135deg,var(--purple),var(--blue))":"rgba(255,255,255,.07)",border:"none",borderRadius:10,padding:"10px 14px",cursor:hasInput?"pointer":"default",flexShrink:0,height:44,display:"flex",alignItems:"center",justifyContent:"center"}}
                >
                  {editingMsg
                    ?<span style={{fontSize:15,fontWeight:900,color:hasInput?"white":"var(--text2)"}}>✓</span>
                    :<Ic n="send" s={18} c={hasInput?"white":"var(--text2)"}/>
                  }
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const VideoCallScreen = ({user,contact,callConfig,setScreen,onMinimize,pipState}) => {
      const LK = window.LivekitClient;
      const roomRef = useRef(null);
      const localVidRef = useRef(null);
      const remoteVidRef = useRef(null);
      const timerRef = useRef(null);
      const destroyedRef = useRef(false);
      const isPipRef = useRef(false);
      const facingModeRef = useRef('user');
      // remote video track সরাসরি সংরক্ষণ করি — GroupCallScreen-এর remoteTracksRef-এর মতো
      const remoteVideoTrackRef = useRef(pipState && pipState.remoteVideoTrackRef ? pipState.remoteVideoTrackRef.current : null);
      const [status, setStatus] = useState(pipState?pipState.status:"connecting");
      const [sec, setSec] = useState(pipState?pipState.sec:0);
      const [muted, setMuted] = useState(pipState?pipState.muted:false);
      const [camOff, setCamOff] = useState(pipState?pipState.camOff:false);
      const [netQuality, setNetQuality] = useState("good");
      const [err, setErr] = useState("");
      const [permDenied, setPermDenied] = useState(false);

      const startTimer = useCallback(() => {
        if (!timerRef.current) timerRef.current = setInterval(() => setSec(s => s+1), 1000);
      }, []);

      // Show permission denied screen
      if (permDenied) return (
        <PermissionDeniedScreen needVideo={true} onBack={(granted) => {
          if (granted) { setPermDenied(false); }
          else setScreen("home");
        }}/>
      );

      useEffect(() => {
        // PiP থেকে ফিরলে আগের room পুনরায় ব্যবহার করি
        if (pipState && pipState.roomRef && pipState.roomRef.current) {
          roomRef.current = pipState.roomRef.current;
          destroyedRef.current = pipState.destroyedRef ? pipState.destroyedRef.current : false;
          // Timer resume করি
          if (status === "active" && !timerRef.current) {
            timerRef.current = setInterval(() => setSec(s => s+1), 1000);
          }
          const room = roomRef.current;
          const LK = window.LivekitClient;
          const retryTimers = [];

          // GroupCallScreen-এর VideoTile-এর মতো সরাসরি track.attach() ব্যবহার করি
          const directAttach = (track, videoEl) => {
            if (!track || !videoEl) return false;
            // Primary: LiveKit canonical attach (সবচেয়ে reliable)
            try {
              track.attach(videoEl);
              safePlay(videoEl);
              return true;
            } catch(e) {}
            // Fallback: raw MediaStreamTrack দিয়ে fresh stream
            try {
              const mst = track.mediaStreamTrack || track._mediaStreamTrack;
              if (mst && mst.readyState !== "ended") {
                videoEl.srcObject = new MediaStream([mst]);
                safePlay(videoEl);
                return true;
              }
            } catch(e) {}
            return false;
          };

          const attachLocal = () => {
            const localPub = getTrackPub(room.localParticipant, LK?.Track?.Source?.Camera);
            if (localPub?.track && localVidRef.current) {
              directAttach(localPub.track, localVidRef.current);
            }
          };

          const attachRemote = () => {
            if (!remoteVidRef.current) return false;
            // প্রথমে সংরক্ষিত track ব্যবহার করি (সবচেয়ে reliable)
            if (remoteVideoTrackRef.current) {
              if (directAttach(remoteVideoTrackRef.current, remoteVidRef.current)) return true;
            }
            // Fallback: room থেকে track খুঁজি
            const getRemotes = () =>
              (room.remoteParticipants instanceof Map)
                ? room.remoteParticipants
                : (room.participants instanceof Map ? room.participants : new Map());
            let attached = false;
            getRemotes().forEach(p => {
              const videoPub = getTrackPub(p, LK?.Track?.Source?.Camera);
              if (videoPub?.track) {
                remoteVideoTrackRef.current = videoPub.track; // সংরক্ষণ করি
                if (directAttach(videoPub.track, remoteVidRef.current)) attached = true;
              }
            });
            return attached;
          };

          const onTrackSubscribed = (track) => {
            if (track.kind === LK.Track.Kind.Video && remoteVidRef.current) {
              remoteVideoTrackRef.current = track; // সংরক্ষণ করি
              setTimeout(() => directAttach(track, remoteVidRef.current), 50);
              setStatus("active");
            }
          };
          // camera unmute হলে re-attach
          const onTrackUnmuted = (track) => {
            if (track?.kind === LK?.Track?.Kind?.Video && remoteVidRef.current) {
              if (track !== remoteVideoTrackRef.current) remoteVideoTrackRef.current = track;
              setTimeout(() => directAttach(remoteVideoTrackRef.current, remoteVidRef.current), 100);
            }
          };
          room.on(LK.RoomEvent.TrackSubscribed, onTrackSubscribed);
          room.on(LK.RoomEvent.TrackUnmuted, onTrackUnmuted);

          const safeAttachAll = () => {
            if (destroyedRef.current) return;
            attachLocal();
            attachRemote();
          };

          // DOM mount হওয়ার পর বিভিন্ন delay তে retry
          [50, 200, 600, 1500, 3000, 5000].forEach(delay => {
            const t = setTimeout(safeAttachAll, delay);
            retryTimers.push(t);
          });

          // interval-based retry — video actually দেখাচ্ছে কিনা check করে
          const checkInterval = setInterval(() => {
            if (destroyedRef.current) { clearInterval(checkInterval); return; }
            const v = remoteVidRef.current;
            if (!v) return;
            if (v.videoWidth > 0 && !v.paused) { clearInterval(checkInterval); return; }
            attachRemote(); // তখনও কালো থাকলে আবার try
          }, 1000);
          retryTimers.push({ _isInterval: true, _id: checkInterval });

          const pipCleanup = () => {
            retryTimers.forEach(t => {
              if (t && t._isInterval) clearInterval(t._id);
              else clearTimeout(t);
            });
            try { room.off(LK.RoomEvent.TrackSubscribed, onTrackSubscribed); } catch(e) {}
            try { room.off(LK.RoomEvent.TrackUnmuted, onTrackUnmuted); } catch(e) {}
          };
          const cleanupFromPip = (goHome=false) => {
            if (destroyedRef.current) return;
            destroyedRef.current = true;
            clearInterval(timerRef.current);
            pipCleanup();
            room.disconnect();
            db.ref(`/calls/${callConfig.callId}/status`).off();
            if (goHome) setScreen("home");
          };
          const statusRef = db.ref(`/calls/${callConfig.callId}/status`);
          statusRef.on("value", s => {
            const v = s.val();
            if ((v==="ended"||v==="rejected") && !destroyedRef.current) cleanupFromPip(true);
          });
          return () => {
            pipCleanup();
            statusRef.off();
          };
        }

        // ── Video 1:1 Auto-reconnect ──────────────────────────────────────
        const reconnectAttemptsRef = {current: 0};
        const reconnectTimerRef = {current: null};
        const cleanupRef = {current: null};
        const participantDisconnectTimerRef = {current: null};
        const sharedAudioEls = [];

        const doConnect = async (attempt) => {
          // পুরনো room সরিয়ে নতুন তৈরি করো
          if (roomRef.current) {
            try { roomRef.current.removeAllListeners(); } catch(e) {}
            try { roomRef.current.disconnect(); } catch(e) {}
          }
          let room;
          try { room = buildLKRoom(false); } catch(e) { setErr("ভিডিও SDK লোড হয়নি। পেজ রিফ্রেশ করুন।"); return; }
          roomRef.current = room;

          const attachLocalCam = () => {
            const LK = window.LivekitClient;
            const pub = getTrackPub(room.localParticipant, LK?.Track?.Source?.Camera);
            if (pub?.track && localVidRef.current) {
              pub.track.attach(localVidRef.current);
              safePlay(localVidRef.current);
            }
          };

          room.on(LK.RoomEvent.ParticipantConnected, () => {
            // participant ফিরে এলে disconnect timer বাতিল করো
            clearTimeout(participantDisconnectTimerRef.current);
            participantDisconnectTimerRef.current = null;
            setStatus("active"); startTimer();
          });
          room.on(LK.RoomEvent.ParticipantDisconnected, () => {
            if (!destroyedRef.current) {
              // সাথে সাথে end না করে 12s grace period দাও — brief network drop হলে reconnect সম্ভব
              clearTimeout(participantDisconnectTimerRef.current);
              participantDisconnectTimerRef.current = setTimeout(() => {
                if (!destroyedRef.current) {
                  db.ref(`/calls/${callConfig.callId}/status`).set("ended");
                }
              }, 12000);
            }
          });
          room.on(LK.RoomEvent.TrackSubscribed, (track) => {
            // track subscribe মানে participant ফিরে এসেছে — disconnect timer বাতিল
            clearTimeout(participantDisconnectTimerRef.current);
            participantDisconnectTimerRef.current = null;
            if (track.kind === LK.Track.Kind.Video && remoteVidRef.current) {
              remoteVideoTrackRef.current = track;
              [0, 100, 300, 700, 1500].forEach(d => setTimeout(() => {
                if (!destroyedRef.current && remoteVidRef.current) {
                  track.attach(remoteVidRef.current);
                  safePlay(remoteVidRef.current);
                }
              }, d));
              setStatus("active"); startTimer();
            } else if (track.kind === LK.Track.Kind.Audio) {
              const el = track.attach();
              el.autoplay = true;
              el.play().catch(() => {});
              document.body.appendChild(el); sharedAudioEls.push(el);
              setStatus("active"); startTimer();
            }
          });
          room.on(LK.RoomEvent.TrackUnmuted, (track) => {
            if (track?.kind === LK?.Track?.Kind?.Video && remoteVidRef.current) {
              remoteVideoTrackRef.current = track;
              setTimeout(() => {
                if (!destroyedRef.current && remoteVidRef.current) {
                  track.attach(remoteVidRef.current);
                  safePlay(remoteVidRef.current);
                }
              }, 100);
            }
          });
          room.on(LK.RoomEvent.TrackUnsubscribed, track => track.detach());
          room.on(LK.RoomEvent.LocalTrackPublished, pub => {
            if (pub.track?.kind === LK.Track.Kind.Video && localVidRef.current) {
              pub.track.attach(localVidRef.current);
              safePlay(localVidRef.current);
            }
          });
          room.on(LK.RoomEvent.ConnectionQualityChanged, (quality, participant) => {
            if (participant === room.localParticipant) {
              setNetQuality(quality === LK.ConnectionQuality.Poor ? "poor" : quality === LK.ConnectionQuality.Good ? "good" : "medium");
            }
          });
          room.on(LK.RoomEvent.Reconnecting, () => {
            setNetQuality("poor");
            setErr("পুনরায় সংযোগ হচ্ছে...");
            // 25s এর মধ্যে LiveKit reconnect না হলে app-level retry শুরু হবে
            if (!destroyedRef._reconnectTimer) {
              destroyedRef._reconnectTimer = setTimeout(() => {
                if (!destroyedRef.current) {
                  setErr("সংযোগ হারিয়ে গেছে।");
                  cleanup(true);
                }
              }, 25000);
            }
          });
          room.on(LK.RoomEvent.Reconnected, () => {
            reconnectAttemptsRef.current = 0;
            setNetQuality("good");
            setStatus("active");
            startTimer();
            setErr("");
            if (destroyedRef._reconnectTimer) {
              clearTimeout(destroyedRef._reconnectTimer);
              destroyedRef._reconnectTimer = null;
            }
          });
          room.on(LK.RoomEvent.Disconnected, async (reason) => {
            if (destroyedRef.current) return;
            if (reason === LK.DisconnectReason.CLIENT_INITIATED) return;
            if (destroyedRef._reconnectTimer) { clearTimeout(destroyedRef._reconnectTimer); destroyedRef._reconnectTimer = null; }
            // Firebase এ check — call এখনো active কিনা
            let callActive = true;
            try {
              const snap = await db.ref(`/calls/${callConfig.callId}/status`).once("value");
              const v = snap.val();
              if (v === "ended" || v === "rejected") callActive = false;
            } catch(fe) { /* network error — assume active, keep retrying */ }
            if (!callActive || destroyedRef.current) return;
            // Infinite retry — Firebase "active" থাকলে ছাড়বে না
            reconnectAttemptsRef.current += 1;
            const delay = Math.min(2000 * reconnectAttemptsRef.current, 15000);
            setErr(`সংযোগ বিচ্ছিন্ন। পুনরায় চেষ্টা হচ্ছে... (${reconnectAttemptsRef.current})`);
            // নেট online হলে সাথে সাথে retry
            const handleOnline = () => {
              if (destroyedRef.current) return;
              clearTimeout(reconnectTimerRef.current);
              setErr("নেটওয়ার্ক ফিরেছে। সংযোগ হচ্ছে...");
              setTimeout(() => { if (!destroyedRef.current) doConnect(reconnectAttemptsRef.current); }, 500);
            };
            window.removeEventListener("online", handleOnline);
            window.addEventListener("online", handleOnline, { once: true });
            clearTimeout(reconnectTimerRef.current);
            reconnectTimerRef.current = setTimeout(() => {
              window.removeEventListener("online", handleOnline);
              if (!destroyedRef.current) doConnect(reconnectAttemptsRef.current);
            }, delay);
          });

          const cleanup = (goHome=false) => {
            if (destroyedRef.current) return;
            destroyedRef.current = true;
            clearInterval(timerRef.current);
            clearTimeout(reconnectTimerRef.current);
            clearTimeout(participantDisconnectTimerRef.current);
            participantDisconnectTimerRef.current = null;
            if (destroyedRef._reconnectTimer) { clearTimeout(destroyedRef._reconnectTimer); destroyedRef._reconnectTimer = null; }
            sharedAudioEls.forEach(el => { try{el.srcObject=null;el.remove();}catch(e){} });
            room.disconnect();
            db.ref(`/calls/${callConfig.callId}/status`).off();
            if (goHome) setScreen("home");
          };
          cleanupRef.current = cleanup;

          try {
            const perm = await ensureMediaPermission(true);
            if (perm.denied) { setPermDenied(true); return; }

            await LKRotation.connectRoom(room, `call-${callConfig.callId}`, user.uid, user.name, { autoSubscribe: true });
            reconnectAttemptsRef.current = 0;
            setErr("");
            if (attempt === 0 && callConfig.isCaller) { setStatus("ringing"); db.ref(`/calls/${callConfig.callId}/status`).set("active"); }
            if ((room.remoteParticipants||room.participants||new Map()).size > 0) { setStatus("active"); startTimer(); }
            await room.localParticipant.enableCameraAndMicrophone();
            attachLocalCam();
            // Already subscribed tracks check — race condition fix
            setTimeout(() => {
              if (destroyedRef.current) return;
              const rp = room.remoteParticipants instanceof Map ? room.remoteParticipants : new Map();
              rp.forEach(p => {
                const vp = getTrackPub(p, LK?.Track?.Source?.Camera);
                if (vp?.track && remoteVidRef.current) {
                  remoteVideoTrackRef.current = vp.track;
                  vp.track.attach(remoteVidRef.current);
                  safePlay(remoteVidRef.current);
                  setStatus("active"); startTimer();
                }
                const ap = getTrackPub(p, LK?.Track?.Source?.Microphone);
                if (ap?.track) {
                  const el = ap.track.attach();
                  el.autoplay = true;
                  el.play().catch(() => {});
                  document.body.appendChild(el); sharedAudioEls.push(el);
                }
              });
            }, 500);
            // Fallback: 2.5s পরে remote participants চেক করি
            setTimeout(() => {
              if (!destroyedRef.current) {
                const rp = room.remoteParticipants instanceof Map ? room.remoteParticipants : new Map();
                if (rp.size > 0) { setStatus("active"); startTimer(); }
              }
            }, 2500);
            // Firebase listener — প্রতি reconnect এ নতুন করে register করো
            db.ref(`/calls/${callConfig.callId}/status`).off();
            db.ref(`/calls/${callConfig.callId}/status`).on("value", s => {
              const v = s.val();
              if ((v==="ended"||v==="rejected") && !destroyedRef.current) cleanup(true);
              if (v==="active" && !callConfig.isCaller && !destroyedRef.current) { setStatus("active"); startTimer(); }
            });
          } catch(e) {
            if (destroyedRef.current) return;
            // Connect fail হলে Firebase check করে retry
            let callActive = true;
            try {
              const snap = await db.ref(`/calls/${callConfig.callId}/status`).once("value");
              const v = snap.val();
              if (v === "ended" || v === "rejected") callActive = false;
            } catch(fe) {}
            if (callActive) {
              reconnectAttemptsRef.current += 1;
              const delay = Math.min(2000 * reconnectAttemptsRef.current, 15000);
              setErr(`সংযোগ ব্যর্থ। পুনরায় চেষ্টা হচ্ছে... (${reconnectAttemptsRef.current})`);
              clearTimeout(reconnectTimerRef.current);
              reconnectTimerRef.current = setTimeout(() => {
                if (!destroyedRef.current) doConnect(reconnectAttemptsRef.current);
              }, delay);
            } else {
              setErr(e.message || "সংযোগ ব্যর্থ হয়েছে।");
            }
          }
        };

        doConnect(0);
        return () => { if (!isPipRef.current) cleanupRef.current?.(false); };
      }, []);

      const endCall = () => {
        isPipRef.current = false;
        destroyedRef.current = true;
        clearInterval(timerRef.current);
        roomRef.current?.disconnect();
        db.ref(`/calls/${callConfig.callId}/status`).set("ended");
        db.ref(`/users/${contact.uid}/incomingCall`).remove();
        db.ref(`/calls/${callConfig.callId}/status`).off();
        setScreen("home");
      };

      // Back বাটনে কল না কেটে PiP mode এ minimize করি
      const handleMinimize = () => {
        if (onMinimize) {
          isPipRef.current = true;
          clearInterval(timerRef.current);
          timerRef.current = null;
          try { if (localVidRef.current) localVidRef.current.srcObject = null; } catch(e) {}
          try { if (remoteVidRef.current) remoteVidRef.current.srcObject = null; } catch(e) {}
          onMinimize({
            type: "video",
            contact, callConfig,
            roomRef, destroyedRef,
            remoteVideoTrackRef,
            status, sec, muted, camOff,
            endCallFn: () => {
              isPipRef.current = false;
              destroyedRef.current = true;
              roomRef.current?.disconnect();
              db.ref(`/calls/${callConfig.callId}/status`).set("ended");
              db.ref(`/users/${contact.uid}/incomingCall`).remove();
              db.ref(`/calls/${callConfig.callId}/status`).off();
            }
          });
        } else {
          setScreen("home");
        }
      };

      // Back button event থেকে minimize করো
      useEffect(()=>{
        const handler = () => handleMinimize();
        window.addEventListener("vc:minimize_call", handler);
        return () => window.removeEventListener("vc:minimize_call", handler);
      }, [status, sec, muted, camOff]);
      const toggleMic = async () => { const v=!muted; setMuted(v); await roomRef.current?.localParticipant.setMicrophoneEnabled(!v); };
      const toggleCam = async () => {
        const v=!camOff; setCamOff(v);
        await roomRef.current?.localParticipant.setCameraEnabled(!v);
        if(localVidRef.current) localVidRef.current.style.opacity = v?"0":"1";
      };
      const switchCamera = async () => {
        const room = roomRef.current;
        if (!room) return;
        const newFacing = facingModeRef.current === 'user' ? 'environment' : 'user';
        facingModeRef.current = newFacing;
        try {
          const pub = getTrackPub(room.localParticipant, LK.Track.Source.Camera);
          if (pub?.track) {
            const oldTrack = pub.track.mediaStreamTrack;
            const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: newFacing } } });
            const newVideoTrack = newStream.getVideoTracks()[0];
            await pub.track.replaceTrack(newVideoTrack);
            if (oldTrack) oldTrack.stop();
            if (localVidRef.current) {
              localVidRef.current.srcObject = new MediaStream([newVideoTrack]);
            }
          }
        } catch(e) { console.error('Switch camera:', e); }
      };

      // ── Background handling: ব্যাকগ্রাউন্ডে গেলে ক্যামেরা বন্ধ, অডিও চালু থাকে ──
      const camWasOnRef = useRef(false);
      useEffect(() => {
        const handleVisibility = async () => {
          const room = roomRef.current;
          if (!room || destroyedRef.current) return;
          if (document.hidden) {
            // App ব্যাকগ্রাউন্ডে: ক্যামেরা বন্ধ, মাইক চালু
            camWasOnRef.current = !camOff;
            try { await room.localParticipant.setCameraEnabled(false); } catch(e) {}
          } else {
            // App ফোরগ্রাউন্ডে ফিরলে: আগে ক্যামেরা চালু থাকলে পুনরায় চালু করো
            if (camWasOnRef.current && !camOff) {
              try { await room.localParticipant.setCameraEnabled(true); } catch(e) {}
            }
          }
        };
        document.addEventListener('visibilitychange', handleVisibility);
        return () => document.removeEventListener('visibilitychange', handleVisibility);
      }, [camOff]);

      const netColor = netQuality==="poor"?"var(--red)":netQuality==="medium"?"var(--amber)":"var(--green)";

      if (err) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",gap:20,padding:24}}>
          <p style={{fontSize:44}}>⚠️</p>
          <p style={{color:"var(--red)",textAlign:"center",fontSize:14,lineHeight:1.7}}>{err}</p>
          <button onClick={()=>setScreen("home")} style={{background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,padding:"12px 24px",color:"var(--text)",cursor:"pointer",fontSize:14,fontFamily:"'Exo 2',sans-serif"}}>ফিরে যান</button>
        </div>
      );

      return (
        <div style={{position:"relative",width:"100%",height:"100vh",background:"#050508",overflow:"hidden"}}>
          <video ref={remoteVidRef} autoPlay playsInline style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0,zIndex:1,background:"#000"}}/>
          {status !== "active" && (
            <div style={{position:"absolute",inset:0,zIndex:5,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at center,#0d0d25 0%,#050508 100%)"}}>
              <div style={{fontSize:88,animation:"float 3.5s ease-in-out infinite",marginBottom:14}}>{contact.emoji}</div>
              <h2 style={{fontFamily:"Orbitron",fontSize:24,fontWeight:700}}>{contact.name}</h2>
              <p style={{color:"var(--green)",marginTop:10,fontSize:13}}>{status==="ringing"?"📞 রিং হচ্ছে...":"🔗 সংযুক্ত হচ্ছে..."}</p>
            </div>
          )}
          <div style={{position:"absolute",top:68,right:16,width:115,height:155,borderRadius:18,overflow:"hidden",border:"2px solid rgba(0,212,255,.3)",zIndex:10,background:"rgba(0,212,255,.05)"}}>
            <video ref={localVidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover",display:camOff?"none":"block",transform:"scaleX(-1)"}}/>
            {camOff&&<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>{user.emoji}</div>}
          </div>
          <div style={{position:"absolute",top:0,left:0,right:0,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:20}}>
            <button onClick={handleMinimize} title="মিনিমাইজ করুন" style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:10,padding:9,cursor:"pointer",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",gap:5}}>
              <Ic n="back" s={18} c="white"/>
              {status==="active"&&<span style={{fontSize:9,color:"rgba(255,255,255,.7)",fontFamily:"'Exo 2',sans-serif",whiteSpace:"nowrap"}}>মিনি</span>}
            </button>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontFamily:"Orbitron",fontSize:12,color:"rgba(255,255,255,.5)",letterSpacing:2}}>{status==="active"?fmtTime(sec):"VIDEO CALL"}</span>
              {status==="active"&&<span style={{fontSize:10,color:netColor,fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>{netQuality==="poor"?"● নেটওয়ার্ক দুর্বল":netQuality==="medium"?"● সাধারণ":"● সংযুক্ত ✓"}</span>}
            </div>
            <div style={{width:38}}/>
          </div>
          <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"20px 0 50px",display:"flex",justifyContent:"center",gap:22,zIndex:20,background:"linear-gradient(transparent,rgba(0,0,0,.6))"}}>
            <button className="call-btn" onClick={toggleMic} style={{background:muted?"rgba(255,59,92,.2)":"rgba(255,255,255,.1)",border:`1px solid ${muted?"rgba(255,59,92,.5)":"rgba(255,255,255,.2)"}`}}><Ic n={muted?"micOff":"mic"} s={24} c={muted?"var(--red)":"white"}/></button>
            <button className="call-btn" onClick={endCall} style={{background:"var(--red)",border:"none",width:74,height:74,boxShadow:"var(--glow-r)"}}><Ic n="endCall" s={28} c="white"/></button>
            <button className="call-btn" onClick={toggleCam} style={{background:camOff?"rgba(255,59,92,.2)":"rgba(255,255,255,.1)",border:`1px solid ${camOff?"rgba(255,59,92,.5)":"rgba(255,255,255,.2)"}`}}><Ic n={camOff?"camOff":"cam"} s={24} c={camOff?"var(--red)":"white"}/></button>
          </div>
        </div>
      );
    };
    const AudioCallScreen = ({user,contact,callConfig,setScreen,onMinimize,pipState}) => {
      const LK = window.LivekitClient;
      const roomRef = useRef(null);
      const timerRef = useRef(null);
      const destroyedRef = useRef(false);
      const isPipRef = useRef(false);
      const [status, setStatus] = useState(pipState?pipState.status:"connecting");
      const [sec, setSec] = useState(pipState?pipState.sec:0);
      const [muted, setMuted] = useState(pipState?pipState.muted:false);
      const [err, setErr] = useState("");
      const [netQuality, setNetQuality] = useState("good");
      const [permDenied, setPermDenied] = useState(false);

      if (permDenied) return (
        <PermissionDeniedScreen needVideo={false} onBack={(granted) => {
          if (granted) setPermDenied(false);
          else setScreen("home");
        }}/>
      );

      useEffect(() => {
        // PiP থেকে ফিরলে আগের room পুনরায় ব্যবহার করি
        if (pipState && pipState.roomRef && pipState.roomRef.current) {
          roomRef.current = pipState.roomRef.current;
          destroyedRef.current = pipState.destroyedRef ? pipState.destroyedRef.current : false;
          const room = roomRef.current;
          const startTimer = () => { if(!timerRef.current) timerRef.current=setInterval(()=>setSec(s=>s+1),1000); };
          if (status === "active" && !timerRef.current) startTimer();
          const cleanupFromPip = (goHome=false) => {
            if(destroyedRef.current)return;
            destroyedRef.current=true;
            clearInterval(timerRef.current);
            room.disconnect();
            db.ref(`/calls/${callConfig.callId}/status`).off();
            if(goHome)setScreen("home");
          };
          db.ref(`/calls/${callConfig.callId}/status`).on("value",s=>{
            const v=s.val();
            if((v==="ended"||v==="rejected")&&!destroyedRef.current)cleanupFromPip(true);
          });
          return () => {
            db.ref(`/calls/${callConfig.callId}/status`).off();
          };
        }

        // ── Voice 1:1 Auto-reconnect ─────────────────────────────────────
        const reconnectAttemptsRef = {current: 0};
        const reconnectTimerRef = {current: null};
        const cleanupRef = {current: null};
        const participantDisconnectTimerRef = {current: null};
        const sharedAudioEls = [];
        const startTimer = () => { if(!timerRef.current) timerRef.current=setInterval(()=>setSec(s=>s+1),1000); };

        const doConnect = async (attempt) => {
          // পুরনো room সরিয়ে নতুন তৈরি করো
          if (roomRef.current) {
            try { roomRef.current.removeAllListeners(); } catch(e) {}
            try { roomRef.current.disconnect(); } catch(e) {}
          }
          let room;
          try { room = buildLKRoom(false); } catch(e) { setErr("ভিডিও SDK লোড হয়নি। পেজ রিফ্রেশ করুন।"); return; }
          roomRef.current = room;

          room.on(LK.RoomEvent.ParticipantConnected, () => {
            // participant ফিরে এলে disconnect timer বাতিল করো
            clearTimeout(participantDisconnectTimerRef.current);
            participantDisconnectTimerRef.current = null;
            setStatus("active"); startTimer();
          });
          room.on(LK.RoomEvent.ParticipantDisconnected, () => {
            if(!destroyedRef.current) {
              // সাথে সাথে end না করে 12s grace period দাও — brief network drop হলে reconnect সম্ভব
              clearTimeout(participantDisconnectTimerRef.current);
              participantDisconnectTimerRef.current = setTimeout(() => {
                if (!destroyedRef.current) {
                  db.ref(`/calls/${callConfig.callId}/status`).set("ended");
                }
              }, 12000);
            }
          });
          room.on(LK.RoomEvent.TrackSubscribed, (track) => {
            // track subscribe মানে participant ফিরে এসেছে — disconnect timer বাতিল
            clearTimeout(participantDisconnectTimerRef.current);
            participantDisconnectTimerRef.current = null;
            if(track.kind===LK.Track.Kind.Audio){
              const el=track.attach();
              el.autoplay=true;
              el.play().catch(()=>{});
              document.body.appendChild(el); sharedAudioEls.push(el);
              setStatus("active"); startTimer();
            }
          });
          room.on(LK.RoomEvent.TrackUnsubscribed, track => track.detach());
          room.on(LK.RoomEvent.ConnectionQualityChanged, (quality, participant) => {
            if(participant===room.localParticipant)
              setNetQuality(quality===LK.ConnectionQuality.Poor?"poor":quality===LK.ConnectionQuality.Good?"good":"medium");
          });
          room.on(LK.RoomEvent.Reconnecting, () => {
            setNetQuality("poor");
            setErr("পুনরায় সংযোগ হচ্ছে...");
            // 25s এর মধ্যে LiveKit reconnect না হলে app-level retry শুরু হবে
            if (!destroyedRef._reconnectTimer) {
              destroyedRef._reconnectTimer = setTimeout(() => {
                if (!destroyedRef.current) {
                  setErr("সংযোগ হারিয়ে গেছে।");
                  cleanup(true);
                }
              }, 25000);
            }
          });
          room.on(LK.RoomEvent.Reconnected, () => {
            reconnectAttemptsRef.current = 0;
            setNetQuality("good");
            startTimer();
            setErr("");
            if (destroyedRef._reconnectTimer) {
              clearTimeout(destroyedRef._reconnectTimer);
              destroyedRef._reconnectTimer = null;
            }
          });
          room.on(LK.RoomEvent.Disconnected, async (reason) => {
            if (destroyedRef.current) return;
            if (reason === LK.DisconnectReason.CLIENT_INITIATED) return;
            if (destroyedRef._reconnectTimer) { clearTimeout(destroyedRef._reconnectTimer); destroyedRef._reconnectTimer = null; }
            // Firebase এ check — call এখনো active কিনা
            let callActive = true;
            try {
              const snap = await db.ref(`/calls/${callConfig.callId}/status`).once("value");
              const v = snap.val();
              if (v === "ended" || v === "rejected") callActive = false;
            } catch(fe) { /* network error — assume active, keep retrying */ }
            if (!callActive || destroyedRef.current) return;
            // Infinite retry — Firebase "active" থাকলে ছাড়বে না
            reconnectAttemptsRef.current += 1;
            const delay = Math.min(2000 * reconnectAttemptsRef.current, 15000);
            setErr(`সংযোগ বিচ্ছিন্ন। পুনরায় চেষ্টা হচ্ছে... (${reconnectAttemptsRef.current})`);
            // নেট online হলে সাথে সাথে retry
            const handleOnline = () => {
              if (destroyedRef.current) return;
              clearTimeout(reconnectTimerRef.current);
              setErr("নেটওয়ার্ক ফিরেছে। সংযোগ হচ্ছে...");
              setTimeout(() => { if (!destroyedRef.current) doConnect(reconnectAttemptsRef.current); }, 500);
            };
            window.removeEventListener("online", handleOnline);
            window.addEventListener("online", handleOnline, { once: true });
            clearTimeout(reconnectTimerRef.current);
            reconnectTimerRef.current = setTimeout(() => {
              window.removeEventListener("online", handleOnline);
              if (!destroyedRef.current) doConnect(reconnectAttemptsRef.current);
            }, delay);
          });

          const cleanup = (goHome=false) => {
            if(destroyedRef.current)return;
            destroyedRef.current=true;
            clearInterval(timerRef.current);
            clearTimeout(reconnectTimerRef.current);
            clearTimeout(participantDisconnectTimerRef.current);
            participantDisconnectTimerRef.current = null;
            if (destroyedRef._reconnectTimer) { clearTimeout(destroyedRef._reconnectTimer); destroyedRef._reconnectTimer = null; }
            sharedAudioEls.forEach(el=>{try{el.srcObject=null;el.remove();}catch(e){}});
            room.disconnect();
            db.ref(`/calls/${callConfig.callId}/status`).off();
            if(goHome)setScreen("home");
          };
          cleanupRef.current = cleanup;

          try {
            const perm = await ensureMediaPermission(false);
            if (perm.denied) { setPermDenied(true); return; }

            await LKRotation.connectRoom(room, `call-${callConfig.callId}`, user.uid, user.name, {autoSubscribe:true});
            reconnectAttemptsRef.current = 0;
            setErr("");
            if(attempt === 0 && callConfig.isCaller){setStatus("ringing");db.ref(`/calls/${callConfig.callId}/status`).set("active");}
            if((room.remoteParticipants||room.participants||new Map()).size>0){setStatus("active");startTimer();}
            await room.localParticipant.setMicrophoneEnabled(true);
            // Already subscribed tracks check — race condition fix
            setTimeout(()=>{
              if(destroyedRef.current)return;
              const rp=room.remoteParticipants instanceof Map?room.remoteParticipants:new Map();
              rp.forEach(p=>{
                const ap=getTrackPub(p,LK?.Track?.Source?.Microphone);
                if(ap?.track){
                  const el=ap.track.attach();
                  el.autoplay=true; el.play().catch(()=>{});
                  document.body.appendChild(el); sharedAudioEls.push(el);
                  setStatus("active"); startTimer();
                }
              });
            },500);
            // Fallback: 2.5s পরে remote participants চেক করি
            setTimeout(()=>{
              if(!destroyedRef.current){
                const rp=room.remoteParticipants instanceof Map?room.remoteParticipants:new Map();
                if(rp.size>0){setStatus("active");startTimer();}
              }
            },2500);
            // Firebase listener — প্রতি reconnect এ নতুন করে register করো
            db.ref(`/calls/${callConfig.callId}/status`).off();
            db.ref(`/calls/${callConfig.callId}/status`).on("value",s=>{
              const v=s.val();
              if((v==="ended"||v==="rejected")&&!destroyedRef.current)cleanup(true);
              if(v==="active"&&!callConfig.isCaller&&!destroyedRef.current){setStatus("active");startTimer();}
            });
          } catch(e) {
            if (destroyedRef.current) return;
            let callActive = true;
            try {
              const snap = await db.ref(`/calls/${callConfig.callId}/status`).once("value");
              const v = snap.val();
              if (v === "ended" || v === "rejected") callActive = false;
            } catch(fe) {}
            if (callActive) {
              reconnectAttemptsRef.current += 1;
              const delay = Math.min(2000 * reconnectAttemptsRef.current, 15000);
              setErr(`সংযোগ ব্যর্থ। পুনরায় চেষ্টা হচ্ছে... (${reconnectAttemptsRef.current})`);
              clearTimeout(reconnectTimerRef.current);
              reconnectTimerRef.current = setTimeout(() => {
                if (!destroyedRef.current) doConnect(reconnectAttemptsRef.current);
              }, delay);
            } else {
              setErr(e.message || "সংযোগ ব্যর্থ হয়েছে।");
            }
          }
        };

        doConnect(0);
        return () => { if (!isPipRef.current) cleanupRef.current?.(false); };
      }, []);

      const endCall = () => {
        isPipRef.current = false;
        destroyedRef.current=true;
        clearInterval(timerRef.current);
        roomRef.current?.disconnect();
        db.ref(`/calls/${callConfig.callId}/status`).set("ended");
        db.ref(`/users/${contact.uid}/incomingCall`).remove();
        db.ref(`/calls/${callConfig.callId}/status`).off();
        setScreen("home");
      };
      const toggleMic = async () => { const v=!muted;setMuted(v);await roomRef.current?.localParticipant.setMicrophoneEnabled(!v); };

      // Back বাটনে কল না কেটে PiP mode এ minimize করি
      const handleMinimize = () => {
        if (onMinimize) {
          isPipRef.current = true;
          clearInterval(timerRef.current);
          timerRef.current = null;
          onMinimize({
            type: "audio",
            contact, callConfig,
            roomRef, destroyedRef,
            status, sec, muted,
            endCallFn: () => {
              isPipRef.current = false;
              destroyedRef.current = true;
              roomRef.current?.disconnect();
              db.ref(`/calls/${callConfig.callId}/status`).set("ended");
              db.ref(`/users/${contact.uid}/incomingCall`).remove();
              db.ref(`/calls/${callConfig.callId}/status`).off();
            }
          });
        } else {
          setScreen("home");
        }
      };

      // Back button event থেকে minimize করো
      useEffect(()=>{
        const handler = () => handleMinimize();
        window.addEventListener("vc:minimize_call", handler);
        return () => window.removeEventListener("vc:minimize_call", handler);
      }, [status, sec, muted]);

      // ── Background handling: অডিও কল ব্যাকগ্রাউন্ডে চলতে থাকে ──
      // ফোরগ্রাউন্ডে ফিরলে মাইক যদি mute না থাকে তাহলে পুনরায় চালু করো
      useEffect(() => {
        const handleVisibility = async () => {
          const room = roomRef.current;
          if (!room || destroyedRef.current) return;
          if (!document.hidden && !muted) {
            // ব্যাকগ্রাউন্ড থেকে ফিরলে মাইক নিশ্চিত করো চালু আছে
            try { await room.localParticipant.setMicrophoneEnabled(true); } catch(e) {}
          }
        };
        document.addEventListener('visibilitychange', handleVisibility);
        return () => document.removeEventListener('visibilitychange', handleVisibility);
      }, [muted]);

      if(err) return(
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",gap:20,padding:24}}>
          <p style={{fontSize:44}}>⚠️</p>
          <p style={{color:"var(--red)",textAlign:"center",fontSize:14,lineHeight:1.7}}>{err}</p>
          <button onClick={()=>setScreen("home")} style={{background:"var(--glass)",border:"1px solid var(--gb)",borderRadius:12,padding:"12px 24px",color:"var(--text)",cursor:"pointer",fontSize:14,fontFamily:"'Exo 2',sans-serif"}}>ফিরে যান</button>
        </div>
      );

      const netColor=netQuality==="poor"?"var(--red)":netQuality==="medium"?"var(--amber)":"var(--green)";
      return(
        <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at center,#0d0d25 0%,#050508 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24,padding:24,position:"relative"}}>
          <button onClick={handleMinimize} title="মিনিমাইজ করুন" style={{position:"absolute",top:20,left:20,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:10,padding:10,cursor:"pointer",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",gap:4}}>
            <Ic n="back" s={18} c="white"/>
            {status==="active"&&<span style={{fontSize:9,color:"rgba(255,255,255,.7)",fontFamily:"'Exo 2',sans-serif"}}>মিনি</span>}
          </button>
          <div style={{position:"relative"}}>
            {[1,2,3].map(i=><div key={i} style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:80+i*28,height:80+i*28,borderRadius:"50%",border:"1px solid rgba(168,85,247,.25)",animation:`pulse-ring ${1.5+i*.4}s ease-out infinite`,animationDelay:i*.2+"s"}}/>)}

    const GroupsScreen = ({user, setScreen, setActiveGroup}) => {

          const d=s.val()||{};
          const ids=Object.keys(d);
          if(ids.length===0){setGroups([]);return;}
          const refs=ids.map(id=>db.ref(`/groups/${id}`).once("value"));
          Promise.all(refs).then(snaps=>{
            setGroups(snaps.map(sn=>sn.val()&&({id:sn.key,...sn.val()})).filter(Boolean).sort((a,b)=>(b.lastTs||0)-(a.lastTs||0)));
          });
        });
        return()=>r.off();
      },[user.uid]);

      useEffect(()=>{
        // cache — group তৈরির সময় friend list দরকার, real-time লাগে না
        loadUsersOnce(data=>{ setAllUsers(Object.values(data).filter(u=>u.uid!==user.uid)); });
      },[user.uid]);

      useEffect(()=>{
        const r=db.ref(`/friends/${user.uid}`);
        r.on("value",s=>setFriends(s.val()||{}));
        return()=>r.off();
      },[user.uid]);

      const friendUsers = allUsers.filter(u=>friends[u.uid]);

      const createGroup = async () => {
        if(!newGroupName.trim()||selectedMembers.length===0)return;
        setCreating(true);
        const members={[user.uid]:{uid:user.uid,name:user.name,emoji:user.emoji,photo:user.photo||null}};
        selectedMembers.forEach(u=>{members[u.uid]={uid:u.uid,name:u.name,emoji:u.emoji,photo:u.photo||null};});
        const ref=db.ref("/groups").push();
        const groupId=ref.key;
        await ref.set({name:newGroupName.trim(),adminUid:user.uid,members,createdAt:firebase.database.ServerValue.TIMESTAMP,lastMsg:"",lastTs:firebase.database.ServerValue.TIMESTAMP});
        const allMemberUids=[user.uid,...selectedMembers.map(u=>u.uid)];
        await Promise.all(allMemberUids.map(uid=>db.ref(`/userGroups/${uid}/${groupId}`).set(true)));
        await db.ref(`/groupMessages/${groupId}`).push({text:`${user.name} গ্রুপ "${newGroupName.trim()}" তৈরি করেছে`,fromUid:"system",fromName:"System",fromEmoji:"👥",ts:firebase.database.ServerValue.TIMESTAMP});
        setCreating(false);setShowCreate(false);setNewGroupName("");setSelectedMembers([]);

            <h1 style={{fontFamily:"Orbitron",fontSize:17,fontWeight:700,letterSpacing:1,background:"linear-gradient(135deg,var(--purple2),var(--blue))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Groups</h1>
            <button onClick={()=>setShowCreate(true)} style={{background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:12,padding:"8px 16px",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:6}}>
              <Ic n="plus" s={16} c="white"/> নতুন গ্রুপ
            </button>
          </div>
          <div style={{padding:"12px 16px"}}>
            {groups.length===0&&(
              <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text2)"}}>
                <p style={{fontSize:48,marginBottom:16}}>👥</p>
                <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>কোনো গ্রুপ নেই</p>
                <p style={{fontSize:13,marginBottom:20}}>বন্ধুদের সাথে গ্রুপ তৈরি করুন!</p>
                <button onClick={()=>setShowCreate(true)} style={{background:"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:13,padding:"12px 28px",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14}}>
                  গ্রুপ তৈরি করুন →
                </button>
              </div>
            )}
            {groups.map((g,i)=>(
              <div key={g.id} onClick={()=>{setActiveGroup(g);setScreen("groupchat");}} className="glass" style={{padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,cursor:"pointer",borderRadius:17,animation:`slide-up .3s ease ${i*.05}s both`}}>
                <div style={{width:52,height:52,borderRadius:16,background:"linear-gradient(135deg,rgba(124,58,237,.45),rgba(0,212,255,.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>👥</div>
                <div style={{flex:1,overflow:"hidden"}}>
                  <p style={{fontWeight:600,fontSize:15}}>{g.name}</p>
                  <p style={{fontSize:12,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{g.lastMsg||"গ্রুপ তৈরি হয়েছে!"}</p>
                </div>
                <p style={{fontSize:10,color:"var(--text2)",flexShrink:0}}>{Object.keys(g.members||{}).length} জন</p>
              </div>
            ))}
            <DevFooter/>
          </div>
          {showCreate&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&setShowCreate(false)}>
              <div style={{width:"100%",maxWidth:480,background:"var(--bg2)",borderRadius:"24px 24px 0 0",border:"1px solid var(--gb)",padding:"22px 18px 36px",animation:"slide-up .25s ease",maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
                  <p style={{fontFamily:"Orbitron",fontWeight:700,fontSize:15}}>নতুন গ্রুপ</p>
                  <button onClick={()=>setShowCreate(false)} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"var(--text2)",fontSize:15}}>✕</button>
                </div>
                <input value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} placeholder="গ্রুপের নাম" style={{marginBottom:14}}/>
                <p style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>বন্ধুদের যোগ করুন ({selectedMembers.length} জন সিলেক্ট)</p>
                <div style={{flex:1,overflowY:"auto",marginBottom:14}}>
                  {friendUsers.length===0&&<p style={{color:"var(--text2)",fontSize:13,textAlign:"center",padding:"20px 0"}}>কোনো বন্ধু নেই। আগে বন্ধু যোগ করুন।</p>}
                  {friendUsers.map(u=>{
                    const sel=selectedMembers.find(s=>s.uid===u.uid);
                    return(
                      <div key={u.uid} onClick={()=>setSelectedMembers(prev=>sel?prev.filter(s=>s.uid!==u.uid):[...prev,u])} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:13,marginBottom:7,background:sel?"rgba(0,212,255,.08)":"rgba(255,255,255,.04)",border:`1px solid ${sel?"rgba(0,212,255,.3)":"rgba(255,255,255,.07)"}`,cursor:"pointer"}}>
                        <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,rgba(124,58,237,.35),rgba(0,212,255,.18))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,overflow:"hidden"}}>{u.photo?<img src={u.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:u.emoji}</div>
                        <p style={{fontWeight:600,fontSize:14,flex:1}}>{u.name}</p>
                        <div style={{width:22,height:22,borderRadius:"50%",background:sel?"var(--blue)":"rgba(255,255,255,.1)",border:`2px solid ${sel?"var(--blue)":"rgba(255,255,255,.2)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{sel?"✓":""}</div>
                      </div>
                    );
                  })}
                </div>
                <button onClick={createGroup} disabled={!newGroupName.trim()||selectedMembers.length===0||creating} style={{padding:"14px",background:(!newGroupName.trim()||selectedMembers.length===0)?"rgba(255,255,255,.07)":"linear-gradient(135deg,var(--purple),var(--blue))",border:"none",borderRadius:13,color:"white",cursor:(!newGroupName.trim()||selectedMembers.length===0)?"default":"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {creating?<><Spinner size={16}/> তৈরি হচ্ছে...</>:"গ্রুপ তৈরি করুন →"}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const GroupChatScreen = ({user, group, setScreen, setActiveGroup, setGroupCallConfig}) => {
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState("");
      const [members, setMembers] = useState({});
      const [showMembers, setShowMembers] = useState(false);
      const [removingUid, setRemovingUid] = useState(null);
      const [showAddMember, setShowAddMember] = useState(false);
      const [addMemberSearch, setAddMemberSearch] = useState("");
      const [addingUid, setAddingUid] = useState(null);
      const [allUsersList, setAllUsersList] = useState([]);
      // Track which call rooms still have active participants
      const [activeSessions, setActiveSessions] = useState({});
      const bottom = useRef(null);
      const inputRef = useRef(null);
      const isAdmin = group?.adminUid === user.uid;

      useEffect(()=>{
        if(!group?.id)return;
        const r=db.ref(`/groups/${group.id}/members`);
        r.on("value",s=>setMembers(s.val()||{}));
        return()=>r.off();
      },[group?.id]);

      useEffect(()=>{
        if(!group?.id)return;
        const r=db.ref(`/groupMessages/${group.id}`);
        r.limitToLast(100).on("value",s=>{
          const d=s.val()||{};
          setMsgs(Object.entries(d).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
        });
        return()=>r.off();
      },[group?.id]);

      useEffect(()=>{setTimeout(()=>bottom.current?.scrollIntoView({behavior:"smooth"}),100);},[msgs]);

      // Subscribe to /groupCallSessions/${roomId} for each call message
      // so "যোগ দিন" button only shows while the room has active participants
      useEffect(()=>{
        const callRoomIds=[...new Set(msgs.filter(m=>m.type==="call"&&m.roomId).map(m=>m.roomId))];
        if(callRoomIds.length===0)return;
        const refs={};
        callRoomIds.forEach(roomId=>{
          const ref=db.ref(`/groupCallSessions/${roomId}`);
          ref.on("value",snap=>{
            const d=snap.val();
            setActiveSessions(prev=>({...prev,[roomId]:!!(d&&Object.keys(d).length>0)}));
          });
          refs[roomId]=ref;
        });
        return()=>{ Object.values(refs).forEach(r=>r.off()); };
      },[msgs]);

      const send=useCallback(async()=>{
        const text=input.trim();if(!text)return;
        setInput("");
        const msgRef=db.ref(`/groupMessages/${group.id}`).push();
        await msgRef.set({text,fromUid:user.uid,fromName:user.name,fromEmoji:user.emoji,fromPhoto:user.photo||null,ts:firebase.database.ServerValue.TIMESTAMP});
        db.ref(`/groups/${group.id}`).update({lastMsg:`${user.name}: ${text}`,lastTs:firebase.database.ServerValue.TIMESTAMP});
        setTimeout(()=>inputRef.current?.focus(),50);
      },[input,group,user]);

      const startGroupCall=async(callType)=>{
        const roomId=Math.random().toString(36).substr(2,6).toUpperCase();
        await db.ref(`/groupMessages/${group.id}`).push({
          fromUid:"system",fromName:"System",fromEmoji:callType==="video"?"📹":"🎙️",
          text:`${user.name} ${callType==="video"?"ভিডিও":"অডিও"} কল শুরু করেছে`,
          type:"call",callType,roomId,ts:firebase.database.ServerValue.TIMESTAMP
        });
        db.ref(`/groups/${group.id}`).update({lastMsg:`${user.name} কল শুরু করেছে`,lastTs:firebase.database.ServerValue.TIMESTAMP});
        const memberUids=Object.keys(members).filter(uid=>uid!==user.uid);
        const notifData={groupId:group.id,groupName:group.name,callerName:user.name,callerEmoji:user.emoji,roomId,callType,ts:firebase.database.ServerValue.TIMESTAMP};
        await Promise.all(memberUids.map(uid=>db.ref(`/users/${uid}/incomingGroupCall`).set(notifData)));
        // FCM push — offline থাকা প্রতিটি member-কে notification পাঠাও
        memberUids.forEach(uid=>{
          fetch("/.netlify/functions/send-push",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              uid,
              callData:{
                callId:  roomId,
                callerUid:   user.uid,
                callerName:  user.name,
                callerEmoji: user.emoji,
                callerPhoto: user.photo||"",
                type:        "group"
              }
            })
          }).catch(()=>{});
        });
        setGroupCallConfig({roomId,callType});
        // Pre-register our own session so button shows immediately for others
        const sessionRef = db.ref(`/groupCallSessions/${roomId}/${user.uid}`);
        sessionRef.onDisconnect().remove();
        sessionRef.set(true);
        setScreen("group");
      };

      const joinGroupCall=(roomId,callType)=>{setGroupCallConfig({roomId,callType});setScreen("group");};

      const leaveGroup=async()=>{
        if(!window.confirm("গ্রুপ ছেড়ে যাবেন?"))return;
        await db.ref(`/groups/${group.id}/members/${user.uid}`).remove();
        await db.ref(`/userGroups/${user.uid}/${group.id}`).remove();
        db.ref(`/groupMessages/${group.id}`).push({text:`${user.name} গ্রুপ ছেড়ে গেছে।`,fromUid:"system",fromName:"System",fromEmoji:"🔔",ts:firebase.database.ServerValue.TIMESTAMP});
        setScreen("groups");
      };

      const removeMember=async(uid,name)=>{
        if(!isAdmin)return;
        if(!window.confirm(`${name} কে সরিয়ে দেবেন?`))return;
        setRemovingUid(uid);
        await db.ref(`/groups/${group.id}/members/${uid}`).remove();
        await db.ref(`/userGroups/${uid}/${group.id}`).remove();
        db.ref(`/groupMessages/${group.id}`).push({text:`${name} কে অ্যাডমিন সরিয়ে দিয়েছে।`,fromUid:"system",fromName:"System",fromEmoji:"🔔",ts:firebase.database.ServerValue.TIMESTAMP});
        setRemovingUid(null);
      };

      const openAddMember=()=>{
        setShowAddMember(true);
        setAddMemberSearch("");
        loadUsersOnce(data=>{
          setAllUsersList(Object.values(data).filter(u=>u.uid!==user.uid));
        });
      };

      const addMember=async(u)=>{
        if(members[u.uid])return;
        setAddingUid(u.uid);
        await db.ref(`/groups/${group.id}/members/${u.uid}`).set({name:u.name,emoji:u.emoji,photo:u.photo||null});
        await db.ref(`/userGroups/${u.uid}/${group.id}`).set({groupId:group.id,name:group.name,joinedAt:firebase.database.ServerValue.TIMESTAMP});
        db.ref(`/groupMessages/${group.id}`).push({text:`${u.name} গ্রুপে যোগ দিয়েছে।`,fromUid:"system",fromName:"System",fromEmoji:"🔔",ts:firebase.database.ServerValue.TIMESTAMP});
        setAddingUid(null);
      };

      const memberList=Object.entries(members);

      return(
        <div style={{height:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,background:"rgba(5,5,8,.96)",backdropFilter:"blur(22px)",borderBottom:"1px solid rgba(168,85,247,.15)",flexShrink:0}}>
            <button onClick={()=>setScreen("groups")} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Ic n="back" s={22} c="var(--purple2)"/></button>
            <div style={{width:42,height:42,borderRadius:13,background:"linear-gradient(135deg,rgba(124,58,237,.45),rgba(0,212,255,.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👥</div>
            <div onClick={()=>setShowMembers(true)} style={{flex:1,overflow:"hidden",cursor:"pointer"}}>
              <p style={{fontWeight:600,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{group?.name}</p>
              <p style={{fontSize:11,color:"var(--text2)"}}>{memberList.length} সদস্য · দেখতে ক্লিক করুন</p>
            </div>
            <button onClick={()=>startGroupCall("video")} style={{background:"rgba(0,212,255,.12)",border:"1px solid rgba(0,212,255,.25)",borderRadius:10,padding:8,cursor:"pointer",flexShrink:0}}><Ic n="video" s={18} c="var(--blue)"/></button>
            <button onClick={()=>startGroupCall("audio")} style={{background:"rgba(168,85,247,.12)",border:"1px solid rgba(168,85,247,.25)",borderRadius:10,padding:8,cursor:"pointer",flexShrink:0}}><Ic n="phone" s={18} c="var(--purple2)"/></button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 14px 10px"}}>
            {msgs.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--text2)"}}><p style={{fontSize:36,marginBottom:10}}>👥</p><p style={{fontSize:13}}>গ্রুপ তৈরি হয়েছে! হ্যালো বলুন 👋</p></div>}
            {msgs.map((m,i)=>{
              const isMe=m.fromUid===user.uid;
              const isSystem=m.fromUid==="system";
              if(isSystem&&m.type==="call")return(
                <div key={m.id} style={{display:"flex",justifyContent:"center",margin:"12px 0"}}>
                  <div style={{background:m.callType==="video"?"rgba(0,212,255,.08)":"rgba(168,85,247,.08)",border:`1px solid ${m.callType==="video"?"rgba(0,212,255,.25)":"rgba(168,85,247,.25)"}`,borderRadius:18,padding:"12px 18px",display:"flex",alignItems:"center",gap:14,maxWidth:310,width:"100%"}}>
                    <div style={{width:42,height:42,borderRadius:"50%",background:m.callType==="video"?"rgba(0,212,255,.15)":"rgba(168,85,247,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{m.callType==="video"?"📹":"🎙️"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontWeight:700,fontSize:13,color:m.callType==="video"?"var(--blue)":"var(--purple2)"}}>{m.callType==="video"?"ভিডিও":"অডিও"} কল</p>
                      <p style={{fontSize:11,color:"var(--text2)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.text}</p>
                    </div>
                    {activeSessions[m.roomId]
                      ? <button onClick={()=>joinGroupCall(m.roomId,m.callType)} style={{flexShrink:0,background:m.callType==="video"?"linear-gradient(135deg,var(--blue),rgba(0,150,200,.8))":"linear-gradient(135deg,var(--purple),var(--purple2))",border:"none",borderRadius:12,padding:"8px 14px",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontSize:12,fontWeight:700}}>যোগ দিন</button>
                      : <span style={{flexShrink:0,fontSize:11,color:"var(--text2)",padding:"8px 10px",background:"rgba(255,255,255,.05)",borderRadius:10,border:"1px solid rgba(255,255,255,.1)"}}>কল শেষ</span>
                    }
                  </div>
                </div>
              );
              if(isSystem)return(<div key={m.id} style={{textAlign:"center",margin:"10px 0"}}><span style={{fontSize:12,color:"var(--text2)",background:"rgba(255,255,255,.06)",padding:"4px 12px",borderRadius:20}}>{m.text}</span></div>);
              const showName=!isMe&&(i===0||msgs[i-1]?.fromUid!==m.fromUid);

              <div className="glass" style={{width:"100%",maxWidth:480,borderRadius:"24px 24px 0 0",padding:"24px 20px 40px",maxHeight:"80vh",display:"flex",flexDirection:"column"}}> 
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                  <h2 style={{fontFamily:"Orbitron",fontSize:15,fontWeight:700}}>সদস্য যোগ করুন</h2>

                <input
                  value={addMemberSearch}

                  {allUsersList.filter(u=>!members[u.uid]&&u.name.toLowerCase().includes(addMemberSearch.toLowerCase())).length===0&&(
                    <p style={{textAlign:"center",color:"var(--text2)",fontSize:13,marginTop:20}}>কোনো user পাওয়া যায়নি</p>
